<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Patient Portal</title>
    <style>
        :root { --primary: #0284c7; --primary-hover: #0369a1; --bg-color: #f0f9ff; --card-bg: #ffffff; --text-main: #0f172a; --border-color: #e0f2fe; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); margin-bottom: 5px; }
        .header p { color: #64748b; margin-top: 0; }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Directory Grid */
        .directory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .doctor-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .doctor-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        
        .doc-name { font-size: 1.4rem; color: var(--primary); font-weight: bold; margin: 0 0 5px 0; }
        .doc-desig { color: #475569; font-weight: bold; margin: 0 0 10px 0; font-size: 0.95rem;}
        .doc-degrees { font-size: 0.85rem; color: #64748b; margin-bottom: 15px; }
        
        .chamber-tag { display: inline-block; background: #e0f2fe; color: #0284c7; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 5px; margin-bottom: 5px; font-weight: bold;}
        
        button { width: 100%; background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-top: 15px; transition: 0.3s;}
        button:hover { background-color: var(--primary-hover); }

        /* Booking Modal */
        #bookingModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-content h2 { margin-top: 0; color: var(--primary); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        select, input[type="date"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px;}
        
        .btn-cancel { background-color: #ef4444; margin-top: 10px; }
        .btn-cancel:hover { background-color: #dc2626; }
        .logout-btn { background-color: #64748b; width: auto; padding: 10px 20px; float: right; margin-top: -60px; }
    </style>
</head>
<body>

<div class="container">
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    
    <div class="header">
        <h1>Holmes eRx Directory</h1>
        <p>Welcome, <span id="patientNameDisplay" style="font-weight: bold; color: #0284c7;">Patient</span>. Select a specialist to book an appointment.</p>
    </div>

    <div class="directory-grid" id="directoryGrid">
        <p style="text-align: center; width: 100%; color: #64748b;">Loading Hospital Directory...</p>
    </div>
</div>

<div id="bookingModal">
    <div class="modal-content">
        <h2>Book Appointment</h2>
        <p><strong>Doctor:</strong> <span id="modalDocName"></span></p>
        
        <div class="form-group">
            <label>Select Chamber / Location</label>
            <select id="modalChamber">
                </select>
        </div>
        
        <div class="form-group">
            <label>Select Date</label>
            <input type="date" id="modalDate">
        </div>
        
        <button onclick="confirmBooking()" style="background-color: #10b981;">✅ Confirm Booking</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
    const myPatientId = localStorage.getItem('eRx_UserId');
    const myPatientName = localStorage.getItem('eRx_UserName');
    let selectedDoctorId = null;

    window.onload = function() {
        const token = localStorage.getItem('eRx_Token');
        if (!token || localStorage.getItem('eRx_Role') !== 'patient') {
            alert("🔒 ACCESS DENIED. Please log in as a Patient.");
            window.location.href = 'auth.html';
        } else {
            document.getElementById('patientNameDisplay').innerText = myPatientName;
            fetchDirectory();
        }
    };

    function logout() { localStorage.clear(); window.location.href = 'auth.html'; }

    // Fetch all doctors from the Vault
    async function fetchDirectory() {
        try {
            const response = await fetch('http://localhost:3000/api/doctors');
            const doctors = await response.json();
            
            const grid = document.getElementById("directoryGrid");
            grid.innerHTML = "";

            if(doctors.length === 0) {
                grid.innerHTML = "<p>No doctors found in the directory.</p>";
                return;
            }

            doctors.forEach(doc => {
                // Safely format degrees
                const degreesStr = (doc.degrees && doc.degrees.length > 0) ? doc.degrees.join(', ') : "Medical Professional";
                
                // Format Chamber Tags
                let chambersHTML = "";
                if(doc.chambers && doc.chambers.length > 0) {
                    doc.chambers.forEach(c => {
                        chambersHTML += `<span class="chamber-tag">📍 ${c.facility}</span>`;
                    });
                } else {
                    chambersHTML = `<span class="chamber-tag" style="background:#f1f5f9; color:#64748b;">Chambers Pending</span>`;
                }

                // Build the Card
                // Note: We stringify the doc.chambers array so we can pass it to the modal!
                const card = document.createElement("div");
                card.className = "doctor-card";
                card.innerHTML = `
                    <h3 class="doc-name">Dr. ${doc.name}</h3>
                    <p class="doc-desig">${doc.designation || 'Consultant'} | ${doc.department || 'General Medicine'}</p>
                    <p class="doc-degrees">🎓 ${degreesStr}</p>
                    <div style="margin-bottom: 15px;">${chambersHTML}</div>
                    <p style="font-size: 0.85rem; color: #475569; height: 40px; overflow: hidden;">${doc.biography || 'Dedicated to providing exceptional patient care.'}</p>
                    <button onclick='openModal("${doc.doctorId}", "Dr. ${doc.name}", ${JSON.stringify(doc.chambers || [])})'>📅 Request Appointment</button>
                `;
                grid.appendChild(card);
            });
        } catch (error) {
            document.getElementById("directoryGrid").innerHTML = "<p style='color:red;'>Failed to load directory. Is the server running?</p>";
        }
    }

    // Modal Logic
    function openModal(docId, docName, chambersArray) {
        selectedDoctorId = docId;
        document.getElementById("modalDocName").innerText = docName;
        
        const chamberSelect = document.getElementById("modalChamber");
        chamberSelect.innerHTML = "";
        
        if (chambersArray.length === 0) {
            chamberSelect.innerHTML = `<option value="">No Active Chambers</option>`;
        } else {
            chambersArray.forEach(c => {
                chamberSelect.innerHTML += `<option value="${c.facility} (Room ${c.room})">${c.facility} - ${c.schedule}</option>`;
            });
        }

        // Set min date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById("modalDate").setAttribute('min', today);
        document.getElementById("modalDate").value = today;

        document.getElementById("bookingModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("bookingModal").style.display = "none"; selectedDoctorId = null; }

    // Fire the Booking Request to the Backend
    async function confirmBooking() {
        const chamber = document.getElementById("modalChamber").value;
        const date = document.getElementById("modalDate").value;
        const docName = document.getElementById("modalDocName").innerText;

        if (!chamber) return alert("Please select a valid chamber.");
        if (!date) return alert("Please select a date.");

        const payload = {
            patientId: myPatientId,
            patientName: myPatientName,
            doctorId: selectedDoctorId,
            doctorName: docName,
            chamber: chamber,
            date: date
        };

        try {
            const response = await fetch('http://localhost:3000/api/appointments', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            
            if (response.ok) {
                alert(`✅ Success! Your appointment with ${docName} on ${date} is confirmed.`);
                closeModal();
            } else alert("❌ Booking failed.");
        } catch (error) { alert("Vault Connection Error."); }
    }
</script>
</body>
</html>
