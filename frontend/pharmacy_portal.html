<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliScript BD: Pharmacy Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; color: #0f172a; }
        .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.7); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .toast-slide { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="antialiased min-h-screen pb-12">

    <!-- Navbar -->
    <nav class="bg-teal-900 text-white shadow-xl shadow-teal-900/20 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-teal-800 rounded-xl flex items-center justify-center border border-teal-700">
                <i class="fa-solid fa-pills text-teal-300"></i>
            </div>
            <div>
                <h1 class="font-black text-lg tracking-tight leading-none">IntelliScript BD</h1>
                <p class="text-[10px] font-bold text-teal-300 uppercase tracking-widest mt-1">Pharmacy Node</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden sm:flex items-center gap-2 bg-teal-800/50 px-3 py-1.5 rounded-full border border-teal-700/50">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span class="text-[10px] font-bold text-teal-100 uppercase tracking-widest">Network Secure</span>
            </div>
            <a href="login.html" class="text-sm font-bold text-teal-200 hover:text-white transition-colors">
                <i class="fa-solid fa-power-off"></i>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-6 mt-10">
        
        <!-- Header Controls -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 fade-in">
            <div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Dispensation Queue</h2>
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-widest mt-1">Pending Payload Decryptions</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="fetchPendingPrescriptions()" class="px-4 py-2 bg-white border-2 border-slate-200 text-slate-600 rounded-xl font-bold text-xs uppercase tracking-widest hover:border-teal-300 hover:text-teal-600 transition-colors shadow-sm">
                    <i class="fa-solid fa-rotate-right mr-1.5"></i> Refresh
                </button>
                <button class="px-5 py-2 bg-gradient-to-r from-teal-600 to-emerald-500 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-lg shadow-teal-500/30 hover:shadow-teal-500/50 hover:-translate-y-0.5 transition-all flex items-center gap-2">
                    <i class="fa-solid fa-qrcode"></i> Scan Patient QR
                </button>
            </div>
        </div>

        <!-- The Queue -->
        <div id="pendingDispensations" class="space-y-6">
            <!-- Cards injected here -->
        </div>

    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <script>
        // Seed mock data if empty to ensure the demo works beautifully
        function seedMockData() {
            if (!localStorage.getItem('pharmacy_queue')) {
                const mock = [
                    {
                        id: 'RX-9921-A',
                        patientId: 'NHI-BD-00012345',
                        doctorName: 'Dr. Ayesha Rahman',
                        date: new Date().toISOString(),
                        medications: [
                            { drug: 'Paracetamol 500mg', dosage: '1 tablet', rules: '3 times a day after meals' },
                            { drug: 'Amoxicillin 250mg', dosage: '1 capsule', rules: '2 times a day' }
                        ],
                        dispensed: false
                    },
                    {
                        id: 'RX-8834-B',
                        patientId: 'NHI-BD-00098765',
                        doctorName: 'Dr. Kamal Hossain',
                        date: new Date(Date.now() - 3600000).toISOString(), // 1 hour ago
                        medications: [
                            { drug: 'Omeprazole 20mg', dosage: '1 capsule', rules: 'Morning before meal' }
                        ],
                        dispensed: false
                    }
                ];
                localStorage.setItem('pharmacy_queue', JSON.stringify(mock));
            }
        }

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast-slide bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-xl shadow-xl shadow-emerald-900/10 flex items-start gap-3 w-80';
            toast.innerHTML = `
                <div class="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center shrink-0 mt-0.5">
                    <i class="fa-solid fa-check text-white text-sm"></i>
                </div>
                <div>
                    <p class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Success</p>
                    <p class="text-xs font-bold text-emerald-800 mt-0.5 leading-snug">${message}</p>
                </div>
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) reverse forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function dispenseMedication(id) {
            let queue = JSON.parse(localStorage.getItem('pharmacy_queue') || '[]');
            const index = queue.findIndex(rx => rx.id === id);
            
            if (index > -1) {
                queue[index].dispensed = true;
                localStorage.setItem('pharmacy_queue', JSON.stringify(queue));
                
                // Animate removal
                const card = document.getElementById(\`rx-card-\${id}\`);
                card.style.transition = 'all 0.3s ease';
                card.style.opacity = '0';
                card.style.transform = 'translateX(20px)';
                
                showToast("Medication Dispensed Successfully. Payload Decrypted.");
                
                setTimeout(() => {
                    fetchPendingPrescriptions();
                }, 300);
            }
        }

        function fetchPendingPrescriptions() {
            const container = document.getElementById('pendingDispensations');
            let queue = JSON.parse(localStorage.getItem('pharmacy_queue') || '[]');
            
            // Filter only non-dispensed ones that have medications
            const pending = queue.filter(rx => !rx.dispensed && rx.medications && rx.medications.length > 0);
            
            if (pending.length === 0) {
                container.innerHTML = `
                    <div class="glass p-12 rounded-3xl text-center border-2 border-dashed border-slate-200 fade-in">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-check-double text-slate-300 text-2xl"></i>
                        </div>
                        <h3 class="text-lg font-black text-slate-700">Queue Clear</h3>
                        <p class="text-xs font-semibold text-slate-400 mt-1 uppercase tracking-widest">No pending dispensations</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = pending.map((rx, idx) => `
                <div id="rx-card-\${rx.id}" class="glass p-6 rounded-3xl shadow-sm border border-slate-200 hover:border-teal-200 transition-colors fade-in" style="animation-delay: \${idx * 0.05}s">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-100 pb-4 mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center border border-teal-100">
                                <i class="fa-solid fa-file-prescription text-xl"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Patient ID</p>
                                <p class="text-sm font-black text-slate-800">\${rx.patientId}</p>
                            </div>
                        </div>
                        <div class="flex flex-col md:items-end">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Prescribed By</p>
                            <p class="text-xs font-bold text-slate-700"><i class="fa-solid fa-user-doctor text-teal-500 mr-1"></i> \${rx.doctorName}</p>
                            <p class="text-[9px] font-bold text-slate-400 uppercase mt-1">\${new Date(rx.date).toLocaleString()}</p>
                        </div>
                    </div>
                    
                    <div class="space-y-3 mb-6">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Medication Payload</p>
                        \${rx.medications.map(med => `
                            <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <div class="flex items-center gap-3">
                                    <i class="fa-solid fa-capsules text-teal-400"></i>
                                    <div>
                                        <p class="text-sm font-bold text-slate-800">\${med.drug}</p>
                                        <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider mt-0.5">\${med.rules}</p>
                                    </div>
                                </div>
                                <span class="text-xs font-black text-teal-700 bg-teal-100 px-3 py-1 rounded-lg">\${med.dosage}</span>
                            </div>
                        `).join('')}
                    </div>

                    <button onclick="dispenseMedication('\${rx.id}')" class="w-full py-4 bg-teal-600 hover:bg-teal-700 text-white rounded-xl font-black text-sm uppercase tracking-widest shadow-md shadow-teal-600/20 transition-all hover:-translate-y-0.5 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-hand-holding-medical"></i> Dispense Medication
                    </button>
                </div>
            `).join('');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            seedMockData();
            fetchPendingPrescriptions();
        });
    </script>
</body>
</html>
