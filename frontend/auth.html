<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Authentication | Holmes eRx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-teal-500/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-500/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="glass-panel w-full max-w-md mx-4 rounded-[40px] shadow-2xl overflow-hidden relative z-10 fade-in-up">
        
        <div class="pt-10 pb-6 px-10 text-center relative">
            <a href="index.html" class="absolute top-6 left-6 text-slate-400 hover:text-teal-400 transition-colors"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg border border-teal-500/30">
                <i class="fa-solid fa-network-wired text-teal-400 text-2xl"></i>
            </div>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Secure Access Terminal</p>
            <h1 class="text-3xl font-black text-white tracking-tighter">Grid Authentication</h1>
        </div>

        <div class="flex border-b border-slate-700 px-6">
            <button onclick="switchTab('login')" id="tabLogin" class="flex-1 pb-4 text-xs font-black uppercase tracking-widest text-teal-400 border-b-2 border-teal-500 transition-colors">Secure Login</button>
            <button onclick="switchTab('register')" id="tabRegister" class="flex-1 pb-4 text-xs font-black uppercase tracking-widest text-slate-500 hover:text-slate-300 border-b-2 border-transparent transition-colors">Register Profile</button>
        </div>

        <div class="p-8 lg:p-10">
            <div id="loginForm" class="space-y-5 block fade-in-up" style="animation-delay: 0.1s;">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Access Role</label>
                    <div class="flex items-center rounded-2xl px-4 py-3 transition-all relative">
                        <i class="fa-solid fa-user-shield text-slate-500 mr-3 absolute left-4 z-10"></i>
                        <select id="loginRole" class="w-full bg-transparent outline-none text-sm font-bold pl-8 appearance-none cursor-pointer">
                            <option value="patient">Citizen (Patient)</option>
                            <option value="doctor">Practitioner (Doctor)</option>
                            <option value="pharmacist">Authority (Pharmacist)</option>
                            <option value="pathologist">Pathology (Lab)</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Grid Identity (Email)</label>
                    <div class="flex items-center rounded-2xl px-4 py-3 transition-all relative">
                        <i class="fa-solid fa-envelope text-slate-500 mr-3 absolute left-4 z-10"></i>
                        <input type="email" id="loginEmail" class="w-full bg-transparent outline-none text-sm font-bold pl-8" placeholder="citizen@grid.com">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Security Passphrase</label>
                    <div class="flex items-center rounded-2xl px-4 py-3 transition-all relative">
                        <i class="fa-solid fa-lock text-slate-500 mr-3 absolute left-4 z-10"></i>
                        <input type="password" id="loginPassword" class="w-full bg-transparent outline-none text-sm font-bold pl-8" placeholder="••••••••">
                    </div>
                </div>
                <button onclick="login()" id="loginBtn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl mt-4 flex items-center justify-center gap-3 transition-all hover:border-teal-400">
                    <i class="fa-solid fa-right-to-bracket"></i> Authenticate
                </button>
            </div>

            <div id="registerForm" class="space-y-5 hidden fade-in-up">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Legal Full Name</label>
                    <input type="text" id="regName" class="w-full rounded-xl px-4 py-3 text-sm font-bold outline-none transition-colors" placeholder="John Doe">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Access Role</label>
                    <select id="regRole" class="w-full rounded-xl px-4 py-3 text-sm font-bold outline-none transition-colors cursor-pointer appearance-none">
                        <option value="patient">Citizen (Patient)</option>
                        <option value="doctor">Practitioner (Doctor)</option>
                        <option value="pharmacist">Authority (Pharmacist)</option>
                        <option value="pathologist">Pathology (Lab)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Email Address</label>
                    <input type="email" id="regEmail" class="w-full rounded-xl px-4 py-3 text-sm font-bold outline-none transition-colors" placeholder="name@domain.com">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Secure Passphrase</label>
                    <input type="password" id="regPassword" class="w-full rounded-xl px-4 py-3 text-sm font-bold outline-none transition-colors" placeholder="••••••••">
                </div>
                <button onclick="register()" id="registerBtn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl mt-4 flex items-center justify-center gap-3 transition-all hover:border-indigo-400">
                    <i class="fa-solid fa-fingerprint"></i> Initialize Identity
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[150] flex flex-col gap-3 pointer-events-none w-full max-w-[320px] px-4 lg:px-0"></div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';

        if (sessionStorage.getItem('eRx_Token')) {
            const role = parseJwt(sessionStorage.getItem('eRx_Token')).role;
            routeUser(role);
        }

        function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch(e) { return {}; } }

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'glass-panel border-rose-500' : 'glass-panel border-emerald-500';
            const iconColor = type === 'error' ? 'text-rose-500 bg-rose-500/10' : 'text-emerald-500 bg-emerald-500/10';
            const icon = type === 'error' ? 'fa-triangle-exclamation' : 'fa-check';
            
            toast.className = `flex items-center p-4 rounded-2xl shadow-xl border-l-4 transform transition-all duration-500 translate-y-10 opacity-0 ${colors}`;
            toast.innerHTML = `<div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${iconColor}"><i class="fa-solid ${icon}"></i></div><div class="ml-3"><p class="text-xs font-black text-white uppercase tracking-widest leading-tight">${type === 'error' ? 'System Alert' : 'Success'}</p><p class="text-xs font-bold text-slate-400 mt-0.5">${message}</p></div>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 500); }, 4000);
        }

        function switchTab(tab) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('tabLogin').className = "flex-1 pb-4 text-xs font-black uppercase tracking-widest text-slate-500 hover:text-slate-300 border-b-2 border-transparent transition-colors";
            document.getElementById('tabRegister').className = "flex-1 pb-4 text-xs font-black uppercase tracking-widest text-slate-500 hover:text-slate-300 border-b-2 border-transparent transition-colors";

            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('tabLogin').className = "flex-1 pb-4 text-xs font-black uppercase tracking-widest text-teal-400 border-b-2 border-teal-500 transition-colors";
            } else {
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('tabRegister').className = "flex-1 pb-4 text-xs font-black uppercase tracking-widest text-indigo-400 border-b-2 border-indigo-500 transition-colors";
            }
        }

        function routeUser(role) {
            if (role === 'doctor') window.location.href = 'dashboard.html';
            else if (role === 'pharmacist') window.location.href = 'pharmacist_portal.html';
            else if (role === 'pathologist') window.location.href = 'pathology_portal.html';
            else if (role === 'admin') window.location.href = 'admin_portal.html';
            else window.location.href = 'patient_portal.html'; 
        }

        async function login() {
            const role = document.getElementById('loginRole').value;
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!email || !password) return showToast("Credentials are required.");

            const btn = document.getElementById('loginBtn');
            const ogHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...'; btn.disabled = true;

            try {
                // Notice we pass the role here if your backend needs it, otherwise backend ignores it and just uses email
                const res = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role }) 
                });
                const data = await res.json();
                
                if (res.ok) {
                    sessionStorage.setItem('eRx_Token', data.token);
                    sessionStorage.setItem('eRx_UserName', data.user.name);
                    showToast("Access Granted.", "success");
                    // Route based on what the server returned, not what the user selected, for security
                    setTimeout(() => routeUser(data.user.role), 500); 
                } else showToast(data.msg, "error");
            } catch (err) { showToast("Grid Terminal Offline.", "error"); } finally { btn.innerHTML = ogHtml; btn.disabled = false; }
        }

        async function register() {
            const name = document.getElementById('regName').value.trim();
            const role = document.getElementById('regRole').value;
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            if (!name || !email || !password) return showToast("All fields are strictly required.");

            const btn = document.getElementById('registerBtn');
            const ogHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Initializing...'; btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast("Identity Successfully Initialized. Proceed to Login.", "success");
                    setTimeout(() => switchTab('login'), 1500);
                } else showToast(data.msg, "error");
            } catch (err) { showToast("Grid Initialization Failure.", "error"); } finally { btn.innerHTML = ogHtml; btn.disabled = false; }
        }
    </script>
</body>
</html>
