<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Secure Gateway</title>
    <style>
        :root { --primary: #0f766e; --bg-color: #f0fdfa; --card-bg: #ffffff; --border-color: #e5e7eb; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px;}
        .auth-container { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: bold; color: #64748b; transition: 0.3s; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #374151; font-size: 0.9rem;}
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        /* Dynamic Sections */
        .dynamic-fields { display: none; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px dashed #cbd5e1; margin-top: 15px; margin-bottom: 15px;}
        .dynamic-fields h3 { margin-top: 0; color: var(--primary); font-size: 1rem; border-bottom: 1px solid #cbd5e1; padding-bottom: 5px;}

        button { width: 100%; background-color: var(--primary); color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #115e59; }
        
        #loginForm { display: block; }
        #registerForm { display: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <h1>Holmes eRx</h1>
    <p class="subtitle">Ecosystem Authentication Gateway</p>

    <div class="tabs">
        <div class="tab active" id="tabLogin" onclick="switchTab('login')">Secure Login</div>
        <div class="tab" id="tabRegister" onclick="switchTab('register')">Register Profile</div>
    </div>

    <div id="loginForm">
        <div class="form-group">
            <label>Access Role</label>
            <select id="loginRole">
                <option value="patient">Patient (Citizen)</option>
                <option value="doctor">Doctor (Medical Officer)</option>
                <option value="pharmacist">Pharmacist (Dispensary)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Master Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password">
        </div>
        <button onclick="login()">Authenticate & Enter</button>
    </div>

    <div id="registerForm">
        <div class="form-group">
            <label>Register As</label>
            <select id="regRole" onchange="toggleDynamicFields()">
                <option value="patient">Patient (Citizen)</option>
                <option value="doctor">Doctor (Medical Professional)</option>
                <option value="pharmacist">Pharmacist (Dispensary Staff)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Full Legal Name</label>
            <input type="text" id="regName" placeholder="e.g. Toki Tahmid">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="regEmail" placeholder="Will be used for login">
        </div>
        <div class="form-group">
            <label>Create Password</label>
            <input type="password" id="regPassword" placeholder="Minimum 6 characters">
        </div>

        <div id="doctorFields" class="dynamic-fields">
            <h3>Medical Professional Credentials</h3>
            <div class="form-group">
                <label>Designation</label>
                <input type="text" id="docDesig" placeholder="e.g. Senior Consultant">
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" id="docDept" placeholder="e.g. Cardiology">
            </div>
            <div class="form-group">
                <label>Degrees (Comma separated)</label>
                <input type="text" id="docDegrees" placeholder="e.g. MBBS (DMC), FCPS">
            </div>
            <div class="form-group">
                <label>Specialties (Comma separated)</label>
                <input type="text" id="docSpecs" placeholder="e.g. Internal Medicine">
            </div>
            <div class="form-group">
                <label>Years of Experience</label>
                <input type="number" id="docExp" placeholder="e.g. 5">
            </div>
            <div class="form-group">
                <label>General Visiting Hours</label>
                <input type="text" id="docHours" placeholder="e.g. 5:00 PM - 9:00 PM">
            </div>
            <div class="form-group">
                <label>Professional Biography</label>
                <textarea id="docBio" rows="2" placeholder="Brief professional summary..."></textarea>
            </div>
        </div>

        <div id="pharmacistFields" class="dynamic-fields">
            <h3>Pharmacy Council Credentials</h3>
            <div class="form-group">
                <label>License Number</label>
                <input type="text" id="pharmLicense" placeholder="e.g. PC-88492">
            </div>
            <div class="form-group">
                <label>Degrees (Comma separated)</label>
                <input type="text" id="pharmDegrees" placeholder="e.g. B.Pharm, M.Pharm">
            </div>
            <div class="form-group">
                <label>Years of Experience</label>
                <input type="number" id="pharmExp" placeholder="e.g. 3">
            </div>
        </div>

        <button onclick="register()">Submit & Encrypt Profile</button>
    </div>
</div>

<script>
    // --- UI TOGGLES ---
    function switchTab(tab) {
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    }

    function toggleDynamicFields() {
        const role = document.getElementById("regRole").value;
        document.getElementById("doctorFields").style.display = role === 'doctor' ? 'block' : 'none';
        document.getElementById("pharmacistFields").style.display = role === 'pharmacist' ? 'block' : 'none';
    }

    // --- ENGINE LOGIC ---
    async function register() {
        const role = document.getElementById("regRole").value;
        const payload = {
            role: role,
            name: document.getElementById("regName").value.trim(),
            email: document.getElementById("regEmail").value.trim(),
            password: document.getElementById("regPassword").value
        };

        if (!payload.name || !payload.email || !payload.password) return alert("Base fields are required.");

        // Dynamically pack the Extra Credentials before sending to the Vault!
        if (role === 'doctor') {
            payload.designation = document.getElementById("docDesig").value.trim();
            payload.department = document.getElementById("docDept").value.trim();
            payload.experienceYears = document.getElementById("docExp").value.trim();
            payload.visitingHours = document.getElementById("docHours").value.trim();
            payload.biography = document.getElementById("docBio").value.trim();
            
            // Clean up arrays
            const degRaw = document.getElementById("docDegrees").value;
            payload.degrees = degRaw ? degRaw.split(',').map(s => s.trim()) : [];
            const specRaw = document.getElementById("docSpecs").value;
            payload.specialties = specRaw ? specRaw.split(',').map(s => s.trim()) : [];
        } 
        else if (role === 'pharmacist') {
            payload.licenseNumber = document.getElementById("pharmLicense").value.trim();
            payload.experienceYears = document.getElementById("pharmExp").value.trim();
            
            const degRaw = document.getElementById("pharmDegrees").value;
            payload.degrees = degRaw ? degRaw.split(',').map(s => s.trim()) : [];
        }

        try {
            const response = await fetch('https://holmes-erx-system.onrender.com/api/auth/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            
            if (response.ok) {
                alert(`✅ Profile Created Successfully! You may now log in.`);
                switchTab('login');
            } else alert(`❌ Error: ${data.error}`);
        } catch (error) { alert("Server offline or unreachable."); }
    }

    async function login() {
        const payload = {
            role: document.getElementById("loginRole").value,
            email: document.getElementById("loginEmail").value.trim(),
            password: document.getElementById("loginPassword").value
        };

        try {
            const response = await fetch('https://holmes-erx-system.onrender.com/api/auth/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            
            if (response.ok) {
                localStorage.setItem('eRx_Token', data.token);
                localStorage.setItem('eRx_Role', payload.role);
                localStorage.setItem('eRx_UserName', data.userData.name);
                localStorage.setItem('eRx_UserId', data.userData.doctorId || data.userData.patientId || data.userData.pharmacistId);
                
                if(payload.role === 'doctor') window.location.href = 'dashboard.html';
                else if(payload.role === 'patient') window.location.href = 'patient_app.html';
                else if(payload.role === 'pharmacist') window.location.href = 'pharmacist_portal.html';
            } else alert(`❌ Login Failed: ${data.error}`);
        } catch (error) { alert("Server offline or unreachable."); }
    }
</script>
</body>
</html>
