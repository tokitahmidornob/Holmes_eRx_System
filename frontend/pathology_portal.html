<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Terminal | Holmes eRx</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .cyan-gradient { background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%); }
        /* Visual feedback to prove it's active */
        .upload-zone { transition: all 0.3s ease; cursor: pointer; }
        .upload-zone:hover { border-color: #06b6d4; background: #f0fdfa; transform: scale(1.01); }
        .upload-zone:active { transform: scale(0.98); }
    </style>
</head>
<body class="antialiased text-slate-800">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 cyan-gradient rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-microscope"></i></div>
                <div><h1 class="text-xl font-black text-slate-900 tracking-tighter leading-none">Diagnostic <span class="text-cyan-600">Terminal</span></h1><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">National Health Grid</p></div>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right hidden md:block">
                    <p id="pathologistNameDisplay" class="text-sm font-black text-slate-900">Loading Agent...</p>
                    <p id="pathologistIdDisplay" class="text-[10px] font-bold text-cyan-600 uppercase tracking-widest font-mono">ID: PENDING</p>
                </div>
                <button onclick="logout()" class="bg-slate-100 hover:bg-rose-100 hover:text-rose-600 text-slate-600 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-colors"><i class="fa-solid fa-power-off mr-1"></i> Disconnect</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="bg-slate-900 rounded-[32px] p-8 shadow-2xl border border-slate-800 mb-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-white text-2xl font-black tracking-tighter"><i class="fa-solid fa-vial-circle-check text-cyan-500 mr-2"></i> Verify Lab Order</h2>
                <button onclick="startScanner()" class="bg-cyan-500/20 hover:bg-cyan-500 hover:text-white text-cyan-400 border border-cyan-500/30 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2"><i class="fa-solid fa-camera"></i> Scan Patient Token</button>
            </div>
            <div id="scannerContainer" class="hidden mb-6 bg-black rounded-2xl overflow-hidden border-2 border-cyan-500"><div id="reader"></div></div>
            <form onsubmit="event.preventDefault(); verifyPrescription();" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-1 block">Broadcast ID</label>
                    <input type="text" id="searchBroadcastId" required placeholder="HOLMES-RX-..." class="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-mono text-lg outline-none focus:border-cyan-500 uppercase">
                </div>
                <div>
                    <label class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-1 block">Secret OTP</label>
                    <input type="text" id="searchOtp" required placeholder="----" maxlength="4" class="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-mono text-center text-2xl tracking-[0.5em] outline-none focus:border-cyan-500">
                </div>
                <button type="submit" id="searchBtn" class="md:col-span-3 mt-2 w-full cyan-gradient text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg hover:-translate-y-1 transition-all">Authenticate Request</button>
            </form>
        </div>

        <div id="resultsViewer" class="hidden bg-white rounded-[32px] shadow-xl border border-slate-200 overflow-hidden">
            <div class="p-8 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <h3 id="resPatientName" class="text-2xl font-black text-slate-900 tracking-tighter">Patient Name</h3>
                <span class="px-4 py-2 rounded-full text-xs font-black uppercase bg-cyan-50 text-cyan-700">Authenticated</span>
            </div>
            <div class="p-8">
                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Required Investigations</h4>
                <div id="resTestList" class="flex flex-wrap gap-2 mb-8"></div>
                
                <div class="bg-cyan-50 border border-cyan-100 p-6 rounded-[24px]">
                    <h4 class="text-[10px] font-black text-cyan-700 uppercase tracking-widest mb-4">Upload Lab Results</h4>
                    <form id="labForm" onsubmit="event.preventDefault(); submitLabReport();" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="labTestName" required placeholder="Test Name" class="w-full p-3 rounded-xl border border-slate-200 font-bold text-sm outline-none">
                            <input type="text" id="labResult" placeholder="Result Value" class="w-full p-3 rounded-xl border border-slate-200 font-bold text-sm outline-none">
                            
                            <div class="md:col-span-2">
                                <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Formal PDF Report</label>
                                <div onclick="triggerFileInput()" class="upload-zone w-full h-40 border-2 border-dashed border-cyan-300 rounded-2xl flex flex-col items-center justify-center">
                                    <input type="file" id="labPdf" accept="application/pdf" onchange="updateFileName(this)" style="display: none;">
                                    <div id="pdfFileName" class="text-center">
                                        <i class="fa-solid fa-cloud-arrow-up text-cyan-500 text-4xl mb-2"></i>
                                        <p class="text-sm font-black text-slate-800">CLICK HERE TO UPLOAD PDF</p>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase">Selected Diagnostic Report</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" id="submitLabBtn" class="w-full bg-cyan-600 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg hover:bg-cyan-700 transition-all mt-2">Transmit to Grid</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[150] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = localStorage.getItem('eRx_Token');
        let currentRxId = null;

        // 🌟 THE FORCE TRIGGER FUNCTION
        function triggerFileInput() {
            console.log("Forcing File Explorer...");
            document.getElementById('labPdf').click();
        }

        function updateFileName(input) {
            const display = document.getElementById('pdfFileName');
            if (input.files.length > 0) {
                display.innerHTML = `<i class="fa-solid fa-file-circle-check text-emerald-500 text-4xl mb-2"></i><p class="text-emerald-600 font-black">PDF LOADED</p><p class="text-[10px] text-slate-500 font-bold">${input.files[0].name}</p>`;
                showToast("File attached successfully", "success");
            }
        }

        // --- Standard Logic Below ---
        function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch(e) { return {}; } }
        const decoded = parseJwt(token);
        if (!token || decoded.role !== 'pathologist') window.location.href = 'index.html';
        document.getElementById('pathologistNameDisplay').innerText = decoded.name || 'Diagnostic Agent';
        document.getElementById('pathologistIdDisplay').innerText = `ID: ${decoded.gridId || 'PENDING'}`;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'bg-rose-600 text-white' : 'bg-cyan-600 text-white';
            toast.className = `px-6 py-4 rounded-2xl shadow-xl transition-all duration-500 ${colors}`;
            toast.innerHTML = `<span class="text-[10px] font-black uppercase tracking-widest">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function verifyPrescription() {
            const bId = document.getElementById('searchBroadcastId').value.trim().toUpperCase();
            const otp = document.getElementById('searchOtp').value.trim();
            const res = await fetch(`${API_BASE_URL}/api/prescriptions/verify?broadcastId=${bId}&otp=${otp}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (res.ok) {
                currentRxId = data._id; document.getElementById('resPatientName').innerText = data.patientId ? data.patientId.name : 'Citizen Identified';
                document.getElementById('resTestList').innerHTML = data.investigations.map(t => `<span class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-xl text-xs font-black uppercase">${t}</span>`).join('');
                document.getElementById('resultsViewer').classList.remove('hidden');
                showToast("Access Granted", "success");
            } else showToast(data.msg, "error");
        }

        async function submitLabReport() {
            const fileInput = document.getElementById('labPdf');
            let pdfBase64 = null;
            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                pdfBase64 = await new Promise((resolve) => {
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }
            const payload = { prescriptionId: currentRxId, testName: document.getElementById('labTestName').value, resultValue: document.getElementById('labResult').value || 'See PDF', pdfReport: pdfBase64 };
            const res = await fetch(`${API_BASE_URL}/api/labs`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(payload) });
            if(res.ok) { showToast("Transmitted!", "success"); document.getElementById('labForm').reset(); }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
