<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Terminal | Holmes eRx</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
</head>
<body class="antialiased text-slate-800">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 cyan-gradient rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-microscope"></i></div>
                <div><h1 class="text-xl font-black text-slate-900 tracking-tighter leading-none">Diagnostic <span class="text-cyan-600">Terminal</span></h1><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">National Health Grid</p></div>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right hidden md:block">
                    <p id="pathologistNameDisplay" class="text-sm font-black text-slate-900">Loading Agent...</p>
                    <p id="pathologistIdDisplay" class="text-[10px] font-bold text-cyan-600 uppercase tracking-widest font-mono">ID: PENDING</p>
                </div>
                <button onclick="logout()" class="bg-slate-100 hover:bg-rose-100 hover:text-rose-600 text-slate-600 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-colors"><i class="fa-solid fa-power-off mr-1"></i> Disconnect</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="bg-slate-900 rounded-[32px] p-8 shadow-2xl border border-slate-800 relative overflow-hidden mb-8">
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#06b6d4 1px, transparent 1px); background-size: 30px 30px;"></div>
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-white text-2xl font-black tracking-tighter"><i class="fa-solid fa-vial-circle-check text-cyan-500 mr-2"></i> Verify Lab Order</h2>
                    <button onclick="startScanner()" class="bg-cyan-500/20 hover:bg-cyan-500 hover:text-white text-cyan-400 border border-cyan-500/30 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2 hover:-translate-y-1"><i class="fa-solid fa-camera"></i> Scan Patient Token</button>
                </div>

                <div id="scannerContainer" class="hidden mb-6 bg-black rounded-2xl overflow-hidden border-2 border-cyan-500 shadow-[0_0_15px_rgba(6,182,212,0.5)]">
                    <div id="reader" class="w-full"></div>
                    <button onclick="stopScanner()" class="w-full bg-slate-800 text-white py-2 text-xs font-black uppercase tracking-widest hover:bg-rose-600 transition-colors">Close Scanner</button>
                </div>
                
                <form id="searchForm" onsubmit="event.preventDefault(); verifyPrescription();" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black text-cyan-400 uppercase tracking-widest ml-2 mb-1 block">Broadcast ID</label>
                        <input type="text" id="searchBroadcastId" required placeholder="HOLMES-RX-..." class="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-mono text-lg outline-none focus:border-cyan-500 uppercase transition-colors">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-cyan-400 uppercase tracking-widest ml-2 mb-1 block">Secret OTP</label>
                        <input type="text" id="searchOtp" required placeholder="----" maxlength="4" class="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-mono text-center text-2xl tracking-[0.5em] outline-none focus:border-cyan-500 transition-colors">
                    </div>
                    <div class="md:col-span-3 mt-2">
                        <button type="submit" id="searchBtn" class="w-full cyan-gradient text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg hover:shadow-cyan-500/50 hover:-translate-y-1 transition-all">Authenticate Request</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="resultsViewer" class="hidden bg-white rounded-[32px] shadow-xl border border-slate-200 overflow-hidden transition-all duration-500">
            <div class="p-8 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <div><p class="text-[10px] font-black text-cyan-600 uppercase tracking-widest mb-1">Target Identified</p><h3 id="resPatientName" class="text-2xl font-black text-slate-900 tracking-tighter">Patient Name</h3></div>
                <div class="text-right"><span id="resStatusBadge" class="px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest border border-cyan-200 bg-cyan-50 text-cyan-700 shadow-sm">Authenticated</span></div>
            </div>
            <div class="p-8">
                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Required Investigations</h4>
                <div id="resTestList" class="flex flex-wrap gap-2 mb-8"></div>
                
                <div class="bg-cyan-50 border border-cyan-100 p-6 rounded-[24px]">
                    <h4 class="text-[10px] font-black text-cyan-700 uppercase tracking-widest mb-4"><i class="fa-solid fa-cloud-arrow-up mr-2"></i> Upload Lab Results to Grid</h4>
                    <form id="labForm" onsubmit="event.preventDefault(); submitLabReport();" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Test Name</label><input type="text" id="labTestName" required class="w-full p-3 rounded-xl border border-slate-200 font-bold text-sm focus:border-cyan-500 outline-none transition-colors"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Result Value (Optional)</label><input type="text" id="labResult" class="w-full p-3 rounded-xl border border-slate-200 font-bold text-sm focus:border-cyan-500 outline-none transition-colors" placeholder="e.g. 120"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Unit (Optional)</label><input type="text" id="labUnit" class="w-full p-3 rounded-xl border border-slate-200 font-bold text-sm focus:border-cyan-500 outline-none transition-colors" placeholder="e.g. mg/dL"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Reference Range (Optional)</label><input type="text" id="labRef" class="w-full p-3 rounded-xl border border-slate-200 font-bold text-sm focus:border-cyan-500 outline-none transition-colors" placeholder="e.g. 70-140"></div>
                            
                            <div class="md:col-span-2 relative mt-2">
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1 block mb-2">Attach Formal PDF Report</label>
                                <div class="upload-zone relative w-full h-40 border-2 border-dashed border-cyan-300 rounded-2xl flex flex-col items-center justify-center transition-all bg-white overflow-hidden shadow-sm">
                                    <input type="file" id="labPdf" accept="application/pdf" onchange="updateFileName(this)" 
                                           class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-50">
                                    
                                    <div id="pdfFileName" class="text-center z-10 pointer-events-none">
                                        <i class="fa-solid fa-file-pdf text-rose-400 text-4xl mb-3"></i>
                                        <div class="space-y-1">
                                            <p class="text-sm font-black text-slate-800">Tap to Upload Diagnostic PDF</p>
                                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Supports PDF (Max 2MB)</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" id="submitLabBtn" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg hover:shadow-cyan-500/40 hover:-translate-y-1 transition-all duration-300 mt-2">Transmit Report to Doctor</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[150] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = localStorage.getItem('eRx_Token');
        let currentRxId = null; let html5QrcodeScanner = null; 

        function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch(e) { return {}; } }
        const decoded = parseJwt(token);
        if (!token || decoded.role !== 'pathologist') window.location.href = 'index.html';

        document.getElementById('pathologistNameDisplay').innerText = decoded.name || 'Diagnostic Agent';
        document.getElementById('pathologistIdDisplay').innerText = `ID: ${decoded.gridId || 'PENDING'}`;
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        // 🎨 THE TOAST ENGINE PRESERVED
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'bg-rose-600 text-white shadow-rose-500/30' : 'bg-cyan-600 text-white shadow-cyan-500/30';
            const icon = type === 'error' ? 'fa-triangle-exclamation' : 'fa-check-circle';
            
            toast.className = `flex items-center gap-3 px-6 py-4 rounded-2xl shadow-xl transform transition-all duration-500 translate-y-10 opacity-0 ${colors}`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i><span class="text-[10px] font-black uppercase tracking-widest">${message}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => { toast.classList.remove('translate-y-10', 'opacity-0'); });
            
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // 📄 PDF FILE NAME DISPLAY (Pointer-events-none Fix)
        function updateFileName(input) {
            const display = document.getElementById('pdfFileName');
            if (input.files.length > 0) {
                const file = input.files[0];
                if (file.size > 2 * 1024 * 1024) { 
                    showToast("FILE TOO LARGE: Max 2MB allowed", "error");
                    input.value = '';
                    return;
                }
                display.innerHTML = `<i class="fa-solid fa-file-circle-check text-emerald-500 text-4xl mb-2"></i><div class="space-y-1"><p class="text-emerald-600 font-black">READY FOR GRID TRANSMISSION</p><p class="text-[10px] text-slate-400 font-bold uppercase truncate max-w-[250px] mx-auto">${file.name}</p></div>`;
                showToast("PDF verified for broadcast", "success");
            } else {
                display.innerHTML = `<i class="fa-solid fa-file-pdf text-rose-400 text-4xl mb-3"></i><div class="space-y-1"><p class="text-sm font-black text-slate-800">Tap to Upload Diagnostic PDF</p><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Supports PDF (Max 2MB)</p></div>`;
            }
        }

        function startScanner() {
            document.getElementById('scannerContainer').classList.remove('hidden');
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    try {
                        const data = JSON.parse(decodedText);
                        document.getElementById('searchBroadcastId').value = data.bId; document.getElementById('searchOtp').value = data.otp;
                        stopScanner(); verifyPrescription();
                    } catch(e) {}
                }, (errorMessage) => {}
            ).catch(err => showToast("Grid Link Failure.", "error"));
        }

        function stopScanner() {
            if (html5QrcodeScanner) { html5QrcodeScanner.stop().then(() => { document.getElementById('scannerContainer').classList.add('hidden'); }).catch(e => {}); } 
            else { document.getElementById('scannerContainer').classList.add('hidden'); }
        }

        async function verifyPrescription() {
            const btn = document.getElementById('searchBtn'); const bId = document.getElementById('searchBroadcastId').value.trim().toUpperCase(); const otp = document.getElementById('searchOtp').value.trim(); const viewer = document.getElementById('resultsViewer');
            if(!bId || !otp) return showToast("Credentials Required", "error");
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Syncing...'; viewer.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE_URL}/api/prescriptions/verify?broadcastId=${bId}&otp=${otp}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (res.ok) {
                    currentRxId = data._id; document.getElementById('resPatientName').innerText = data.patientId ? data.patientId.name : 'Unknown Citizen';
                    if(data.investigations && data.investigations.length > 0) { document.getElementById('resTestList').innerHTML = data.investigations.map(t => `<span class="bg-indigo-50 border border-indigo-100 text-indigo-700 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm">${t}</span>`).join(''); } 
                    else { document.getElementById('resTestList').innerHTML = '<span class="text-slate-400 font-bold text-sm px-2">No tests listed in broadcast.</span>'; }
                    viewer.classList.remove('hidden');
                    showToast("Clearance Granted", "success");
                } else showToast(data.msg, "error");
            } catch(err) { showToast("Network Sync Failed", "error"); } finally { btn.innerHTML = 'Authenticate Request'; }
        }

        async function submitLabReport() {
            if(!currentRxId) return;
            const btn = document.getElementById('submitLabBtn'); 
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Transmitting...';
            
            const fileInput = document.getElementById('labPdf');
            let pdfBase64 = null;
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                pdfBase64 = await new Promise((resolve) => {
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const payload = { 
                prescriptionId: currentRxId, 
                testName: document.getElementById('labTestName').value, 
                resultValue: document.getElementById('labResult').value || 'Attached in PDF', 
                unit: document.getElementById('labUnit').value, 
                referenceRange: document.getElementById('labRef').value,
                pdfReport: pdfBase64 
            };

            try {
                const res = await fetch(`${API_BASE_URL}/api/labs`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(payload) });
                if(res.ok) { 
                    showToast("Diagnostic Broadcast Successful!", "success"); 
                    document.getElementById('labForm').reset(); 
                    document.getElementById('pdfFileName').innerHTML = `<i class="fa-solid fa-file-pdf text-rose-400 text-4xl mb-3"></i><div class="space-y-1"><p class="text-sm font-black text-slate-800">Tap to Upload Diagnostic PDF</p><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Supports PDF (Max 2MB)</p></div>`;
                } else { 
                    const data = await res.json(); 
                    showToast(data.msg, "error"); 
                }
            } catch(err) { showToast("Grid Link Failure", "error"); } finally { btn.innerHTML = 'Transmit Report to Doctor'; }
        }

        // 📱 PWA SERVICE WORKER REGISTRATION PRESERVED
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('PWA Engine Active'))
                    .catch(err => console.log('PWA Engine Failed', err));
            });
        }
    </script>
</body>
</html>
