<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Master Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-900 tracking-tight">Holmes eRx</h1>
            <p class="text-sm text-gray-500 mt-1 font-semibold tracking-wide">National Medical Archive Gateway</p>
        </div>

        <div id="errorBanner" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6 text-center text-sm font-bold shadow-sm"></div>
        <div id="successBanner" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6 text-center text-sm font-bold shadow-sm"></div>

        <div class="flex space-x-2 mb-6 bg-gray-100 p-1 rounded-lg">
            <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2 text-sm font-bold rounded-md bg-white shadow text-blue-900 transition-all">Sign In</button>
            <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-2 text-sm font-bold rounded-md text-gray-500 hover:text-gray-700 transition-all">Create Account</button>
        </div>

        <form id="loginForm" class="space-y-4" onsubmit="event.preventDefault(); loginUser();">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Select Role</label>
                <select id="loginRole" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white font-medium text-gray-700">
                    <option value="doctor">Medical Professional (Doctor)</option>
                    <option value="pharmacist">Dispensary (Pharmacist)</option>
                    <option value="patient">Citizen (Patient)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Email Address</label>
                <input type="email" id="loginEmail" placeholder="name@example.com" required class="w-full px-4 py-3 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required class="w-full px-4 py-3 border border-gray-300 rounded-lg">
            </div>
            <button type="submit" id="loginBtn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg">Secure Login</button>
        </form>

        <form id="registerForm" class="space-y-4 hidden" onsubmit="event.preventDefault(); registerUser();">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Registering As</label>
                <select id="regRole" class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white font-medium text-gray-700">
                    <option value="doctor">Medical Professional (Doctor)</option>
                    <option value="pharmacist">Dispensary (Pharmacist)</option>
                    <option value="patient">Citizen (Patient)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Full Legal Name</label>
                <input type="text" id="regName" placeholder="John Doe" required class="w-full px-4 py-3 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Email Address</label>
                <input type="email" id="regEmail" placeholder="name@example.com" required class="w-full px-4 py-3 border border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Create Password</label>
                <input type="password" id="regPassword" placeholder="••••••••" required class="w-full px-4 py-3 border border-gray-300 rounded-lg">
            </div>
            <button type="submit" id="regBtn" class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg">Register New ID</button>
        </form>
    </div>

    <script>
        // --- 🌉 THE HYBRID BRIDGE ---
        // This connects your frontend (Vercel) to your backend (Render)
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : 'https://holmes-erx-system.onrender.com';

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            
            if (tab === 'login') {
                loginForm.classList.remove('hidden'); registerForm.classList.add('hidden');
                tabLogin.classList.add('bg-white', 'shadow', 'text-blue-900');
                tabRegister.classList.remove('bg-white', 'shadow', 'text-blue-900');
            } else {
                loginForm.classList.add('hidden'); registerForm.classList.remove('hidden');
                tabRegister.classList.add('bg-white', 'shadow', 'text-blue-900');
                tabLogin.classList.remove('bg-white', 'shadow', 'text-blue-900');
            }
        }

        function showError(msg) {
            const banner = document.getElementById('errorBanner');
            banner.innerText = msg; banner.classList.remove('hidden');
        }

        async function registerUser() {
            const role = document.getElementById('regRole').value;
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const btn = document.getElementById('regBtn');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Registering...';
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, name, email, password })
                });
                const data = await response.json();
                if (data.success) {
                    alert("Registration successful!"); switchTab('login');
                } else { showError(data.error); }
            } catch (err) { showError("National Grid engine is warming up. Please wait 30 seconds."); }
            finally { btn.innerHTML = 'Register New ID'; }
        }

        async function loginUser() {
            const role = document.getElementById('loginRole').value;
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Connecting...';
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, email, password })
                });
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('holmesToken', data.token);
                    localStorage.setItem('holmesUser', JSON.stringify(data.userData));
                    
                    // Route to local files (since they are in the same folder on Vercel)
                    const userRole = data.userData.role;
                    if (userRole.includes('doctor')) window.location.href = 'dashboard.html';
                    else if (userRole.includes('pharmacist')) window.location.href = 'pharmacist_portal.html';
                    else window.location.href = 'patient_portal.html';
                } else { showError(data.error); }
            } catch (err) { showError("National Grid engine is warming up. Please wait 30 seconds."); }
            finally { btn.innerHTML = 'Secure Login'; }
        }
    </script>
</body>
</html>
