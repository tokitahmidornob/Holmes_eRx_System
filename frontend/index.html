<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Authentication | Holmes eRx</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#14b8a6">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="antialiased text-slate-800 min-h-screen flex items-center justify-center p-4">

    <main class="glass-panel w-full max-w-[500px] rounded-[40px] p-8 md:p-12 shadow-2xl relative overflow-hidden hover-lift">
        <div class="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-teal-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="w-16 h-16 bg-slate-900 text-teal-400 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-teal-500/20">
                <i class="fa-solid fa-network-wired text-2xl"></i>
            </div>
            <p class="text-[10px] font-black text-teal-600 uppercase tracking-[0.2em] mb-1">Secure Access Terminal</p>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter">Grid Authentication</h1>
        </div>

        <div class="flex border-b border-slate-200 mb-8 relative z-10">
            <button onclick="switchTab('login')" id="tabLogin" class="flex-1 pb-4 text-xs font-black uppercase tracking-widest border-b-2 border-teal-500 text-teal-600 transition-colors">Secure Login</button>
            <button onclick="switchTab('register')" id="tabRegister" class="flex-1 pb-4 text-xs font-black uppercase tracking-widest border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition-colors">Register Profile</button>
        </div>

        <div id="alertBox" class="hidden mb-6 p-4 rounded-xl text-xs font-bold text-center transition-all relative z-10"></div>

        <form id="loginForm" class="space-y-5 relative z-10" onsubmit="event.preventDefault(); handleAuth('login');">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Access Role</label>
                <select id="loginRole" class="premium-input w-full p-4 rounded-2xl text-sm font-bold text-slate-700 outline-none">
                    <option value="doctor">Doctor (Prescriber)</option>
                    <option value="pathologist">Pathologist (Diagnostic)</option>
                    <option value="pharmacist">Pharmacist (Dispensary)</option>
                    <option value="patient">Patient (Citizen)</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Email Address</label>
                <input type="email" id="loginEmail" required placeholder="name@grid.com" class="premium-input w-full p-4 rounded-2xl text-sm font-bold outline-none">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Security Passphrase</label>
                <input type="password" id="loginPassword" required placeholder="••••••••" class="premium-input w-full p-4 rounded-2xl text-sm font-bold outline-none">
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-slate-900 hover:bg-teal-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:-translate-y-1 transition-all mt-4 flex items-center justify-center gap-3">
                <i class="fa-solid fa-right-to-bracket"></i> Authenticate
            </button>
        </form>

        <form id="registerForm" class="hidden space-y-5 relative z-10" onsubmit="event.preventDefault(); handleAuth('register');">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Full Legal Name</label>
                <input type="text" id="regName" required placeholder="Sherlock Holmes" class="premium-input w-full p-4 rounded-2xl text-sm font-bold outline-none">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Designated Role</label>
                <select id="regRole" class="premium-input w-full p-4 rounded-2xl text-sm font-bold text-slate-700 outline-none">
                    <option value="doctor">Doctor (Prescriber)</option>
                    <option value="pathologist">Pathologist (Diagnostic)</option>
                    <option value="pharmacist">Pharmacist (Dispensary)</option>
                    <option value="patient">Patient (Citizen)</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Email Address</label>
                <input type="email" id="regEmail" required placeholder="name@grid.com" class="premium-input w-full p-4 rounded-2xl text-sm font-bold outline-none">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Create Passphrase</label>
                <input type="password" id="regPassword" required placeholder="••••••••" class="premium-input w-full p-4 rounded-2xl text-sm font-bold outline-none">
            </div>
            <button type="submit" id="registerBtn" class="w-full bg-slate-900 hover:bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:-translate-y-1 transition-all mt-4 flex items-center justify-center gap-3">
                <i class="fa-solid fa-user-plus"></i> Initialize Identity
            </button>
        </form>
    </main>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';

        // Check if user is already logged in
        if (localStorage.getItem('eRx_Token')) {
            const role = localStorage.getItem('eRx_UserRole');
            const roleMap = { 'doctor': 'dashboard.html', 'patient': 'patient_dashboard.html', 'pharmacist': 'pharmacy_dashboard.html', 'pathologist': 'pathology_portal.html' };
            window.location.href = roleMap[role] || 'index.html';
        }

        function switchTab(tab) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('tabLogin').classList.replace('border-teal-500', 'border-transparent');
            document.getElementById('tabLogin').classList.replace('text-teal-600', 'text-slate-400');
            document.getElementById('tabRegister').classList.replace('border-teal-500', 'border-transparent');
            document.getElementById('tabRegister').classList.replace('text-teal-600', 'text-slate-400');

            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('tabLogin').classList.replace('border-transparent', 'border-teal-500');
                document.getElementById('tabLogin').classList.replace('text-slate-400', 'text-teal-600');
            } else {
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('tabRegister').classList.replace('border-transparent', 'border-teal-500');
                document.getElementById('tabRegister').classList.replace('text-slate-400', 'text-teal-600');
            }
        }

        function showAlert(msg, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-check'} mr-2"></i> ${msg}`;
            alertBox.className = `mb-6 p-4 rounded-2xl text-xs font-black uppercase tracking-widest text-center transition-all ${type === 'error' ? 'bg-rose-100 text-rose-600 border border-rose-200' : 'bg-teal-100 text-teal-600 border border-teal-200'}`;
            alertBox.classList.remove('hidden');
        }

        async function handleAuth(action) {
            const btn = document.getElementById(action === 'login' ? 'loginBtn' : 'registerBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            document.getElementById('alertBox').classList.add('hidden');

            const endpoint = action === 'login' ? '/api/auth/login' : '/api/auth/register';
            const payload = action === 'login' ? {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value,
                role: document.getElementById('loginRole').value
            } : {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                role: document.getElementById('regRole').value
            };

            try {
                const res = await fetch(API_BASE_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (res.ok) {
                    if (action === 'register') {
                        showAlert('Identity Initialized. Proceed to Login.', 'success');
                        setTimeout(() => switchTab('login'), 2000);
                    } else {
                        localStorage.setItem('eRx_Token', data.token);
                        localStorage.setItem('eRx_UserId', data.user.id);
                        localStorage.setItem('eRx_UserName', data.user.name);
                        localStorage.setItem('eRx_UserRole', data.user.role);
                        
                        const roleMap = {
                            'doctor': 'dashboard.html',
                            'patient': 'patient_dashboard.html',
                            'pharmacist': 'pharmacy_dashboard.html',
                            'pathologist': 'pathology_portal.html'
                        };
                        window.location.href = roleMap[data.user.role] || 'index.html';
                    }
                } else {
                    showAlert(data.msg || 'Authentication Failed', 'error');
                }
            } catch (err) {
                showAlert('Grid Connection Failure. Verify Network.', 'error');
            } finally {
                btn.innerHTML = originalText;
            }
        }

        // PWA Engine Integration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(err => console.log('PWA Failed', err)); });
        }
    </script>
</body>
</html>
