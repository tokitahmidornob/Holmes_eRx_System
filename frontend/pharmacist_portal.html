<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Terminal | Holmes eRx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* High-Tech Input Focus */
        .otp-input:focus { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); border-color: #10b981; }
        .grid-input:focus { box-shadow: 0 0 15px rgba(20, 184, 166, 0.3); border-color: #14b8a6; }
    </style>
</head>
<body class="antialiased text-slate-800 bg-slate-50 flex h-screen overflow-hidden">

    <aside class="hidden lg:flex flex-col w-72 bg-slate-900 text-white transition-transform duration-300 z-50 shadow-2xl shrink-0 h-full">
        <div class="h-24 flex items-center justify-start px-8 border-b border-slate-800">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/30 shrink-0"><i class="fa-solid fa-mortar-pestle"></i></div>
            <h1 class="ml-4 text-xl font-black tracking-tighter">Holmes <span class="text-emerald-400">Rx</span></h1>
        </div>
        
        <nav class="flex-1 py-8 flex flex-col gap-2 px-4">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest px-4 mb-2">Pharmacy Terminal</p>
            <button class="nav-btn active flex items-center p-4 rounded-2xl bg-emerald-500/10 text-emerald-400 transition-all">
                <i class="fa-solid fa-unlock-keyhole text-xl mr-4 w-6 text-center"></i><span class="font-bold text-sm">Decryption Engine</span>
            </button>
            <button onclick="window.location.href='profile.html'" class="nav-btn flex items-center p-4 rounded-2xl hover:bg-slate-800 text-slate-400 hover:text-white transition-all">
                <i class="fa-solid fa-id-card-clip text-xl mr-4 w-6 text-center"></i><span class="font-bold text-sm">Identity Matrix</span>
            </button>
        </nav>
        
        <div class="p-4 border-t border-slate-800 bg-slate-900">
            <div class="mb-4 px-4 text-center">
                <p id="pharmNameDisplay" class="font-black text-sm text-white truncate">Loading...</p>
                <div class="bg-slate-800/80 border border-slate-700 rounded-lg mt-2 py-1"><p id="pharmGridIdDisplay" class="text-[10px] font-mono font-bold text-emerald-400 tracking-wider">ID: PENDING</p></div>
            </div>
            <button onclick="logout()" class="w-full flex items-center justify-center p-4 rounded-2xl bg-rose-500/10 hover:bg-rose-500 text-rose-400 hover:text-white transition-all group">
                <i class="fa-solid fa-power-off text-xl mr-3 group-hover:rotate-180 transition-transform duration-500"></i><span class="font-bold text-sm uppercase tracking-widest">Disconnect</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto relative w-full custom-scrollbar">
        <header class="h-20 lg:h-24 glass-panel border-b border-slate-200 flex items-center justify-between px-6 lg:px-10 shrink-0 sticky top-0 z-40">
            <div>
                <h2 class="text-xl lg:text-2xl font-black text-slate-900 tracking-tighter">Decryption Terminal</h2>
                <p class="text-[9px] lg:text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 flex items-center"><i class="fa-solid fa-lock text-emerald-500 mr-1.5"></i> Secure Pharmacy Node</p>
            </div>
        </header>

        <div class="p-4 lg:p-10 max-w-5xl mx-auto w-full space-y-8">
            
            <div class="glass-panel rounded-[32px] p-8 lg:p-12 shadow-sm text-center fade-in-up" id="inputSection">
                <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl shadow-inner border border-emerald-100"><i class="fa-solid fa-barcode"></i></div>
                <h3 class="text-2xl font-black text-slate-900 tracking-tighter mb-2">Awaiting Encrypted Payload</h3>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-10">Scan QR or enter Grid Broadcast ID and Patient OTP</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
                    <div class="text-left">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2 mb-2 block">Grid Broadcast ID</label>
                        <input type="text" id="rxBroadcastId" placeholder="e.g. RX-2026-ABC12" class="w-full p-5 rounded-2xl border-2 border-slate-200 text-center font-mono font-bold text-lg uppercase bg-slate-50 outline-none grid-input transition-all" autocomplete="off">
                    </div>
                    <div class="text-left">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2 mb-2 block">6-Digit Patient OTP</label>
                        <input type="text" id="rxOtp" placeholder="000000" maxlength="6" class="w-full p-5 rounded-2xl border-2 border-slate-200 text-center font-mono font-black text-2xl tracking-[0.2em] bg-slate-50 outline-none otp-input transition-all" autocomplete="off">
                    </div>
                </div>

                <button onclick="decryptPayload()" id="decryptBtn" class="mt-10 w-full max-w-md mx-auto bg-slate-900 hover:bg-emerald-600 text-white px-8 py-5 rounded-[20px] font-black text-sm uppercase tracking-widest shadow-xl shadow-slate-900/20 hover:-translate-y-1 transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-unlock-keyhole"></i> Decrypt Grid Payload
                </button>
            </div>

            <div id="decryptedDossier" class="hidden fade-in-up">
                
                <div id="statusBanner" class="bg-emerald-50 border border-emerald-200 p-6 rounded-[24px] mb-6 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-emerald-500 text-white rounded-full flex items-center justify-center text-xl shadow-lg shadow-emerald-500/30"><i class="fa-solid fa-check"></i></div>
                        <div><h3 class="font-black text-emerald-900 text-lg tracking-tighter">Payload Decrypted Successfully</h3><p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mt-1">Status: <span id="rxStatusDisplay" class="font-black bg-emerald-200 px-2 py-0.5 rounded ml-1 text-emerald-900">ACTIVE</span></p></div>
                    </div>
                    <button onclick="resetTerminal()" class="text-xs font-black uppercase tracking-widest text-emerald-700 bg-white hover:bg-emerald-100 px-5 py-2.5 rounded-full transition-colors border border-emerald-200 shadow-sm"><i class="fa-solid fa-rotate-left mr-2"></i>Reset Engine</button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-1 space-y-6">
                        <div class="glass-panel p-6 rounded-[24px] shadow-sm">
                            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center"><i class="fa-solid fa-user-injured mr-2 text-slate-300"></i> Verified Patient</h4>
                            <p id="patName" class="font-black text-lg text-slate-800"></p>
                            <p id="patPhone" class="text-xs font-bold text-slate-500 mt-1"></p>
                        </div>
                        <div class="glass-panel p-6 rounded-[24px] shadow-sm border-t-4 border-t-teal-500">
                            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center"><i class="fa-solid fa-user-doctor mr-2 text-slate-300"></i> Prescribing Authority</h4>
                            <p id="docName" class="font-black text-base text-slate-800"></p>
                            <p id="rxDate" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-2"></p>
                        </div>
                    </div>

                    <div class="lg:col-span-2 glass-panel p-8 rounded-[32px] shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-slate-50 rounded-bl-[100px] -z-10 opacity-50"></div>
                        <h4 class="text-xs font-black text-slate-900 uppercase tracking-widest mb-6 flex items-center"><i class="fa-solid fa-pills mr-2 text-emerald-500 text-lg"></i> Authorized Medications</h4>
                        <div id="medListDisplay" class="space-y-3 mb-8"></div>
                        
                        <div class="border-t border-slate-100 pt-8 mt-auto">
                            <button onclick="dispenseMedications()" id="dispenseBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-5 rounded-[20px] font-black text-sm uppercase tracking-widest shadow-xl shadow-emerald-500/20 hover:-translate-y-1 transition-all flex justify-center items-center gap-3">
                                <i class="fa-solid fa-bag-medical text-lg"></i> Complete Transaction & Mark Dispensed
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 lg:bottom-10 lg:right-10 z-[150] flex flex-col gap-3 pointer-events-none w-full max-w-[320px] px-4 lg:px-0"></div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = sessionStorage.getItem('eRx_Token');
        const userName = sessionStorage.getItem('eRx_UserName');
        let currentRxId = null;

        function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch(e) { return {}; } }
        const decoded = parseJwt(token);
        
        // Strict Role Check for Pharmacy Terminal
        if (!token || decoded.role !== 'pharmacist') {
            alert("Unauthorized. Pharmacy Clearance Required.");
            window.location.href = 'index.html';
        }

        document.getElementById('pharmNameDisplay').innerText = `Pharm. ${userName}`;
        document.getElementById('pharmGridIdDisplay').innerText = decoded.uuid || 'ID-PENDING';

        // 🎨 TOAST ENGINE
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'bg-white border-rose-500' : 'bg-white border-emerald-500';
            const iconColor = type === 'error' ? 'text-rose-500 bg-rose-50' : 'text-emerald-500 bg-emerald-50';
            const icon = type === 'error' ? 'fa-triangle-exclamation' : 'fa-check';
            
            toast.className = `flex items-center p-4 rounded-2xl shadow-xl border-l-4 transform transition-all duration-500 translate-y-10 opacity-0 ${colors}`;
            toast.innerHTML = `<div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${iconColor}"><i class="fa-solid ${icon}"></i></div><div class="ml-3"><p class="text-xs font-black text-slate-800 uppercase tracking-widest leading-tight">${type === 'error' ? 'System Alert' : 'Success'}</p><p class="text-xs font-bold text-slate-500 mt-0.5">${message}</p></div>`;
            container.appendChild(toast);
            requestAnimationFrame(() => { toast.classList.remove('translate-y-10', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 500); }, 4000);
        }

        // 🔓 DECRYPT FUNCTION
        async function decryptPayload() {
            const bId = document.getElementById('rxBroadcastId').value.trim();
            const otp = document.getElementById('rxOtp').value.trim();
            
            if(!bId || !otp) return showToast("Both Broadcast ID and OTP are required.");

            const btn = document.getElementById('decryptBtn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Decrypting Grid...'; btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/pharmacy/decrypt`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ broadcastId: bId, otp: otp })
                });
                const data = await res.json();
                
                if(res.ok) {
                    currentRxId = data._id;
                    renderDossier(data);
                } else { showToast(data.msg, "error"); }
            } catch(e) { showToast("Grid Network Failure", "error"); } finally { btn.innerHTML = originalHtml; btn.disabled = false; }
        }

        function renderDossier(data) {
            document.getElementById('inputSection').classList.add('hidden');
            const dossier = document.getElementById('decryptedDossier');
            dossier.classList.remove('hidden');
            
            // Populate Data
            document.getElementById('patName').innerText = data.patientName;
            document.getElementById('patPhone').innerText = `Ph: ${data.patientPhone}`;
            document.getElementById('docName').innerText = `Dr. ${data.doctorName}`;
            document.getElementById('rxDate').innerText = `Issued: ${new Date(data.issuedAt).toLocaleString()}`;
            
            // Status Logic
            const statusBadge = document.getElementById('rxStatusDisplay');
            const dispenseBtn = document.getElementById('dispenseBtn');
            if (data.status === 'Dispensed') {
                statusBadge.innerText = 'ALREADY DISPENSED';
                statusBadge.className = 'font-black bg-rose-200 px-2 py-0.5 rounded ml-1 text-rose-900';
                dispenseBtn.disabled = true;
                dispenseBtn.className = 'w-full bg-slate-300 text-slate-500 py-5 rounded-[20px] font-black text-sm uppercase tracking-widest shadow-none flex justify-center items-center gap-3 cursor-not-allowed';
                dispenseBtn.innerHTML = '<i class="fa-solid fa-ban text-lg"></i> Payload Locked (Already Dispensed)';
            } else {
                statusBadge.innerText = 'ACTIVE';
                statusBadge.className = 'font-black bg-emerald-200 px-2 py-0.5 rounded ml-1 text-emerald-900';
                dispenseBtn.disabled = false;
                dispenseBtn.className = 'w-full bg-emerald-500 hover:bg-emerald-600 text-white py-5 rounded-[20px] font-black text-sm uppercase tracking-widest shadow-xl shadow-emerald-500/20 hover:-translate-y-1 transition-all flex justify-center items-center gap-3';
                dispenseBtn.innerHTML = '<i class="fa-solid fa-bag-medical text-lg"></i> Complete Transaction & Mark Dispensed';
            }

            // Render Meds
            document.getElementById('medListDisplay').innerHTML = data.medications.map((m, i) => `
                <div class="bg-slate-50 border border-slate-100 p-4 rounded-xl flex justify-between items-center fade-in-up" style="animation-delay: ${i * 0.1}s">
                    <div><p class="font-black text-slate-800 text-sm lg:text-base">${m.brandName}</p><p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">${m.dosage} &bull; ${m.timing}</p></div>
                    <div class="bg-white border border-slate-200 px-4 py-2 rounded-lg shadow-sm"><p class="text-[10px] font-black text-teal-700 uppercase tracking-widest">${m.duration} Days Supply</p></div>
                </div>
            `).join('');
        }

        // ✅ MARK DISPENSED
        async function dispenseMedications() {
            if(!currentRxId) return;
            const btn = document.getElementById('dispenseBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Securing Grid Record...'; btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/pharmacy/dispense/${currentRxId}`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if(res.ok) {
                    showToast("Transaction Complete. Chain of Custody Severed.", "success");
                    setTimeout(() => resetTerminal(), 2500);
                } else { showToast(data.msg, "error"); btn.innerHTML = 'Complete Transaction'; btn.disabled = false; }
            } catch(e) { showToast("Grid Update Failure", "error"); btn.innerHTML = 'Complete Transaction'; btn.disabled = false; }
        }

        function resetTerminal() {
            currentRxId = null;
            document.getElementById('rxBroadcastId').value = ''; document.getElementById('rxOtp').value = '';
            document.getElementById('decryptedDossier').classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
        }

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
