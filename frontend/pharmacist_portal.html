<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispensary Terminal | Holmes eRx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#14b8a6">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    </style>
</head>
<body class="antialiased text-slate-800">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 emerald-gradient rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-pills"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 tracking-tighter leading-none">Dispensary <span class="text-emerald-600">Terminal</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">National Health Grid</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right hidden md:block">
                    <p id="pharmacistNameDisplay" class="text-sm font-black text-slate-900">Loading Agent...</p>
                    <p id="pharmacistIdDisplay" class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest font-mono">ID: PENDING</p>
                </div>
                <button onclick="logout()" class="bg-slate-100 hover:bg-rose-100 hover:text-rose-600 text-slate-600 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-colors">
                    <i class="fa-solid fa-power-off mr-1"></i> Disconnect
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        
        <div class="bg-slate-900 rounded-[32px] p-8 shadow-2xl border border-slate-800 relative overflow-hidden mb-8">
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#10b981 1px, transparent 1px); background-size: 30px 30px;"></div>
            
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-white text-2xl font-black tracking-tighter"><i class="fa-solid fa-shield-halved text-emerald-500 mr-2"></i> Verify Grid Prescription</h2>
                    <button onclick="startScanner()" class="bg-emerald-500/20 hover:bg-emerald-500 hover:text-white text-emerald-400 border border-emerald-500/30 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2">
                        <i class="fa-solid fa-camera"></i> Scan Patient Token
                    </button>
                </div>

                <div id="scannerContainer" class="hidden mb-6 bg-black rounded-2xl overflow-hidden border-2 border-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]">
                    <div id="reader" class="w-full"></div>
                    <button onclick="stopScanner()" class="w-full bg-slate-800 text-white py-2 text-xs font-black uppercase tracking-widest hover:bg-rose-600 transition-colors">Close Scanner</button>
                </div>
                
                <form id="searchForm" onsubmit="event.preventDefault(); verifyPrescription();" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black text-emerald-400 uppercase tracking-widest ml-2 mb-1 block">Broadcast ID</label>
                        <input type="text" id="searchBroadcastId" required placeholder="HOLMES-RX-..." class="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-mono text-lg outline-none focus:border-emerald-500 transition-colors uppercase">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-emerald-400 uppercase tracking-widest ml-2 mb-1 block">Secret OTP</label>
                        <input type="text" id="searchOtp" required placeholder="----" maxlength="4" class="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-mono text-center text-2xl tracking-[0.5em] outline-none focus:border-emerald-500 transition-colors">
                    </div>
                    <div class="md:col-span-3 mt-2">
                        <button type="submit" id="searchBtn" class="w-full emerald-gradient text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg hover:shadow-emerald-500/30 transition-all">
                            Authenticate & Fetch Data
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div id="resultsViewer" class="hidden bg-white rounded-[32px] shadow-xl border border-slate-200 overflow-hidden">
            <div class="p-8 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-1">Grid Record Found</p>
                    <h3 id="resPatientName" class="text-2xl font-black text-slate-900 tracking-tighter">Patient Name</h3>
                </div>
                <div class="text-right">
                    <span id="resStatusBadge" class="px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest border">Status</span>
                </div>
            </div>

            <div class="p-8">
                <p id="resDoctorInfo" class="text-sm font-bold text-slate-500 mb-6 pb-6 border-b border-slate-100">Prescribed by: Dr. Unknown</p>
                
                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Authorized Medications</h4>
                <div id="resMedList" class="space-y-3 mb-8">
                    </div>

                <div id="dispenseActionArea" class="bg-emerald-50 border border-emerald-100 p-6 rounded-[24px] text-center">
                    <p class="text-xs font-bold text-emerald-700 mb-4">Warning: Dispensing this medication will lock this prescription permanently.</p>
                    <button onclick="dispenseMedication()" id="dispenseBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg transition-colors inline-flex items-center gap-2">
                        <i class="fa-solid fa-check-double"></i> Mark as Dispensed
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = sessionStorage.getItem('eRx_Token');
        
        let currentRxId = null; 
        let html5QrcodeScanner = null; // Holds the camera instance

        // Security Check & Decoder
        function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch(e) { return {}; } }
        const decoded = parseJwt(token);

        if (!token || decoded.role !== 'pharmacist') { window.location.href = 'index.html'; }

        // Initialize UI
        document.getElementById('pharmacistNameDisplay').innerText = sessionStorage.getItem('eRx_UserName') || 'Licensed Pharmacist';
        document.getElementById('pharmacistIdDisplay').innerText = `ID: ${decoded.gridId || 'PENDING'}`;

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        // ==========================================
        // 📷 OPTICAL SCANNER LOGIC
        // ==========================================
        function startScanner() {
            document.getElementById('scannerContainer').classList.remove('hidden');
            
            // Initialize the scanner engine
            html5QrcodeScanner = new Html5Qrcode("reader");
            
            // Request camera (preferring the back camera on mobile devices)
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText, decodedResult) => {
                    try {
                        // Attempt to parse the JSON string embedded in the QR code
                        const data = JSON.parse(decodedText);
                        
                        // Auto-fill the inputs!
                        document.getElementById('searchBroadcastId').value = data.bId;
                        document.getElementById('searchOtp').value = data.otp;
                        
                        // Success! Stop the camera and hide the viewfinder
                        stopScanner();
                        
                        // Automatically hit the "Authenticate" button
                        verifyPrescription();
                    } catch(e) {
                        console.error("Scanned code is not a valid Holmes Grid Token.");
                    }
                },
                (errorMessage) => {
                    // This triggers constantly while searching for a code, we ignore it.
                }
            ).catch(err => alert("Camera Access Denied or Unavailable."));
        }

        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('scannerContainer').classList.add('hidden');
                }).catch(err => console.error("Failed to stop scanner."));
            } else {
                document.getElementById('scannerContainer').classList.add('hidden');
            }
        }

        // ==========================================
        // 🔐 DECRYPTION LOGIC
        // ==========================================
        async function verifyPrescription() {
            const btn = document.getElementById('searchBtn');
            const bId = document.getElementById('searchBroadcastId').value.trim().toUpperCase();
            const otp = document.getElementById('searchOtp').value.trim();
            const viewer = document.getElementById('resultsViewer');
            
            if(!bId || !otp) return alert("Enter both ID and OTP.");

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Decrypting...';
            viewer.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE_URL}/api/prescriptions/verify?broadcastId=${bId}&otp=${otp}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await res.json();

                if (res.ok) {
                    currentRxId = data._id; 
                    
                    document.getElementById('resPatientName').innerText = data.patientId ? data.patientId.name : 'Unknown Patient';
                    document.getElementById('resDoctorInfo').innerText = `Authorized by: Dr. ${data.doctorId ? data.doctorId.name : 'Unknown'}`;
                    
                    const badge = document.getElementById('resStatusBadge');
                    const actionArea = document.getElementById('dispenseActionArea');
                    
                    if(data.status === 'Dispensed') {
                        badge.className = 'px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest bg-rose-100 text-rose-700 border border-rose-200';
                        badge.innerText = 'Already Dispensed';
                        actionArea.classList.add('hidden'); 
                    } else {
                        badge.className = 'px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest bg-emerald-100 text-emerald-700 border border-emerald-200';
                        badge.innerText = 'Active & Valid';
                        actionArea.classList.remove('hidden'); 
                    }

                    document.getElementById('resMedList').innerHTML = data.medications.map(m => `
                        <div class="bg-white p-4 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm">
                            <div>
                                <p class="font-black text-lg text-slate-800">${m.brandName}</p>
                                <p class="text-xs uppercase text-slate-500 font-bold mt-1">${m.dosage} | ${m.timing}</p>
                            </div>
                            <p class="text-xs font-black text-emerald-700 bg-emerald-50 px-4 py-2 rounded-lg border border-emerald-100">${m.duration}</p>
                        </div>
                    `).join('');

                    viewer.classList.remove('hidden');
                } else {
                    alert(data.msg || "Prescription not found or invalid OTP.");
                }
            } catch(err) {
                alert(`Network Error: ${err.message}`);
            } finally {
                btn.innerHTML = 'Authenticate & Fetch Data';
            }
        }

        async function dispenseMedication() {
            if(!currentRxId) return;
            const btn = document.getElementById('dispenseBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Processing...';
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/prescriptions/${currentRxId}/dispense`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if(res.ok) {
                    alert("Success! Prescription has been securely marked as Dispensed.");
                    verifyPrescription(); 
                } else {
                    const data = await res.json();
                    alert(data.msg || "Failed to update status.");
                }
            } catch(err) {
                alert(`Network Error: ${err.message}`);
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-check-double mr-2"></i> Mark as Dispensed';
            }
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('PWA Engine Active'))
                    .catch(err => console.log('PWA Engine Failed', err));
            });
        }
    </script>
</body>
</html>
