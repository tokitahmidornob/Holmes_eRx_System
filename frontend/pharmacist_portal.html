<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Dispensary Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <script>
        (function() {
            const token = localStorage.getItem('holmesToken');
            const userStr = localStorage.getItem('holmesUser');
            if (!token || !userStr) return window.location.href = '/';
            
            const user = JSON.parse(userStr);
            const validRoles = ["pharmacist", "Dispensary (Pharmacist)"];
            if (!validRoles.includes(user.role)) {
                alert(`Unauthorized Entry!\nSystem found role: "${user.role}"\nRequired: Pharmacist`);
                window.location.href = '/';
            }
        })();
    </script>

    <nav class="bg-emerald-900 text-white shadow-lg flex justify-between items-center px-8 py-4">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-pills text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wider">Holmes eRx <span class="text-emerald-300 text-sm font-normal">| Dispensary</span></h1>
        </div>
        <div class="flex items-center space-x-6">
            <span id="pharmNameDisplay" class="font-semibold text-sm">Loading...</span>
            <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-bold transition-colors">
                Sign Out
            </button>
        </div>
    </nav>

    <div class="container mx-auto mt-10 px-4 max-w-4xl flex-grow">
        
        <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-200 text-center" id="scannerSection">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-qrcode text-4xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Scan Prescription</h2>
            <p class="text-gray-500 mb-8">Enter the RX-ID and 6-digit OTP provided by the patient.</p>

            <div class="flex flex-col md:flex-row justify-center gap-4 max-w-lg mx-auto">
                <input type="text" id="rxIdInput" placeholder="RX-ID (e.g., RX-A1B2C3)" class="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-emerald-500 outline-none uppercase font-mono text-center">
                <input type="text" id="otpInput" placeholder="6-Digit OTP" maxlength="6" class="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-emerald-500 outline-none font-mono text-center tracking-widest text-lg">
            </div>
            
            <button onclick="verifyPrescription()" class="mt-6 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-10 rounded-lg shadow-lg transition-transform transform hover:scale-105">
                <i class="fa-solid fa-magnifying-glass mr-2"></i> Verify & Retrieve
            </button>
        </div>

        <div id="rxDetailsSection" class="bg-white p-8 rounded-2xl shadow-lg border border-gray-200 mt-6 hidden">
            <div class="flex justify-between items-start border-b pb-4 mb-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Verified Prescription</h2>
                    <p class="text-sm text-gray-500" id="displayRxId">RX-123456</p>
                </div>
                <div class="text-right">
                    <p class="text-sm font-bold text-emerald-600"><i class="fa-solid fa-user-md mr-1"></i> <span id="displayDocName">Dr. Name</span></p>
                    <p class="text-sm text-gray-500"><i class="fa-solid fa-user-injured mr-1"></i> <span id="displayPatName">Patient Name</span> (<span id="displayPatAge">Age</span>)</p>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider border-b">
                            <th class="p-3 font-semibold">Medicine</th>
                            <th class="p-3 font-semibold text-center">Dosage</th>
                            <th class="p-3 font-semibold text-center">Duration</th>
                            <th class="p-3 font-semibold text-right">Dispensed</th>
                        </tr>
                    </thead>
                    <tbody id="medicationList" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>

            <div class="mt-8 flex justify-end space-x-4">
                <button onclick="resetScanner()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg transition-colors">
                    Cancel
                </button>
                <button onclick="fulfillPrescription()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition-transform transform hover:scale-105">
                    <i class="fa-solid fa-check-double mr-2"></i> Mark as Fulfilled
                </button>
            </div>
        </div>

    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('holmesUser'));
        document.getElementById('pharmNameDisplay').innerText = `Pharmacist: ${user.name}`;
        
        let currentRxDbId = null;

        async function verifyPrescription() {
            const rxId = document.getElementById('rxIdInput').value.trim().toUpperCase();
            const otp = document.getElementById('otpInput').value.trim();

            if (!rxId || !otp) return alert("Please enter both RX-ID and OTP.");

            try {
                const res = await fetch('/api/prescriptions/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rxId, otp })
                });
                const data = await res.json();

                if (data.success) {
                    currentRxDbId = data.data._id; // Store internal DB ID for fulfillment
                    
                    // Populate UI
                    document.getElementById('displayRxId').innerText = data.data.prescriptionId;
                    document.getElementById('displayDocName').innerText = data.data.doctor.name;
                    document.getElementById('displayPatName').innerText = data.data.patientName;
                    document.getElementById('displayPatAge').innerText = data.data.patientAge || 'N/A';

                    const tbody = document.getElementById('medicationList');
                    tbody.innerHTML = '';
                    
                    data.data.medicines.forEach(med => {
                        tbody.innerHTML += `
                            <tr class="hover:bg-gray-50">
                                <td class="p-3">
                                    <div class="font-bold text-gray-800">${med.brandName}</div>
                                    <div class="text-xs text-gray-500">${med.genericName}</div>
                                </td>
                                <td class="p-3 text-center font-mono text-sm">${med.dose}</td>
                                <td class="p-3 text-center text-sm">${med.duration}</td>
                                <td class="p-3 text-right">
                                    <input type="checkbox" checked class="w-5 h-5 text-emerald-600 rounded focus:ring-emerald-500">
                                </td>
                            </tr>
                        `;
                    });

                    // Switch views
                    document.getElementById('scannerSection').classList.add('hidden');
                    document.getElementById('rxDetailsSection').classList.remove('hidden');
                } else {
                    alert(data.error);
                }
            } catch (err) { alert("Server connection failed."); }
        }

        async function fulfillPrescription() {
            if (!currentRxDbId) return;

            try {
                const res = await fetch(`/api/prescriptions/fulfill/${currentRxDbId}`, { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    alert("✅ Prescription successfully fulfilled and locked in the National Grid!");
                    resetScanner();
                } else {
                    alert("Failed: " + data.error);
                }
            } catch (err) { alert("Server error."); }
        }

        function resetScanner() {
            document.getElementById('rxIdInput').value = '';
            document.getElementById('otpInput').value = '';
            document.getElementById('scannerSection').classList.remove('hidden');
            document.getElementById('rxDetailsSection').classList.add('hidden');
            currentRxDbId = null;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }
    </script>
</body>
</html>
