<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Dispensary Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-emerald-200 selection:text-emerald-900">

    <nav class="sticky top-0 z-50 bg-gradient-to-r from-slate-900 via-emerald-900 to-slate-900 text-white shadow-lg border-b border-emerald-500/30">
        <div class="flex justify-between items-center px-8 py-4">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center border border-emerald-400/30 shadow-inner">
                    <i class="fa-solid fa-pills text-emerald-300"></i>
                </div>
                <div>
                    <h1 class="font-black text-lg tracking-tight leading-none text-emerald-50">National Dispensary</h1>
                    <p class="text-[9px] uppercase tracking-widest text-emerald-300 font-bold mt-1">Pharmacist Verification Terminal</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <span id="pharmNameDisplay" class="text-xs font-black uppercase tracking-widest text-emerald-100">Loading...</span>
                <button onclick="logout()" class="bg-white/10 hover:bg-rose-500/90 px-5 py-2 rounded-xl text-[10px] font-black transition-all uppercase tracking-widest border border-white/10">Disconnect</button>
            </div>
        </div>
    </nav>

    <main class="max-w-[1000px] mx-auto p-6 mt-8">
        
        <div class="bg-white rounded-[32px] shadow-2xl shadow-slate-200/60 border border-white overflow-hidden glass-panel relative">
            <div class="absolute -top-32 -right-32 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl"></div>
            
            <div class="p-10 relative z-10 flex flex-col items-center border-b border-slate-100">
                <h2 class="text-3xl font-black text-slate-900 tracking-tighter uppercase mb-2 text-center">Cryptographic Decryption</h2>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-8 text-center max-w-md">Enter the Broadcast ID (or scan QR) and the 4-digit patient OTP to unlock the Vault.</p>
                
                <form onsubmit="event.preventDefault(); verifyPrescription();" class="w-full max-w-2xl space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 relative group">
                            <label class="absolute -top-2 left-4 bg-white px-2 text-[9px] font-black text-slate-400 uppercase tracking-widest group-focus-within:text-emerald-600 transition-colors z-10">Broadcast ID / QR Data</label>
                            <input type="text" id="broadcastIdInput" required placeholder="e.g. HOLMES-RX-1234" class="premium-input w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[20px] font-bold text-slate-800 focus:border-emerald-500 focus:bg-white outline-none transition-all uppercase">
                            <i class="fa-solid fa-qrcode absolute right-5 top-5 text-slate-300 text-xl"></i>
                        </div>
                        <div class="relative group">
                            <label class="absolute -top-2 left-4 bg-white px-2 text-[9px] font-black text-slate-400 uppercase tracking-widest group-focus-within:text-emerald-600 transition-colors z-10">Patient OTP</label>
                            <input type="text" id="otpInput" required maxlength="4" placeholder="----" class="premium-input w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[20px] font-black text-2xl tracking-[0.3em] text-center text-emerald-600 focus:border-emerald-500 focus:bg-white outline-none transition-all">
                        </div>
                    </div>
                    <button type="submit" id="verifyBtn" class="btn-premium w-full bg-gradient-to-r from-slate-800 to-slate-900 text-white py-5 rounded-[20px] font-black text-xs uppercase tracking-widest shadow-xl shadow-slate-900/20 flex items-center justify-center gap-3">
                        <i class="fa-solid fa-unlock-keyhole text-lg text-emerald-400"></i> Decrypt & Access Record
                    </button>
                </form>
            </div>

            <div id="decryptedRecord" class="hidden p-10 bg-slate-50 animate-slide-down relative z-10">
                <div class="bg-white border-2 border-emerald-400 rounded-[24px] p-8 shadow-lg shadow-emerald-500/10">
                    
                    <div class="flex justify-between items-start border-b border-slate-100 pb-6 mb-6">
                        <div>
                            <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest border border-emerald-200 mb-3 inline-block">Signature Verified</span>
                            <h3 id="rxDrName" class="text-xl font-black text-slate-900">Dr. Name</h3>
                            <p id="rxDrCreds" class="text-xs text-slate-500 font-bold mt-1">Credentials</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Patient Profile</p>
                            <p id="rxPatientId" class="text-sm font-bold text-slate-800 bg-slate-100 px-4 py-2 rounded-xl border border-slate-200"></p>
                        </div>
                    </div>

                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4"><i class="fa-solid fa-capsules mr-2 text-emerald-500"></i> Authorized Medications</h4>
                    <div id="rxMedList" class="space-y-4 mb-8">
                        </div>

                    <button onclick="dispenseMeds()" id="dispenseBtn" class="btn-premium w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white py-5 rounded-[20px] font-black text-sm uppercase tracking-widest shadow-lg shadow-emerald-500/40 border border-emerald-400/50 flex items-center justify-center gap-3">
                        <i class="fa-solid fa-box-open text-xl"></i> Mark as Dispensed (Seal Record)
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = localStorage.getItem('eRx_Token');
        const pharmId = localStorage.getItem('eRx_UserId');
        
        if(!token || !pharmId) window.location.href = 'index.html';

        document.getElementById('pharmNameDisplay').innerText = `Pharm. ${localStorage.getItem('eRx_UserName') || 'Terminal'}`;

        let currentPrescriptionId = null;

        async function verifyPrescription() {
            const btn = document.getElementById('verifyBtn');
            const broadcastId = document.getElementById('broadcastIdInput').value.trim();
            const otp = document.getElementById('otpInput').value.trim();

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-emerald-400 text-lg"></i> DECRYPTING...';
            document.getElementById('decryptedRecord').classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE_URL}/api/prescriptions/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ broadcastId, otp })
                });
                
                const data = await res.json();
                
                if(res.ok && data.success) {
                    currentPrescriptionId = data.prescription._id;
                    
                    // Populate UI
                    document.getElementById('rxDrName').innerText = `Dr. ${data.prescription.doctorId.name}`;
                    document.getElementById('rxDrCreds').innerText = `${data.prescription.doctorId.degrees?.join(', ')} | BMDC: ${data.prescription.doctorId.licenseNumber}`;
                    document.getElementById('rxPatientId').innerText = data.prescription.patientId;
                    
                    document.getElementById('rxMedList').innerHTML = data.prescription.medications.map(med => `
                        <div class="bg-emerald-50/50 p-5 rounded-2xl border border-emerald-100 flex justify-between items-center">
                            <div>
                                <p class="font-black text-slate-800 text-base">${med.brandName} <span class="text-xs text-emerald-600 font-bold ml-1 uppercase">(${med.generic})</span></p>
                                <p class="text-[11px] text-slate-500 font-bold mt-1">${med.dosage} — ${med.timing}</p>
                            </div>
                            <div class="text-right bg-white px-4 py-2 rounded-xl border border-emerald-100 shadow-sm">
                                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Dispense For</p>
                                <p class="text-sm font-black text-emerald-700">${med.duration}</p>
                            </div>
                        </div>
                    `).join('');

                    document.getElementById('decryptedRecord').classList.remove('hidden');
                } else { alert(data.error || "Decryption Failed."); }
            } catch (err) { alert("Grid Connection Offline."); }
            finally { btn.innerHTML = '<i class="fa-solid fa-unlock-keyhole text-lg text-emerald-400"></i> Decrypt & Access Record'; }
        }

        async function dispenseMeds() {
            if(!currentPrescriptionId) return;
            const btn = document.getElementById('dispenseBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xl"></i> SEALING...';

            try {
                const res = await fetch(`${API_BASE_URL}/api/prescriptions/dispense`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ prescriptionId: currentPrescriptionId, pharmacistId: pharmId })
                });

                if(res.ok) {
                    alert("Success! Record sealed. Patient cannot reuse this prescription.");
                    location.reload();
                } else { alert("Failed to seal record."); }
            } catch (err) { alert("Grid Error."); }
            finally { btn.innerHTML = '<i class="fa-solid fa-box-open text-xl"></i> Mark as Dispensed (Seal Record)'; }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
