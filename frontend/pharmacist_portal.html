<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispensary Terminal | Holmes eRx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased min-h-screen flex bg-slate-950 text-white overflow-hidden">

    <aside class="w-64 glass-panel border-r border-slate-800 flex flex-col justify-between z-20 flex-shrink-0">
        <div>
            <div class="h-20 flex items-center gap-3 px-6 border-b border-emerald-500/20">
                <div class="w-10 h-10 bg-emerald-500/20 rounded-xl flex items-center justify-center border border-emerald-500/50 shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                    <i class="fa-solid fa-staff-snake text-emerald-400 text-lg"></i>
                </div>
                <h1 class="text-xl font-black tracking-tighter">Holmes <span class="text-emerald-400">Grid</span></h1>
            </div>
            <div class="p-6 space-y-6">
                <div>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Dispensary</p>
                    <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-500/10 text-emerald-400 font-bold text-sm border border-emerald-500/30 transition-all shadow-[inset_0_0_10px_rgba(16,185,129,0.1)]">
                        <i class="fa-solid fa-unlock-keyhole"></i> Decryption Hub
                    </button>
                </div>
            </div>
        </div>
        <div class="p-6 border-t border-slate-800">
            <div class="bg-slate-900 rounded-xl p-4 border border-slate-700 text-center">
                <p id="pharmNameDisplay" class="text-xs font-black text-white mb-1">Pharmacist</p>
                <p id="pharmGridIdDisplay" class="text-[10px] font-black text-emerald-400 uppercase tracking-widest bg-emerald-500/10 py-1 rounded-md border border-emerald-500/20">ID-PENDING</p>
            </div>
            <button onclick="logout()" class="w-full mt-4 flex items-center justify-center gap-2 px-4 py-3 rounded-xl hover:bg-rose-500/10 text-slate-400 hover:text-rose-400 font-bold text-sm transition-all border border-transparent hover:border-rose-500/30">
                <i class="fa-solid fa-power-off"></i> Disconnect
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative z-10 h-screen overflow-y-auto custom-scrollbar p-10">
        <header class="mb-10">
            <h2 class="text-3xl font-black text-white tracking-tighter">Decryption Hub</h2>
            <p class="text-[10px] font-black text-emerald-400 uppercase tracking-widest mt-1"><i class="fa-solid fa-shield-check"></i> Anti-Fraud Verification Engine</p>
        </header>

        <div class="max-w-4xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="glass-panel p-8 rounded-3xl border border-emerald-500/30 shadow-[0_0_30px_rgba(16,185,129,0.05)] h-fit">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 border-b border-slate-800 pb-4"><i class="fa-solid fa-key mr-2 text-emerald-400"></i> Enter Patient Keys</h3>
                
                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Broadcast ID</label>
                        <input type="text" id="broadcastId" placeholder="e.g. RX-A7B9-C123" class="w-full bg-slate-900/80 border border-slate-700 focus:border-emerald-500 rounded-xl px-4 py-4 font-mono font-bold text-white outline-none transition-colors uppercase">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">6-Digit OTP</label>
                        <input type="text" id="otp" placeholder="XXXXXX" maxlength="6" class="w-full bg-slate-900/80 border border-slate-700 focus:border-emerald-500 rounded-xl px-4 py-4 font-mono text-2xl tracking-[0.5em] text-center font-black text-emerald-400 outline-none transition-colors">
                    </div>
                    <button onclick="decryptPayload()" id="decryptBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all mt-4">
                        <i class="fa-solid fa-unlock"></i> Decrypt Payload
                    </button>
                </div>
            </div>

            <div id="resultPanel" class="glass-panel p-8 rounded-3xl border border-slate-800 hidden opacity-0 transition-all duration-500 transform translate-y-4">
                <div class="flex justify-between items-start border-b border-slate-800 pb-4 mb-6">
                    <div>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Citizen</p>
                        <p id="resPatient" class="text-lg font-black text-white"></p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Prescribing Authority</p>
                        <p id="resDoctor" class="text-sm font-bold text-emerald-400"></p>
                    </div>
                </div>

                <div id="statusBadge" class="mb-6 inline-block px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border"></div>

                <div class="space-y-3 mb-8" id="medList"></div>

                <button onclick="dispenseMedication()" id="dispenseBtn" class="w-full bg-slate-900 hover:bg-emerald-500 border border-slate-700 hover:border-emerald-500 text-white hover:text-slate-950 py-4 rounded-xl font-black text-sm uppercase tracking-widest transition-all">
                    <i class="fa-solid fa-box-check"></i> Mark as Dispensed
                </button>
            </div>

        </div>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[150] flex flex-col gap-3 pointer-events-none w-full max-w-[320px]"></div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = sessionStorage.getItem('eRx_Token');
        if (!token) window.location.href = 'auth.html';
        
        // Setup UI Profile
        const userName = sessionStorage.getItem('eRx_UserName');
        if(userName) document.getElementById('pharmNameDisplay').innerText = userName;
        try { const decoded = JSON.parse(atob(token.split('.')[1])); document.getElementById('pharmGridIdDisplay').innerText = decoded.uuid || 'PHM-ACTIVE'; } catch(e){}

        let currentRxId = null;

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'glass-panel border-rose-500' : 'glass-panel border-emerald-500';
            const iconColor = type === 'error' ? 'text-rose-500 bg-rose-500/10' : 'text-emerald-500 bg-emerald-500/10';
            const icon = type === 'error' ? 'fa-triangle-exclamation' : 'fa-check';
            toast.className = `flex items-center p-4 rounded-2xl shadow-xl border-l-4 transform transition-all duration-500 translate-y-10 opacity-0 ${colors}`;
            toast.innerHTML = `<div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${iconColor}"><i class="fa-solid ${icon}"></i></div><div class="ml-3"><p class="text-xs font-black text-white uppercase tracking-widest leading-tight">${type === 'error' ? 'System Alert' : 'Success'}</p><p class="text-xs font-bold text-slate-400 mt-0.5">${message}</p></div>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 500); }, 4000);
        }

        async function decryptPayload() {
            const bId = document.getElementById('broadcastId').value;
            const otp = document.getElementById('otp').value;
            if(!bId || !otp) return showToast("Both security keys are required.");

            const btn = document.getElementById('decryptBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Decrypting...'; btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/prescriptions/decrypt`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ broadcastId: bId, otp: otp })
                });
                const data = await res.json();

                if(res.ok) {
                    currentRxId = data.rxId;
                    document.getElementById('resPatient').innerText = data.patientName;
                    document.getElementById('resDoctor').innerText = "Dr. " + data.doctorName;
                    
                    const badge = document.getElementById('statusBadge');
                    const dispenseBtn = document.getElementById('dispenseBtn');
                    
                    if(data.status === 'Dispensed') {
                        badge.className = "mb-6 inline-block px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-rose-500/30 bg-rose-500/10 text-rose-400";
                        badge.innerHTML = "<i class='fa-solid fa-ban mr-1'></i> Already Dispensed";
                        dispenseBtn.classList.add('hidden');
                        showToast("Warning: This payload has already been collected.", "error");
                    } else {
                        badge.className = "mb-6 inline-block px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-emerald-500/30 bg-emerald-500/10 text-emerald-400";
                        badge.innerHTML = "<i class='fa-solid fa-lock-open mr-1'></i> Payload Active";
                        dispenseBtn.classList.remove('hidden');
                        showToast("Payload successfully decrypted.", "success");
                    }

                    document.getElementById('medList').innerHTML = data.medications.map(m => `
                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                            <p class="font-black text-sm text-slate-200">${m.brandName}</p>
                            <p class="text-[10px] font-bold text-slate-500 uppercase mt-1 tracking-wider">${m.dosage} &bull; ${m.timing} &bull; ${m.duration} Days</p>
                        </div>
                    `).join('');

                    const panel = document.getElementById('resultPanel');
                    panel.classList.remove('hidden');
                    setTimeout(() => panel.classList.remove('opacity-0', 'translate-y-4'), 50);

                } else { showToast(data.msg, "error"); }
            } catch (err) { showToast("Grid Network Failure.", "error"); } finally {
                btn.innerHTML = '<i class="fa-solid fa-unlock"></i> Decrypt Payload'; btn.disabled = false;
            }
        }

        async function dispenseMedication() {
            if(!currentRxId) return;
            const btn = document.getElementById('dispenseBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Locking...'; btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/prescriptions/dispense/${currentRxId}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if(res.ok) {
                    showToast(data.msg, "success");
                    document.getElementById('statusBadge').className = "mb-6 inline-block px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-rose-500/30 bg-rose-500/10 text-rose-400";
                    document.getElementById('statusBadge').innerHTML = "<i class='fa-solid fa-check-double mr-1'></i> Dispensed & Locked";
                    btn.classList.add('hidden');
                } else { showToast(data.msg, "error"); btn.innerHTML = '<i class="fa-solid fa-box-check"></i> Mark as Dispensed'; btn.disabled = false;}
            } catch (err) { showToast("Network Failure.", "error"); btn.innerHTML = '<i class="fa-solid fa-box-check"></i> Mark as Dispensed'; btn.disabled = false;}
        }

        function logout() { sessionStorage.clear(); window.location.href = 'auth.html'; }
    </script>
</body>
</html>
