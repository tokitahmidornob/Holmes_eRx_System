<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Dispensary Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-emerald-50 min-h-screen font-sans">
    <nav class="bg-emerald-900 text-white p-4 shadow-xl flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-pills text-2xl text-emerald-400"></i>
            <h1 class="font-bold text-lg">National Dispensary Portal</h1>
        </div>
        <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-xs font-black">EXIT SYSTEM</button>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <div class="bg-white rounded-3xl shadow-2xl border border-emerald-100 overflow-hidden">
            <div class="p-8 bg-emerald-50 border-b text-center">
                <h2 class="text-2xl font-black text-emerald-900">Secure Dispensing</h2>
                <p class="text-xs text-emerald-600 font-bold uppercase tracking-widest mt-1">Verify Doctor's Authorization</p>
            </div>

            <div class="p-8 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-500 uppercase">Prescription ID / QR Data</label>
                        <input type="text" id="presIDInput" placeholder="Enter ID or Scan QR" class="w-full p-4 bg-slate-50 border-2 border-emerald-100 rounded-2xl font-bold focus:border-emerald-500 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-500 uppercase">Patient's 4-Digit OTP</label>
                        <input type="text" id="otpInput" maxlength="4" placeholder="0 0 0 0" class="w-full p-4 bg-slate-900 text-emerald-400 border-none rounded-2xl font-black text-2xl tracking-[1rem] text-center focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                </div>

                <button onclick="verifyAndPull()" id="verifyBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-5 rounded-2xl font-black shadow-xl shadow-emerald-100 transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-unlock-keyhole text-xl"></i> VALIDATE & REVEAL PRESCRIPTION
                </button>

                <div id="dispenseCard" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="border-t-4 border-emerald-500 bg-slate-50 p-6 rounded-2xl space-y-4">
                        <div class="flex justify-between items-center border-b pb-4">
                            <div>
                                <h3 id="displayMed" class="text-xl font-black text-slate-800 uppercase"></h3>
                                <p id="displayDr" class="text-xs font-bold text-blue-600 uppercase"></p>
                            </div>
                            <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">Authorized</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 text-sm">
                            <div class="bg-white p-4 rounded-xl shadow-sm border">
                                <p class="text-[10px] font-black text-slate-400 uppercase">Dosage Instructions</p>
                                <p id="displayDosage" class="font-bold text-slate-700"></p>
                            </div>
                            <div class="bg-white p-4 rounded-xl shadow-sm border">
                                <p class="text-[10px] font-black text-slate-400 uppercase">Duration</p>
                                <p id="displayDuration" class="font-bold text-slate-700"></p>
                            </div>
                        </div>

                        <button onclick="confirmDispense()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-black hover:bg-black transition-all">
                            MARK AS DISPENSED
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = localStorage.getItem('holmesToken');
        if(!token) window.location.href = 'index.html';

        async function verifyAndPull() {
            const btn = document.getElementById('verifyBtn');
            const presID = document.getElementById('presIDInput').value;
            const otp = document.getElementById('otpInput').value;

            if(!presID || !otp) { alert("Credentials incomplete."); return; }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Accessing Vault...';
            
            try {
                // In a real system, we'd have a specific /verify endpoint
                const res = await fetch(`${API_BASE_URL}/api/prescriptions/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ presID, otp })
                });

                const data = await res.json();
                if(data.success) {
                    document.getElementById('dispenseCard').classList.remove('hidden');
                    document.getElementById('displayMed').innerText = data.prescription.medication;
                    document.getElementById('displayDr').innerText = `Authorized by ${data.prescription.doctorName}`;
                    document.getElementById('displayDosage').innerText = data.prescription.dosage;
                    document.getElementById('displayDuration').innerText = data.prescription.duration;
                } else {
                    alert("Invalid OTP or Prescription ID. Access Denied.");
                }
            } catch (err) { alert("Grid Error: Verification Timeout."); }
            finally { btn.innerHTML = '<i class="fa-solid fa-unlock-keyhole text-xl"></i> VALIDATE & REVEAL PRESCRIPTION'; }
        }

        function confirmDispense() {
            alert("Medicine has been officially dispensed. Record synchronized.");
            location.reload();
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
