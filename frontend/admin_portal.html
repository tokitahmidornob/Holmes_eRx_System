<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGHS Ministry Terminal | Holmes eRx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased text-slate-800 bg-slate-100 flex h-screen overflow-hidden">

    <aside class="hidden lg:flex flex-col w-72 bg-slate-900 text-white transition-transform duration-300 z-50 shadow-2xl shrink-0 h-full border-r border-amber-500/30">
        <div class="h-24 flex items-center justify-start px-8 border-b border-slate-800">
            <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/30 shrink-0 text-slate-900"><i class="fa-solid fa-building-columns"></i></div>
            <h1 class="ml-4 text-xl font-black tracking-tighter">Holmes <span class="text-amber-500">DGHS</span></h1>
        </div>
        
        <nav class="flex-1 py-8 flex flex-col gap-2 px-4">
            <p class="text-[10px] font-black text-amber-500/50 uppercase tracking-widest px-4 mb-2">Ministry Terminal</p>
            <button class="nav-btn active flex items-center p-4 rounded-2xl bg-amber-500/10 text-amber-500 transition-all border border-amber-500/20">
                <i class="fa-solid fa-clipboard-check text-xl mr-4 w-6 text-center"></i><span class="font-bold text-sm">License Verification</span>
            </button>
        </nav>
        
        <div class="p-4 border-t border-slate-800 bg-slate-900">
            <div class="mb-4 px-4 text-center">
                <p class="font-black text-sm text-amber-500 truncate uppercase tracking-widest">System Administrator</p>
                <div class="bg-slate-800/80 border border-slate-700 rounded-lg mt-2 py-1"><p class="text-[10px] font-mono font-bold text-slate-400 tracking-wider">GOD-MODE ACTIVE</p></div>
            </div>
            <button onclick="logout()" class="w-full flex items-center justify-center p-4 rounded-2xl bg-rose-500/10 hover:bg-rose-500 text-rose-400 hover:text-white transition-all group">
                <i class="fa-solid fa-power-off text-xl mr-3 group-hover:rotate-180 transition-transform duration-500"></i><span class="font-bold text-sm uppercase tracking-widest">Sign Out</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto relative w-full custom-scrollbar">
        <header class="h-20 lg:h-24 glass-panel border-b border-slate-200 flex items-center justify-between px-6 lg:px-10 shrink-0 sticky top-0 z-40">
            <div>
                <h2 class="text-xl lg:text-2xl font-black text-slate-900 tracking-tighter">License Verification Queue</h2>
                <p class="text-[9px] lg:text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 flex items-center"><i class="fa-solid fa-shield-halved text-amber-500 mr-1.5"></i> Ministry of Health Authority</p>
            </div>
            <button onclick="fetchPendingQueue()" class="text-[10px] font-black uppercase tracking-widest bg-white border border-slate-200 px-4 py-2 rounded-full hover:bg-slate-50 transition-all shadow-sm text-slate-600"><i class="fa-solid fa-rotate-right mr-1"></i> Sync Queue</button>
        </header>

        <div class="p-4 lg:p-10 max-w-6xl mx-auto w-full space-y-8">
            <div class="glass-panel rounded-[32px] shadow-sm border border-slate-200 overflow-hidden fade-in-up">
                <div class="p-2 lg:p-4">
                    <div id="queueList" class="divide-y divide-slate-100 min-h-[50vh]">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 lg:bottom-10 lg:right-10 z-[150] flex flex-col gap-3 pointer-events-none w-full max-w-[320px] px-4 lg:px-0"></div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        let token = sessionStorage.getItem('eRx_Token');
        if (!token) window.location.href = 'index.html';

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'bg-white border-rose-500' : 'bg-white border-amber-500';
            const iconColor = type === 'error' ? 'text-rose-500 bg-rose-50' : 'text-amber-500 bg-amber-50';
            const icon = type === 'error' ? 'fa-triangle-exclamation' : 'fa-check';
            toast.className = `flex items-center p-4 rounded-2xl shadow-xl border-l-4 transform transition-all duration-500 translate-y-10 opacity-0 ${colors}`;
            toast.innerHTML = `<div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${iconColor}"><i class="fa-solid ${icon}"></i></div><div class="ml-3"><p class="text-xs font-black text-slate-800 uppercase tracking-widest leading-tight">${type === 'error' ? 'System Alert' : 'Success'}</p><p class="text-xs font-bold text-slate-500 mt-0.5">${message}</p></div>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 500); }, 3000);
        }

        // 🚨 GOD-MODE INITIALIZATION
        // This instantly turns the currently logged-in user into a Ministry Admin so you don't have to build a complex registration bypass.
        async function engageGodMode() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/promote-me`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    sessionStorage.setItem('eRx_Token', data.token);
                    token = data.token; // Update local token
                    showToast("God-Mode Activated. Welcome, Minister.", "success");
                    fetchPendingQueue();
                } else {
                    showToast("Failed to acquire God-Mode.", "error");
                }
            } catch(e) { showToast("Network Failure", "error"); }
        }

        async function fetchPendingQueue() {
            const list = document.getElementById('queueList');
            list.innerHTML = Array(3).fill(`<div class="p-6 border-b border-slate-100"><div class="animate-pulse flex space-x-4"><div class="flex-1 space-y-3 py-1"><div class="h-2 bg-slate-200 rounded w-1/4"></div><div class="h-2 bg-slate-200 rounded w-1/2"></div></div></div></div>`).join('');
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/pending`, { headers: { 'Authorization': `Bearer ${token}` } });
                
                if (res.status === 403) {
                    // Not an admin yet? Run the backdoor to promote the account automatically.
                    return engageGodMode();
                }

                const queue = await res.json();
                
                if(!queue || queue.length === 0) return list.innerHTML = '<div class="p-16 text-center"><i class="fa-solid fa-check-double text-4xl text-slate-200 mb-3 block"></i><p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Queue is Empty</p></div>';

                list.innerHTML = queue.map((prac, i) => `
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 px-6 py-6 hover:bg-slate-50 transition-colors group border-b border-slate-100 fade-in-up" style="animation-delay: ${i * 0.05}s">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest shadow-sm ${prac.roleType === 'Doctor' ? 'bg-teal-50 text-teal-600 border border-teal-100' : 'bg-emerald-50 text-emerald-600 border border-emerald-100'}">${prac.roleType}</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${prac.status}</span>
                            </div>
                            <p class="text-lg font-black text-slate-900 mb-1">${prac.name}</p>
                            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest"><i class="fa-solid fa-envelope mr-1"></i> ${prac.email} &bull; <i class="fa-solid fa-phone mr-1 ml-2"></i> ${prac.phone}</p>
                        </div>
                        
                        <div class="flex flex-col items-end gap-3 w-full md:w-auto">
                            <div class="bg-slate-100 border border-slate-200 px-4 py-2 rounded-xl text-center w-full md:w-48">
                                <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Provided License / Reg No.</p>
                                <p class="font-mono font-bold text-slate-800">${prac.licenseNumber}</p>
                            </div>
                            <button onclick="verifyPractitioner('${prac._id}')" class="w-full md:w-48 bg-slate-900 hover:bg-amber-500 text-white text-[10px] font-black uppercase tracking-widest px-6 py-3 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 hover:-translate-y-1">
                                <i class="fa-solid fa-signature"></i> Grant Authority
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (err) { list.innerHTML = '<div class="p-10 text-center text-rose-500 font-bold uppercase tracking-widest text-xs">Failed to sync Queue.</div>'; }
        }

        async function verifyPractitioner(id) {
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/verify/${id}`, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if(res.ok) {
                    showToast("Authority Granted Successfully.", "success");
                    fetchPendingQueue(); // Refresh list
                } else { showToast(data.msg, "error"); }
            } catch(e) { showToast("Grid Network Failure", "error"); }
        }

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        // Boot
        fetchPendingQueue();
    </script>
</body>
</html>
