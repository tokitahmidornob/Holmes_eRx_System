<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Command | Holmes eRx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="antialiased flex h-screen overflow-hidden">

    <aside class="w-24 lg:w-72 bg-black flex flex-col transition-all duration-300 z-20 shadow-2xl relative border-r border-slate-800">
        <div class="h-24 flex items-center justify-center lg:justify-start lg:px-8 border-b border-slate-800">
            <div class="w-10 h-10 bg-rose-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-rose-600/30 shrink-0">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="hidden lg:block ml-4 text-xl font-black tracking-tighter">Central <span class="text-rose-500">Command</span></h1>
        </div>
        <nav class="flex-1 py-8 flex flex-col gap-2 px-4">
            <button class="nav-btn active flex items-center p-4 rounded-2xl bg-rose-500/10 text-rose-500 transition-all">
                <i class="fa-solid fa-users-gear text-xl lg:mr-4 w-6 text-center"></i>
                <span class="hidden lg:block font-bold text-sm">Grid Personnel</span>
            </button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <div class="hidden lg:block mb-4 px-4 text-center">
                <p id="adminNameDisplay" class="font-black text-sm text-white truncate">Loading...</p>
                <div class="bg-rose-500/10 border border-rose-500/30 rounded-lg mt-2 py-1">
                    <p id="adminGridIdDisplay" class="text-xs font-mono font-bold text-rose-500 tracking-wider">ID: PENDING</p>
                </div>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-2">Super Administrator</p>
            </div>
            <button onclick="logout()" class="w-full flex items-center justify-center p-4 rounded-2xl hover:bg-rose-600 text-slate-400 hover:text-white transition-all">
                <i class="fa-solid fa-power-off text-xl lg:mr-3"></i>
                <span class="hidden lg:block font-bold text-sm uppercase tracking-widest">Disconnect</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative bg-slate-900">
        <header class="h-24 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-8 shrink-0 z-10">
            <div>
                <h2 class="text-2xl font-black text-white tracking-tighter">Grid Personnel Clearance</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Review & Authorize Network Access</p>
            </div>
            <button onclick="fetchPersonnel()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-colors shadow-lg">
                <i class="fa-solid fa-rotate-right mr-2"></i> Refresh Roster
            </button>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-8">
            <div class="max-w-6xl mx-auto">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-black border border-slate-800 p-6 rounded-[24px]">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Total Agents</p>
                        <p id="statTotal" class="text-3xl font-black text-white">0</p>
                    </div>
                    <div class="bg-rose-500/10 border border-rose-500/20 p-6 rounded-[24px]">
                        <p class="text-[10px] font-black text-rose-400 uppercase tracking-widest mb-2">Awaiting Clearance</p>
                        <p id="statPending" class="text-3xl font-black text-rose-500 animate-pulse">0</p>
                    </div>
                    <div class="bg-emerald-500/10 border border-emerald-500/20 p-6 rounded-[24px]">
                        <p class="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-2">Active Approvals</p>
                        <p id="statApproved" class="text-3xl font-black text-emerald-500">0</p>
                    </div>
                </div>

                <div class="bg-black rounded-[32px] border border-slate-800 overflow-hidden shadow-2xl">
                    <div class="grid grid-cols-12 gap-4 px-8 py-4 border-b border-slate-800 bg-slate-900/50">
                        <div class="col-span-3 text-[10px] font-black text-slate-500 uppercase tracking-widest">Agent Info</div>
                        <div class="col-span-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">Clearance Type</div>
                        <div class="col-span-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">Grid ID</div>
                        <div class="col-span-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">Status</div>
                        <div class="col-span-3 text-[10px] font-black text-slate-500 uppercase tracking-widest text-right">Command Actions</div>
                    </div>
                    <div id="personnelList" class="divide-y divide-slate-800">
                        <div class="p-10 text-center text-slate-500 font-bold"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Connecting to Grid...</div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = localStorage.getItem('eRx_Token');

        function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch(e) { return {}; } }
        const decoded = parseJwt(token);

        // KICK NON-ADMINS OUT IMMEDIATELY
        if (!token || decoded.role !== 'admin') {
            alert("SECURITY VIOLATION: You do not have Central Command Clearance.");
            window.location.href = 'index.html';
        }

        document.getElementById('adminNameDisplay').innerText = decoded.name;
        document.getElementById('adminGridIdDisplay').innerText = `ID: ${decoded.gridId || 'MASTER'}`;

        fetchPersonnel();

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        async function fetchPersonnel() {
            const list = document.getElementById('personnelList');
            list.innerHTML = '<div class="p-10 text-center text-slate-500 font-bold"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Syncing Rosters...</div>';
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!res.ok) throw new Error("Unauthorized");
                const users = await res.json();
                
                // Update Stats
                document.getElementById('statTotal').innerText = users.length;
                document.getElementById('statPending').innerText = users.filter(u => u.status === 'Pending').length;
                document.getElementById('statApproved').innerText = users.filter(u => u.status === 'Approved').length;

                if (users.length === 0) return list.innerHTML = '<div class="p-10 text-center text-slate-500 font-bold">No grid personnel found.</div>';

                list.innerHTML = users.map(u => {
                    let statusBadge = '';
                    let actionButtons = '';

                    if (u.status === 'Pending') {
                        statusBadge = `<span class="bg-rose-500/10 text-rose-500 border border-rose-500/30 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest animate-pulse">Awaiting</span>`;
                        actionButtons = `
                            <button onclick="updateStatus('${u._id}', 'approve')" class="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest transition-colors mr-2"><i class="fa-solid fa-check"></i> Approve</button>
                            <button onclick="updateStatus('${u._id}', 'reject')" class="bg-rose-600 hover:bg-rose-500 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest transition-colors"><i class="fa-solid fa-xmark"></i> Reject</button>
                        `;
                    } else if (u.status === 'Approved') {
                        statusBadge = `<span class="bg-emerald-500/10 text-emerald-500 border border-emerald-500/30 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest">Active</span>`;
                        actionButtons = `<button onclick="updateStatus('${u._id}', 'reject')" class="text-slate-500 hover:text-rose-500 text-[10px] font-black uppercase tracking-widest transition-colors">Revoke Access</button>`;
                    } else {
                        statusBadge = `<span class="bg-slate-800 text-slate-500 border border-slate-700 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest">Rejected</span>`;
                        actionButtons = `<button onclick="updateStatus('${u._id}', 'approve')" class="text-slate-500 hover:text-emerald-500 text-[10px] font-black uppercase tracking-widest transition-colors">Restore Access</button>`;
                    }

                    // Fancy icons based on role
                    let roleIcon = 'fa-user';
                    if (u.role === 'doctor') roleIcon = 'fa-user-doctor text-teal-400';
                    if (u.role === 'pharmacist') roleIcon = 'fa-pills text-emerald-400';
                    if (u.role === 'pathologist') roleIcon = 'fa-microscope text-cyan-400';
                    if (u.role === 'admin') roleIcon = 'fa-shield text-rose-400';

                    return `
                        <div class="grid grid-cols-12 gap-4 px-8 py-5 items-center hover:bg-slate-800/50 transition-colors">
                            <div class="col-span-3">
                                <p class="font-black text-sm text-white">${u.name}</p>
                                <p class="text-[10px] font-bold text-slate-500 truncate">${u.email}</p>
                            </div>
                            <div class="col-span-2 flex items-center gap-2 text-xs font-black text-slate-300 uppercase">
                                <i class="fa-solid ${roleIcon}"></i> ${u.role}
                            </div>
                            <div class="col-span-2 text-xs font-mono font-black text-slate-400">${u.gridId || 'N/A'}</div>
                            <div class="col-span-2">${statusBadge}</div>
                            <div class="col-span-3 text-right flex justify-end items-center">${actionButtons}</div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                list.innerHTML = '<div class="p-10 text-center text-rose-500 font-bold">Failed to sync with Central Command.</div>';
            }
        }

        async function updateStatus(id, action) {
            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/admin/users/${id}/${action}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    fetchPersonnel(); // Refresh the list
                } else {
                    const data = await res.json();
                    alert(data.msg);
                }
            } catch (err) {
                alert("Grid Connection Failed.");
            }
        }
    </script>
</body>
</html>
