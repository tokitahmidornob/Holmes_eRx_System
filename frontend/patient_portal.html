<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Patient Medical History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-green-800 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tighter"><i class="fa-solid fa-user-shield mr-2"></i>My Medical Archive</h1>
        <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm font-bold">Logout</button>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <div class="bg-white p-8 rounded-xl shadow-md border border-slate-200">
            <h2 class="text-green-900 font-bold mb-6 flex items-center">
                <i class="fa-solid fa-clock-rotate-left mr-2"></i> Recent Prescriptions
            </h2>

            <div id="historyLoading" class="text-center py-10 text-slate-400">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-2"></i>
                <p class="text-sm font-bold">Accessing Cloud Vault...</p>
            </div>

            <div id="historyList" class="space-y-4"></div>
        </div>
    </main>

    <script>
        // --- 🌉 THE HYBRID BRIDGE ---
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : 'https://holmes-erx-system.onrender.com';

        const token = sessionStorage.getItem('holmesToken');
        if (!token) window.location.href = 'index.html';

        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/prescriptions/my-history`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const prescriptions = await response.json();
                
                document.getElementById('historyLoading').classList.add('hidden');
                const list = document.getElementById('historyList');

                if (prescriptions.length === 0) {
                    list.innerHTML = `<div class="text-center text-slate-400 italic py-10">No prescriptions found in your archive.</div>`;
                    return;
                }

                list.innerHTML = prescriptions.map(p => `
                    <div class="p-4 border-l-4 border-green-600 bg-green-50 rounded-r-lg">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black text-slate-800 uppercase">${p.medication}</h3>
                            <span class="text-xs font-bold text-slate-500">${new Date(p.createdAt).toLocaleDateString()}</span>
                        </div>
                        <p class="text-sm text-slate-600 mt-1">Dosage: <strong>${p.dosage}</strong> | Duration: <strong>${p.duration}</strong></p>
                        <p class="text-xs text-slate-500 italic mt-2">Dr. Instructions: ${p.instructions || 'N/A'}</p>
                    </div>
                `).join('');
            } catch (err) { 
                document.getElementById('historyLoading').innerHTML = `<p class="text-red-500 font-bold">National Grid engine is warming up. Please refresh in 30 seconds.</p>`;
            }
        }

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
        
        // Auto-load on entry
        loadHistory();
    </script>
</body>
</html>
