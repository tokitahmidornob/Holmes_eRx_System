<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | My Digital Health</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <script>
        (function() {
            const token = localStorage.getItem('holmesToken');
            const userStr = localStorage.getItem('holmesUser');
            if (!token || !userStr) return window.location.href = '/';
            
            const user = JSON.parse(userStr);
            const validRoles = ["patient", "Citizen (Patient)"];
            if (!validRoles.includes(user.role)) {
                alert(`Unauthorized Entry!\nSystem found role: "${user.role}"\nRequired: Patient`);
                window.location.href = '/';
            }
        })();
    </script>

    <nav class="bg-blue-600 text-white shadow-lg flex justify-between items-center px-4 py-4 md:px-8 relative z-50">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-heart-pulse text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wider">Holmes eRx</h1>
        </div>
        <button onclick="logout()" class="bg-blue-800 hover:bg-blue-900 px-4 py-2 rounded text-sm font-bold transition-colors shadow">
            Sign Out
        </button>
    </nav>

    <div class="container mx-auto mt-6 px-4 max-w-3xl flex-grow">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8 flex items-center space-x-4">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-2xl shadow-inner">
                <i class="fa-solid fa-user"></i>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-gray-800" id="patNameDisplay">Loading...</h2>
                <p class="text-gray-500">Your Digital Medical Wallet</p>
            </div>
        </div>

        <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i class="fa-solid fa-bell text-yellow-500 mr-2"></i> Active Prescriptions</h3>
        <div id="activeRxContainer" class="space-y-4 mb-10">
            <p class="text-gray-400 italic text-sm text-center py-4">Checking National Grid...</p>
        </div>

        <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i class="fa-solid fa-clock-rotate-left text-gray-400 mr-2"></i> Medical History</h3>
        <div id="pastRxContainer" class="space-y-4 mb-10">
            </div>

    </div>

    <div id="qrModal" class="fixed inset-0 bg-black bg-opacity-75 hidden flex items-center justify-center z-[200] p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 text-2xl">
                <i class="fa-solid fa-times"></i>
            </button>
            
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Show to Pharmacist</h2>
            <p class="text-sm text-gray-500 mb-6">Scan this code to unlock your medications.</p>
            
            <div id="qrcode" class="flex justify-center mb-6 bg-white p-2 rounded-xl mx-auto w-max"></div>
            
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                <span class="block text-xs text-blue-600 font-bold uppercase mb-1">Dispensary OTP</span>
                <span id="displayOtp" class="text-3xl font-black text-blue-900 tracking-widest">---</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        const user = JSON.parse(localStorage.getItem('holmesUser'));
        document.getElementById('patNameDisplay').innerText = user.name;

        // Fetch Data on Load
        document.addEventListener('DOMContentLoaded', fetchMyHistory);

        async function fetchMyHistory() {
            try {
                const response = await fetch(`/api/prescriptions/history/${encodeURIComponent(user.name)}`);
                const data = await response.json();

                if (data.success) {
                    renderPrescriptions(data.data);
                } else {
                    alert("Failed to load history: " + data.error);
                }
            } catch (error) {
                console.error("Offline:", error);
                document.getElementById('activeRxContainer').innerHTML = `<p class="text-red-500 text-center">Cannot connect to the National Grid.</p>`;
            }
        }

        function renderPrescriptions(rxList) {
            const activeContainer = document.getElementById('activeRxContainer');
            const pastContainer = document.getElementById('pastRxContainer');
            
            activeContainer.innerHTML = '';
            pastContainer.innerHTML = '';

            let activeCount = 0;
            let pastCount = 0;

            rxList.forEach(rx => {
                const dateIssued = new Date(rx.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                const isFulfilled = rx.status === 'Fulfilled';

                // Build Medication List String
                let medListHTML = rx.medicines.map(med => 
                    `<li class="text-sm text-gray-700 border-b border-gray-100 py-2">
                        <span class="font-bold">${med.brandName}</span> <span class="text-xs text-gray-500">(${med.dose})</span><br>
                        <span class="text-xs text-blue-600">${med.instruction} - for ${med.duration}</span>
                    </li>`
                ).join('');

                // Build Tests List String
                let testsHTML = '';
                if (rx.tests && rx.tests.length > 0) {
                    testsHTML = `<div class="mt-3 p-3 bg-purple-50 rounded-lg border border-purple-100">
                        <span class="text-xs font-bold text-purple-800 uppercase block mb-1">Advised Tests</span>
                        <ul class="list-disc list-inside text-sm text-purple-900">
                            ${rx.tests.map(t => `<li>${t.testName}</li>`).join('')}
                        </ul>
                    </div>`;
                }

                // Card Template
                const card = document.createElement('div');
                card.className = `bg-white p-5 rounded-2xl shadow-sm border ${isFulfilled ? 'border-gray-200 opacity-75' : 'border-blue-200 border-l-4 border-l-blue-500'}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">${dateIssued}</span>
                            <h4 class="text-lg font-bold text-gray-800 mt-1"><i class="fa-solid fa-user-md mr-1 text-blue-600"></i> ${rx.doctorName || 'Doctor'}</h4>
                        </div>
                        <span class="px-3 py-1 text-xs font-bold rounded-full ${isFulfilled ? 'bg-gray-100 text-gray-600' : 'bg-green-100 text-green-700'}">
                            ${isFulfilled ? 'Fulfilled' : 'Active'}
                        </span>
                    </div>
                    
                    <ul class="mb-2">
                        ${medListHTML}
                    </ul>
                    
                    ${testsHTML}

                    ${!isFulfilled ? `
                    <button onclick="openModal('${rx.prescriptionId}', '${rx.otp}')" class="w-full mt-4 bg-gray-900 hover:bg-black text-white font-bold py-3 rounded-xl transition-colors shadow-md">
                        <i class="fa-solid fa-qrcode mr-2"></i> Get QR Code
                    </button>
                    ` : ''}
                `;

                if (isFulfilled) {
                    pastContainer.appendChild(card);
                    pastCount++;
                } else {
                    activeContainer.appendChild(card);
                    activeCount++;
                }
            });

            if (activeCount === 0) activeContainer.innerHTML = `<p class="text-gray-400 italic text-sm text-center py-4 bg-white rounded-xl border border-gray-100">No active prescriptions.</p>`;
            if (pastCount === 0) pastContainer.innerHTML = `<p class="text-gray-400 italic text-sm text-center py-4 bg-white rounded-xl border border-gray-100">No medical history found.</p>`;
        }

        // --- MODAL LOGIC ---
        function openModal(rxId, otp) {
            document.getElementById('qrModal').classList.remove('hidden');
            document.getElementById('displayOtp').innerText = otp;
            
            document.getElementById('qrcode').innerHTML = ""; 
            new QRCode(document.getElementById("qrcode"), { 
                text: `RXID:${rxId}|OTP:${otp}`, 
                width: 200, 
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function closeModal() {
            document.getElementById('qrModal').classList.add('hidden');
        }

        function logout() { localStorage.clear(); window.location.href = '/'; }
    </script>
</body>
</html>
