<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Clinical Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <nav class="sticky top-0 z-50 bg-teal-900 text-white p-4 shadow-2xl flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div id="drAvatar" class="w-12 h-12 bg-white rounded-full border-2 border-teal-400 flex items-center justify-center text-teal-900 font-black text-xl shadow-inner">
                SH
            </div>
            <div>
                <h1 id="drNameDisplay" class="font-bold text-lg leading-tight">Dr. Sherlock Holmes</h1>
                <p id="drTagline" class="text-[10px] uppercase tracking-widest text-teal-300 font-black">National Grid Medical Officer</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-xl text-xs font-black shadow-lg transition-all">TERMINATE SESSION</button>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-1 space-y-6">
            
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Professional Profile</h3>
                <div class="space-y-3">
                    <p class="text-sm"><strong>Dept:</strong> <span id="profDept" class="text-teal-700">Not Set</span></p>
                    <p class="text-sm"><strong>Degrees:</strong> <span id="profDegrees" class="text-slate-500 italic text-xs">Loading...</span></p>
                    <p class="text-sm"><strong>Experience:</strong> <span id="profExp">0</span> Years</p>
                </div>
            </div>

            <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-2xl border border-slate-800">
                <h3 class="text-[10px] font-black text-teal-400 uppercase tracking-widest mb-4"><i class="fa-solid fa-scalpel-line mr-2"></i>Daily Operation Log</h3>
                <form onsubmit="event.preventDefault(); logSurgery();" class="space-y-3">
                    <input type="text" id="surgeryTitle" placeholder="Surgery Title" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold text-white outline-none focus:border-teal-400">
                    <select id="surgeryOutcome" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold outline-none">
                        <option>Successful</option>
                        <option>Complicated</option>
                        <option>Critical</option>
                    </select>
                    <textarea id="surgeryNotes" rows="2" placeholder="Post-op notes..." class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-xs outline-none"></textarea>
                    <button type="submit" id="logBtn" class="w-full bg-teal-600 hover:bg-teal-500 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all">Record Surgery</button>
                </form>

                <div id="recentSurgeries" class="mt-6 space-y-3 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-6">
            <div class="bg-white rounded-[40px] shadow-2xl border border-slate-200 overflow-hidden">
                <div class="bg-slate-50/50 p-8 border-b border-slate-100 flex justify-between items-center">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800 tracking-tighter">Prescription Pad</h2>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Authorized Digital Archive Entry</p>
                    </div>
                    <div id="qrcode" class="bg-white p-2 rounded-2xl shadow-inner border border-slate-100"></div>
                </div>

                <form id="masterPad" class="p-10 space-y-10" onsubmit="event.preventDefault(); submitPrescription();">
                    
                    <div class="relative">
                        <label class="block text-xs font-black text-slate-500 uppercase mb-3 ml-2 tracking-widest">Global Pharmacy Search (21,714 Medicines)</label>
                        <div class="relative">
                            <input type="text" id="medSearch" oninput="searchMedicines()" placeholder="Enter Brand Name or Generic Molecule..." class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-bold text-lg focus:border-teal-500 focus:bg-white outline-none transition-all shadow-sm">
                            <i class="fa-solid fa-magnifying-glass absolute right-6 top-6 text-slate-300"></i>
                        </div>
                        <div id="searchSuggestions" class="absolute z-50 w-full bg-white shadow-2xl rounded-3xl mt-3 max-h-72 overflow-y-auto hidden border-2 border-teal-50"></div>
                    </div>

                    <div id="overridePanel" class="hidden p-8 bg-teal-50/50 rounded-[35px] border-2 border-dashed border-teal-200 animate-in fade-in zoom-in duration-300">
                        <div class="flex justify-between items-center mb-6">
                            <h4 id="selectedMed" class="font-black text-teal-900 text-xl tracking-tight"></h4>
                            <span class="text-[10px] bg-teal-700 text-white px-4 py-1.5 rounded-full font-black uppercase tracking-widest shadow-lg shadow-teal-200">Verified Molecule</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                            <div>
                                <label class="text-[10px] font-black text-teal-600 uppercase mb-2 block">Arbitrary Dosage</label>
                                <input type="text" id="overrideDosage" value="1+0+1" class="w-full p-4 border-2 border-white rounded-2xl font-mono font-black text-teal-700 shadow-sm outline-none focus:border-teal-400">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-teal-600 uppercase mb-2 block">Administration</label>
                                <select id="timing" class="w-full p-4 border-2 border-white rounded-2xl font-bold bg-white shadow-sm outline-none">
                                    <option>After Meal</option>
                                    <option>Before Meal</option>
                                    <option>Empty Stomach</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-teal-600 uppercase mb-2 block">Duration</label>
                                <input type="text" id="duration" placeholder="e.g. 14 Days" class="w-full p-4 border-2 border-white rounded-2xl font-bold bg-white shadow-sm outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-teal-600 uppercase mb-2 block">Instruction</label>
                                <input type="text" id="instruction" value="Orally" class="w-full p-4 border-2 border-white rounded-2xl font-bold bg-white shadow-sm outline-none">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-slate-500 uppercase mb-3 ml-2 tracking-widest">Required Lab Investigations</label>
                        <textarea id="investigations" rows="2" placeholder="e.g. CBC, Serum Creatinine, Chest X-ray..." class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl text-sm italic focus:border-teal-500 focus:bg-white outline-none transition-all"></textarea>
                    </div>

                    <div class="pt-10 border-t border-slate-100 flex flex-col md:flex-row items-center justify-between gap-8">
                        <div class="flex items-center gap-6 bg-slate-900 text-white p-5 rounded-3xl shadow-2xl w-full md:w-auto">
                            <div class="text-center border-r border-slate-700 pr-6">
                                <p class="text-[8px] uppercase font-black text-slate-500 tracking-widest mb-1">Pharmacy OTP</p>
                                <p id="otpCode" class="text-3xl font-black tracking-[0.2em] text-teal-400">----</p>
                            </div>
                            <p class="text-[10px] font-bold leading-relaxed text-slate-400 uppercase">Cryptographic Key<br>for Dispensing Only</p>
                        </div>
                        
                        <button type="submit" id="authBtn" class="w-full md:w-auto bg-teal-700 hover:bg-teal-900 text-white px-12 py-6 rounded-[30px] font-black shadow-2xl shadow-teal-200 transition-all flex items-center justify-center gap-4 hover:scale-105">
                            <i class="fa-solid fa-cloud-bolt text-2xl"></i> AUTHORIZE & SYNC WITH GRID
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        // --- BRIDGE CONFIGURATION ---
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = localStorage.getItem('eRx_Token');
        if(!token) window.location.href = 'index.html';

        // --- INITIALIZE PROFILE ---
        const userName = localStorage.getItem('eRx_UserName');
        if(userName) {
            document.getElementById('drNameDisplay').innerText = `Dr. ${userName}`;
            document.getElementById('drAvatar').innerText = userName.split(' ').map(n => n[0]).join('');
        }

        // --- 🔍 MEDICINE SEARCH (21K RECORDS) ---
        async function searchMedicines() {
            const query = document.getElementById('medSearch').value;
            const suggestions = document.getElementById('searchSuggestions');
            if (query.length < 3) { suggestions.classList.add('hidden'); return; }

            try {
                const res = await fetch(`${API_BASE_URL}/api/medicines/search?q=${query}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const meds = await res.json();
                
                suggestions.innerHTML = meds.map(m => `
                    <div onclick="selectMed('${m.brand_name}', '${m.generic}')" class="p-5 hover:bg-teal-50 cursor-pointer border-b border-slate-50 group flex justify-between items-center transition-all">
                        <div>
                            <p class="font-black text-slate-800 group-hover:text-teal-700 transition-colors">${m.brand_name}</p>
                            <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest">${m.generic}</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-200 group-hover:text-teal-400 group-hover:translate-x-1 transition-all"></i>
                    </div>
                `).join('');
                suggestions.classList.remove('hidden');
            } catch (err) { console.error("Archive Search Failed."); }
        }

        function selectMed(name, generic) {
            document.getElementById('selectedMed').innerText = `${name} (${generic})`;
            document.getElementById('overridePanel').classList.remove('hidden');
            document.getElementById('searchSuggestions').classList.add('hidden');
            document.getElementById('medSearch').value = name;
            
            // Generate Verification Identity
            const otp = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('otpCode').innerText = otp;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `SH-ERX-${name}-${otp}`, width: 80, height: 80, colorDark: "#134e4a" });
        }

        // --- 🩺 SURGERY LOG LOGIC ---
        async function logSurgery() {
            const btn = document.getElementById('logBtn');
            const logData = {
                doctorId: localStorage.getItem('eRx_UserId'),
                surgeryTitle: document.getElementById('surgeryTitle').value,
                outcome: document.getElementById('surgeryOutcome').value,
                notes: document.getElementById('surgeryNotes').value
            };

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> RECORDING...';
            try {
                const res = await fetch(`${API_BASE_URL}/api/doctors/surgery-log`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(logData)
                });
                if(res.ok) {
                    alert("Surgery record archived.");
                    location.reload();
                }
            } catch (err) { alert("Vault offline."); }
            finally { btn.innerText = "RECORD SURGERY"; }
        }

        // --- 🚀 AUTHORIZE PRESCRIPTION ---
        async function submitPrescription() {
            const btn = document.getElementById('authBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> SYNCING GRID...';
            
            const pData = {
                medication: document.getElementById('medSearch').value,
                dosage: document.getElementById('overrideDosage').value,
                timing: document.getElementById('timing').value,
                duration: document.getElementById('duration').value,
                investigations: document.getElementById('investigations').value,
                otp: document.getElementById('otpCode').innerText
            };

            try {
                const res = await fetch(`${API_BASE_URL}/api/prescriptions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(pData)
                });
                if(res.ok) {
                    alert("Authorization Verified. Grid Synchronized.");
                    location.reload();
                }
            } catch (err) { alert("Grid Connection Timeout."); }
            finally { btn.innerText = "AUTHORIZE & SYNC WITH GRID"; }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
