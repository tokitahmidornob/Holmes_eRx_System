<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Clinical Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-900">

    <nav class="sticky top-0 z-50 bg-teal-900 text-white shadow-md flex justify-between items-center px-6">
        <div class="flex items-center gap-6">
            <div class="py-4 border-b-4 border-teal-400 font-black tracking-widest uppercase text-sm">
                <i class="fa-solid fa-file-prescription mr-2"></i> Rx Pad
            </div>
            <a href="surgery_log.html" class="py-4 font-bold text-teal-400/50 hover:text-teal-400 transition-all tracking-widest uppercase text-sm">
                <i class="fa-solid fa-scalpel-line mr-2"></i> Surgery Archive
            </a>
        </div>
        <div class="flex items-center gap-4 py-2">
            <span id="drNameDisplay" class="text-xs font-bold uppercase tracking-widest text-teal-200">Dr. Loading...</span>
            <button onclick="logout()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-[10px] font-black shadow-lg transition-all uppercase tracking-widest">Logout</button>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-4 grid grid-cols-1 lg:grid-cols-4 gap-4">
        
        <div class="lg:col-span-1 space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center"><i class="fa-solid fa-id-card-clip mr-2"></i> Target Patient</h3>
                
                <div class="space-y-2">
                    <input type="text" id="patientSearchInput" placeholder="Enter Patient Email or ID..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold outline-none focus:border-teal-500">
                    <button onclick="findPatient()" class="w-full bg-slate-900 hover:bg-black text-white py-2.5 rounded-lg font-black text-[10px] uppercase tracking-widest transition-all">Verify Patient Identity</button>
                </div>

                <div id="patientCard" class="hidden mt-4 p-4 bg-teal-50 rounded-xl border border-teal-100 animate-in fade-in duration-300">
                    <div class="flex items-center gap-3 mb-3 border-b border-teal-200 pb-3">
                        <div class="w-10 h-10 bg-teal-600 rounded-full flex items-center justify-center text-white font-black shadow-inner">P</div>
                        <div>
                            <p id="pName" class="font-black text-teal-900 text-sm">John Doe</p>
                            <p id="pEmail" class="text-[9px] font-bold text-teal-600 uppercase tracking-widest">john@example.com</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <div class="bg-white p-2 rounded border border-teal-100">
                            <span class="block text-[8px] text-slate-400 font-black uppercase">Age/Gender</span>
                            <span id="pAgeGender" class="font-bold text-slate-700">--</span>
                        </div>
                        <div class="bg-white p-2 rounded border border-teal-100">
                            <span class="block text-[8px] text-slate-400 font-black uppercase">Blood Type</span>
                            <span id="pBlood" class="font-bold text-red-600">--</span>
                        </div>
                        <div class="bg-white p-2 rounded border border-teal-100 col-span-2">
                            <span class="block text-[8px] text-slate-400 font-black uppercase">Allergies</span>
                            <span id="pAllergies" class="font-bold text-slate-700 text-[10px]">None Reported</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3">
            <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                    <div>
                        <h2 class="text-lg font-black text-slate-800 tracking-tighter uppercase">Digital Prescription Pad</h2>
                    </div>
                    <div id="qrcode" class="bg-white p-1 rounded-lg border min-w-[50px] min-h-[50px] flex justify-center items-center text-slate-300 text-[8px] text-center">QR Pending</div>
                </div>

                <form id="masterPad" class="p-6 space-y-5" onsubmit="event.preventDefault(); submitPrescription();">
                    
                    <div class="relative">
                        <div class="relative z-40">
                            <input type="text" id="medSearch" oninput="searchMedicines()" placeholder="Search 21,714 Medicines..." autocomplete="off" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-sm focus:border-teal-500 focus:bg-white outline-none transition-all shadow-sm">
                            <i class="fa-solid fa-magnifying-glass absolute right-4 top-4 text-slate-400"></i>
                        </div>
                        <div id="searchSuggestions" class="absolute z-50 w-full bg-white shadow-2xl rounded-xl mt-1 max-h-60 overflow-y-auto hidden border border-slate-200 custom-scrollbar"></div>
                    </div>

                    <div id="overridePanel" class="hidden animate-in fade-in zoom-in duration-200">
                        <div class="bg-white border border-teal-200 rounded-xl p-4 mb-3 shadow-sm flex justify-between items-center">
                            <div>
                                <h4 id="selectedBrand" class="font-black text-teal-900 text-lg"></h4>
                                <p id="selectedGeneric" class="text-[9px] font-black text-slate-400 uppercase tracking-widest"></p>
                            </div>
                            <div class="text-right text-[9px] max-w-[200px]">
                                <span class="block text-teal-600 font-bold italic truncate" id="metaIndications">Indications loading...</span>
                                <span class="block text-rose-500 font-bold italic truncate" id="metaSideEffects">Side effects loading...</span>
                            </div>
                        </div>

                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                                <div>
                                    <label class="text-[9px] font-black text-slate-500 uppercase mb-1 block">Dosage</label>
                                    <input type="text" id="overrideDosage" class="w-full p-2.5 border rounded-lg font-mono font-black text-teal-800 text-xs outline-none focus:border-teal-400">
                                </div>
                                <div>
                                    <label class="text-[9px] font-black text-slate-500 uppercase mb-1 block">Timing</label>
                                    <select id="timing" class="w-full p-2.5 border rounded-lg font-bold bg-white text-xs outline-none">
                                        <option>After Meal</option>
                                        <option>Before Meal</option>
                                        <option>Empty Stomach</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[9px] font-black text-slate-500 uppercase mb-1 block">Duration</label>
                                    <input type="text" id="duration" placeholder="e.g. 7 Days" required class="w-full p-2.5 border rounded-lg font-bold bg-white text-xs outline-none">
                                </div>
                                <div>
                                    <label class="text-[9px] font-black text-slate-500 uppercase mb-1 block">Route</label>
                                    <input type="text" id="instruction" value="Orally" class="w-full p-2.5 border rounded-lg font-bold bg-white text-xs outline-none">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <textarea id="investigations" rows="2" placeholder="Lab Investigations (e.g. CBC, X-Ray)..." class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-xs italic focus:border-teal-500 focus:bg-white outline-none transition-all"></textarea>
                    </div>

                    <div class="flex items-center justify-between border-t border-slate-100 pt-4">
                        <div class="flex items-center gap-3">
                            <p class="text-[8px] uppercase font-black text-slate-400">Secure OTP:</p>
                            <p id="otpCode" class="text-xl font-black tracking-widest text-teal-700 bg-teal-50 px-3 py-1 rounded-md border border-teal-100">----</p>
                        </div>
                        <button type="submit" id="authBtn" class="bg-teal-700 hover:bg-teal-900 text-white px-8 py-3 rounded-lg font-black text-xs shadow-md transition-all uppercase tracking-widest">
                            <i class="fa-solid fa-cloud-bolt mr-2"></i> Broadcast Rx
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = localStorage.getItem('eRx_Token');
        if(!token) window.location.href = 'index.html';

        document.getElementById('drNameDisplay').innerText = `Dr. ${localStorage.getItem('eRx_UserName') || 'Unknown'}`;

        let globalSearchResults = [];

        // Patient Lookup Simulation (Will connect to actual DB later)
        function findPatient() {
            const query = document.getElementById('patientSearchInput').value;
            if(!query) return alert("Enter an ID or Email.");
            
            // Simulating a successful pull from the National Grid
            document.getElementById('patientCard').classList.remove('hidden');
            document.getElementById('pName').innerText = "Simulated Citizen";
            document.getElementById('pEmail').innerText = query;
            document.getElementById('pAgeGender').innerText = "25 / Male";
            document.getElementById('pBlood').innerText = "O+";
        }

        let searchTimeout;
        async function searchMedicines() {
            const query = document.getElementById('medSearch').value;
            const suggestions = document.getElementById('searchSuggestions');
            if (query.length < 2) { suggestions.classList.add('hidden'); return; }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`${API_BASE_URL}/api/medicines/search?q=${query}`, { headers: { 'Authorization': `Bearer ${token}` } });
                    globalSearchResults = await res.json();
                    
                    if (globalSearchResults.length === 0) {
                        suggestions.innerHTML = `<div class="p-3 text-center text-xs text-slate-400">No matches found.</div>`;
                    } else {
                        suggestions.innerHTML = globalSearchResults.map((m, index) => `
                            <div onclick="selectMed(${index})" class="p-3 hover:bg-slate-50 cursor-pointer border-b flex justify-between items-center group">
                                <div>
                                    <p class="font-black text-slate-800 text-sm group-hover:text-teal-700">${m.brand_name} <span class="text-[10px] text-slate-400 font-normal ml-1">${m.strength || ''}</span></p>
                                    <p class="text-[8px] text-slate-400 uppercase font-black">${m.generic}</p>
                                </div>
                            </div>
                        `).join('');
                    }
                    suggestions.classList.remove('hidden');
                } catch (err) { console.error("Search Failed."); }
            }, 300);
        }

        function selectMed(index) {
            const med = globalSearchResults[index];
            document.getElementById('searchSuggestions').classList.add('hidden');
            document.getElementById('overridePanel').classList.remove('hidden');
            document.getElementById('medSearch').value = med.brand_name;

            document.getElementById('selectedBrand').innerText = `${med.brand_name} ${med.strength || ''}`;
            document.getElementById('selectedGeneric').innerText = med.generic;
            document.getElementById('metaIndications').innerText = med.indications || med.use_for || 'General indication.';
            document.getElementById('metaSideEffects').innerText = med.side_effects || 'Standard profile.';
            document.getElementById('overrideDosage').value = med.dosage || med.dosage_description || '1+0+1';

            const otp = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('otpCode').innerText = otp;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `SH-ERX-${otp}`, width: 50, height: 50 });
        }

        async function submitPrescription() {
            const btn = document.getElementById('authBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> SYNCING...';
            // Form logic remains the same...
            setTimeout(() => {
                alert("Prescription Broadcasted.");
                location.reload();
            }, 1000); // Simulated delay for now
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
