<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Doctor Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-blue-900 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tighter"><i class="fa-solid fa-microscope mr-2"></i>Holmes eRx Dashboard</h1>
        <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm font-bold transition-all">Logout</button>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
                <h2 class="text-blue-900 font-bold mb-4 uppercase text-xs tracking-widest">Identify Patient</h2>
                <div class="relative">
                    <input type="text" id="patientSearch" placeholder="Search by Name or ID..." class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <i class="fa-solid fa-search absolute left-3 top-3 text-slate-400"></i>
                </div>
                <div id="patientResult" class="mt-4 p-3 bg-blue-50 rounded-lg hidden">
                    <p id="targetPatientName" class="font-bold text-slate-800"></p>
                    <p id="targetPatientID" class="text-xs text-slate-500"></p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-white p-8 rounded-xl shadow-md border border-slate-200">
                <h2 class="text-blue-900 font-bold mb-6 flex items-center">
                    <i class="fa-solid fa-file-medical mr-2"></i> New Digital Prescription
                </h2>
                <form id="prescriptionForm" class="space-y-4" onsubmit="event.preventDefault(); submitPrescription();">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Medication Name</label>
                        <input type="text" id="medName" placeholder="e.g. Paracetamol 500mg" required class="w-full px-4 py-2 border rounded-lg">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Dosage</label>
                            <input type="text" id="dosage" placeholder="1+0+1" required class="w-full px-4 py-2 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Duration</label>
                            <input type="text" id="duration" placeholder="7 Days" required class="w-full px-4 py-2 border rounded-lg">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Special Instructions</label>
                        <textarea id="instructions" rows="3" class="w-full px-4 py-2 border rounded-lg" placeholder="Take after meal..."></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-lg">
                        Authorize & Broadcast
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // --- 🌉 THE HYBRID BRIDGE ---
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : 'https://holmes-erx-system.onrender.com';

        // Security Check
        const token = localStorage.getItem('holmesToken');
        if (!token) window.location.href = 'index.html';

        async function submitPrescription() {
            const btn = document.getElementById('submitBtn');
            const pData = {
                medication: document.getElementById('medName').value,
                dosage: document.getElementById('dosage').value,
                duration: document.getElementById('duration').value,
                instructions: document.getElementById('instructions').value
            };

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Authorizing...';
            try {
                const response = await fetch(`${API_BASE_URL}/api/prescriptions`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(pData)
                });
                if (response.ok) {
                    alert("Prescription Broadcast Successfully!");
                    document.getElementById('prescriptionForm').reset();
                } else { alert("Authorization failed. Engine might be warming up."); }
            } catch (err) { alert("National Grid Error. Retrying in 30s..."); }
            finally { btn.innerHTML = 'Authorize & Broadcast'; }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
