<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Premium Clinical Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 antialiased selection:bg-teal-200 selection:text-teal-900">

    <nav class="sticky top-0 z-50 bg-gradient-to-r from-slate-900 via-teal-900 to-slate-900 text-white shadow-lg border-b border-teal-500/30">
        <div class="flex justify-between items-center px-8">
            <div class="flex items-center gap-8">
                <div class="py-5 border-b-4 border-teal-400 font-black tracking-widest uppercase text-xs flex items-center text-teal-50 drop-shadow-[0_0_8px_rgba(45,212,191,0.5)]">
                    <i class="fa-solid fa-file-prescription mr-3 text-lg"></i> Master Rx Pad
                </div>
                <a href="surgery_log.html" class="py-5 font-bold text-teal-100/50 hover:text-white transition-all tracking-widest uppercase text-xs flex items-center">
                    <i class="fa-solid fa-scalpel-line mr-3 text-lg"></i> Surgery Archive
                </a>
            </div>
            <div class="flex items-center gap-6 py-3">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-teal-500/20 flex items-center justify-center border border-teal-400/50 shadow-[0_0_10px_rgba(45,212,191,0.2)]">
                        <i class="fa-solid fa-user-doctor text-teal-300 text-xs"></i>
                    </div>
                    <span id="drNameDisplay" class="text-xs font-extrabold uppercase tracking-widest text-teal-50">Dr. Loading...</span>
                </div>
                <button onclick="logout()" class="bg-white/10 hover:bg-red-500/90 hover:shadow-[0_0_15px_rgba(239,68,68,0.4)] px-5 py-2.5 rounded-xl text-[10px] font-black transition-all uppercase tracking-widest border border-white/10">Disconnect</button>
            </div>
        </div>
    </nav>

    <main class="max-w-[1500px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 mt-4">
        
        <div class="lg:col-span-3 space-y-6">
            <div class="bg-white p-6 rounded-[24px] shadow-xl shadow-slate-200/50 border border-slate-100 relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-teal-500/10 rounded-full blur-2xl"></div>
                
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-5 flex items-center">
                    <i class="fa-solid fa-crosshairs mr-2 text-teal-500"></i> Target Patient
                </h3>
                
                <div class="space-y-3 relative z-10">
                    <div class="relative">
                        <input type="text" id="patientSearchInput" placeholder="National ID or Email..." class="premium-input w-full pl-10 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                        <i class="fa-solid fa-id-card absolute left-3.5 top-3.5 text-slate-400 text-lg"></i>
                    </div>
                    <button onclick="findPatient()" class="w-full bg-gradient-to-r from-slate-800 to-slate-900 hover:from-black hover:to-slate-800 text-white py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-slate-900/20 transform hover:-translate-y-0.5">Verify Identity</button>
                </div>

                <div id="patientCard" class="hidden mt-6 p-5 bg-gradient-to-br from-teal-50 to-white rounded-xl border border-teal-100/50 shadow-sm animate-slide-down">
                    <div class="flex items-center gap-4 mb-4 border-b border-teal-100 pb-4">
                        <div class="w-12 h-12 bg-gradient-to-br from-teal-500 to-teal-700 rounded-full flex items-center justify-center text-white font-black shadow-lg shadow-teal-500/30 text-lg">P</div>
                        <div>
                            <p id="pName" class="font-black text-slate-800 text-base leading-tight">Simulated Citizen</p>
                            <p id="pEmail" class="text-[9px] font-bold text-teal-600 uppercase tracking-widest mt-1">citizen@grid.com</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white p-3 rounded-lg border border-slate-100 shadow-sm text-center">
                            <span class="block text-[9px] text-slate-400 font-black uppercase mb-1">Demographics</span>
                            <span id="pAgeGender" class="font-bold text-slate-700 text-xs">25 / Male</span>
                        </div>
                        <div class="bg-white p-3 rounded-lg border border-slate-100 shadow-sm text-center">
                            <span class="block text-[9px] text-slate-400 font-black uppercase mb-1">Blood Group</span>
                            <span id="pBlood" class="font-black text-red-500 text-xs bg-red-50 px-2 py-0.5 rounded-full">O+</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9">
            <div class="bg-white rounded-[32px] shadow-2xl shadow-slate-200/60 border border-white overflow-hidden relative">
                
                <div class="bg-gradient-to-r from-slate-50 to-white p-6 md:p-8 border-b border-slate-100 flex justify-between items-center relative z-10">
                    <div>
                        <h2 class="text-2xl font-black text-gradient tracking-tighter uppercase drop-shadow-sm">Digital Prescription Pad</h2>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="w-2 h-2 rounded-full bg-teal-400 pulse-glow"></span>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">National Grid Secured Connection</p>
                        </div>
                    </div>
                    <div id="qrcode" class="bg-white p-1.5 rounded-xl border border-slate-200 shadow-sm min-w-[60px] min-h-[60px] flex justify-center items-center text-slate-300 text-[8px] font-bold text-center">QR<br>Pending</div>
                </div>

                <form id="masterPad" class="p-6 md:p-10 space-y-8 bg-white relative z-10" onsubmit="event.preventDefault(); submitPrescription();">
                    
                    <div class="relative z-50">
                        <div class="relative">
                            <input type="text" id="medSearch" oninput="searchMedicines()" placeholder="Search 21,714 Database Modules..." autocomplete="off" class="premium-input w-full pl-6 pr-14 py-5 bg-slate-50/50 border-2 border-slate-200 rounded-[20px] font-bold text-base md:text-lg text-slate-800 outline-none placeholder:text-slate-300">
                            <div class="absolute right-4 top-4 w-10 h-10 bg-teal-500 rounded-xl flex items-center justify-center shadow-lg shadow-teal-500/30">
                                <i class="fa-solid fa-magnifying-glass text-white"></i>
                            </div>
                        </div>
                        
                        <div id="searchSuggestions" class="absolute z-50 w-full glass-panel shadow-2xl shadow-slate-900/10 rounded-[20px] mt-2 max-h-[300px] overflow-y-auto hidden border-t border-slate-200"></div>
                    </div>

                    <div id="overridePanel" class="hidden animate-slide-down">
                        
                        <div class="bg-gradient-to-r from-teal-50 to-emerald-50 border border-teal-100 rounded-2xl p-5 mb-5 shadow-inner">
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <div>
                                    <h4 id="selectedBrand" class="font-black text-teal-900 text-2xl tracking-tighter drop-shadow-sm"></h4>
                                    <p id="selectedGeneric" class="text-[10px] font-black text-teal-600/70 uppercase tracking-widest mt-1"></p>
                                </div>
                                <div class="flex gap-2">
                                    <span class="bg-white border border-teal-200 text-teal-700 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase shadow-sm flex items-center"><i class="fa-solid fa-check-circle mr-1.5 text-teal-500"></i> Verified</span>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4 pt-4 border-t border-teal-200/50">
                                <div class="bg-white/60 p-3 rounded-xl border border-white">
                                    <span class="block text-[9px] font-black text-indigo-500 uppercase tracking-widest mb-1">Indications</span>
                                    <span class="text-xs font-bold text-slate-700" id="metaIndications">...</span>
                                </div>
                                <div class="bg-white/60 p-3 rounded-xl border border-white">
                                    <span class="block text-[9px] font-black text-rose-500 uppercase tracking-widest mb-1">Side Effects</span>
                                    <span class="text-xs font-bold text-slate-700" id="metaSideEffects">...</span>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div class="relative group">
                                <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-1 group-focus-within:text-teal-600 transition-colors">Dosage Protocol</label>
                                <input type="text" id="overrideDosage" class="premium-input w-full bg-slate-50 p-3.5 border border-slate-200 rounded-xl font-mono font-black text-teal-700 text-sm outline-none">
                            </div>
                            <div class="relative group">
                                <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-1 group-focus-within:text-teal-600 transition-colors">Administration Timing</label>
                                <select id="timing" class="premium-input w-full bg-slate-50 p-3.5 border border-slate-200 rounded-xl font-bold text-slate-700 text-xs outline-none cursor-pointer">
                                    <option>After Meal</option>
                                    <option>Before Meal</option>
                                    <option>Empty Stomach</option>
                                </select>
                            </div>
                            <div class="relative group">
                                <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-1 group-focus-within:text-teal-600 transition-colors">Treatment Duration</label>
                                <input type="text" id="duration" placeholder="e.g. 7 Days" required class="premium-input w-full bg-slate-50 p-3.5 border border-slate-200 rounded-xl font-bold text-slate-700 text-xs outline-none">
                            </div>
                            <div class="relative group">
                                <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-1 group-focus-within:text-teal-600 transition-colors">Clinical Route</label>
                                <input type="text" id="instruction" value="Orally" class="premium-input w-full bg-slate-50 p-3.5 border border-slate-200 rounded-xl font-bold text-slate-700 text-xs outline-none">
                            </div>
                        </div>
                    </div>

                    <div class="relative group">
                        <label class="absolute -top-2 left-4 bg-white px-2 text-[9px] font-black text-slate-400 uppercase tracking-widest group-focus-within:text-teal-600 transition-colors z-10">Required Lab Investigations</label>
                        <textarea id="investigations" rows="2" placeholder="Input clinical test requirements (e.g. CBC, Lipid Profile)..." class="premium-input w-full p-5 bg-white border-2 border-slate-100 rounded-[20px] text-sm font-medium text-slate-700 outline-none resize-none"></textarea>
                    </div>

                    <div class="bg-slate-900 rounded-[24px] p-2 flex flex-col md:flex-row items-center justify-between shadow-2xl shadow-slate-900/30">
                        <div class="flex items-center gap-4 pl-6 py-4 md:py-0">
                            <div>
                                <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest mb-1">Cryptographic OTP</p>
                                <p id="otpCode" class="text-2xl font-mono font-black tracking-[0.2em] text-teal-400 drop-shadow-[0_0_5px_rgba(45,212,191,0.5)]">----</p>
                            </div>
                        </div>
                        <button type="submit" id="authBtn" class="btn-premium w-full md:w-auto bg-gradient-to-r from-teal-500 to-emerald-500 text-white px-10 py-5 rounded-[20px] font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3">
                            <i class="fa-solid fa-satellite-dish text-lg"></i> Broadcast to Grid
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = localStorage.getItem('eRx_Token');
        if(!token) window.location.href = 'index.html';

        document.getElementById('drNameDisplay').innerText = `Dr. ${localStorage.getItem('eRx_UserName') || 'Unknown'}`;

        let globalSearchResults = [];

        function findPatient() {
            const query = document.getElementById('patientSearchInput').value;
            if(!query) return;
            document.getElementById('patientCard').classList.remove('hidden');
            document.getElementById('pName').innerText = "Toki Tawsif";
        }

        let searchTimeout;
        async function searchMedicines() {
            const query = document.getElementById('medSearch').value;
            const suggestions = document.getElementById('searchSuggestions');
            if (query.length < 2) { suggestions.classList.add('hidden'); return; }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`${API_BASE_URL}/api/medicines/search?q=${query}`, { headers: { 'Authorization': `Bearer ${token}` } });
                    globalSearchResults = await res.json();
                    
                    if (globalSearchResults.length === 0) {
                        suggestions.innerHTML = `<div class="p-6 text-center"><i class="fa-solid fa-capsules text-slate-300 text-2xl mb-2"></i><p class="text-xs font-bold text-slate-400">No database match found.</p></div>`;
                    } else {
                        // Apply CSS hover effect via JS mapping
                        suggestions.innerHTML = globalSearchResults.map((m, index) => `
                            <div onclick="selectMed(${index})" class="search-item p-4 cursor-pointer border-b border-slate-100 flex justify-between items-center group bg-white">
                                <div>
                                    <p class="font-black text-slate-800 text-sm">${m.brand_name} <span class="text-[10px] text-slate-400 font-bold ml-2 py-0.5 px-2 bg-slate-100 rounded-full group-hover:bg-teal-100">${m.strength || 'Std'}</span></p>
                                    <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest mt-1">${m.generic}</p>
                                </div>
                                <div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center group-hover:bg-teal-500 group-hover:shadow-[0_0_10px_rgba(45,212,191,0.4)] transition-all">
                                    <i class="fa-solid fa-plus text-slate-300 group-hover:text-white transition-colors"></i>
                                </div>
                            </div>
                        `).join('');
                    }
                    suggestions.classList.remove('hidden');
                } catch (err) { console.error("Search Failed."); }
            }, 300);
        }

        function selectMed(index) {
            const med = globalSearchResults[index];
            document.getElementById('searchSuggestions').classList.add('hidden');
            document.getElementById('overridePanel').classList.remove('hidden');
            document.getElementById('medSearch').value = med.brand_name;

            document.getElementById('selectedBrand').innerText = `${med.brand_name} ${med.strength || ''}`;
            document.getElementById('selectedGeneric').innerText = med.generic;
            document.getElementById('metaIndications').innerText = med.indications || med.use_for || 'General clinical indication.';
            document.getElementById('metaSideEffects').innerText = med.side_effects || 'Observe for standard contraindications.';
            document.getElementById('overrideDosage').value = med.dosage || med.dosage_description || '1+0+1';

            const otp = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('otpCode').innerText = otp;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `SH-ERX-${otp}`, width: 60, height: 60, colorDark: "#0f172a", colorLight: "#ffffff" });
        }

        async function submitPrescription() {
            const btn = document.getElementById('authBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-lg"></i> TRANSMITTING...';
            setTimeout(() => { alert("Prescription Broadcasted."); location.reload(); }, 1000);
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
