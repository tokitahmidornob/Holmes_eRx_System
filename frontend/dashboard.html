<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holmes eRx | Clinical Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <nav class="bg-blue-900 text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-blue-900 font-black text-xl border-2 border-blue-400">
                SH
            </div>
            <div>
                <h1 id="drNameDisplay" class="font-bold text-lg leading-tight">Dr. Sherlock Holmes</h1>
                <p id="drSpecialty" class="text-[10px] uppercase tracking-widest text-blue-300 font-bold">Senior Medical Officer | Reg #12345</p>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right hidden md:block">
                <p class="text-[10px] text-blue-300 uppercase font-black">System Status</p>
                <p class="text-xs font-bold text-green-400"><i class="fa-solid fa-circle-check mr-1"></i> National Grid Online</p>
            </div>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-5 py-2 rounded-xl text-xs font-black shadow-lg transition-all">TERMINATE SESSION</button>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Patient Verification</h3>
                <div class="space-y-4">
                    <div class="relative">
                        <input type="text" id="patientIDInput" placeholder="Enter National Health ID" class="w-full pl-10 pr-4 py-3 bg-slate-50 border rounded-xl text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                        <i class="fa-solid fa-id-card absolute left-3 top-4 text-slate-400"></i>
                    </div>
                    <button onclick="verifyPatient()" class="w-full bg-slate-800 text-white text-xs font-black py-3 rounded-xl hover:bg-black transition-all">PULL MEDICAL RECORDS</button>
                </div>

                <div id="patientCard" class="mt-6 p-4 bg-blue-50 rounded-2xl border border-blue-100 hidden">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">P</div>
                        <div>
                            <p id="pName" class="font-black text-blue-900 text-sm"></p>
                            <p id="pAgeGender" class="text-[10px] text-blue-500 font-bold uppercase"></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-[10px] font-bold text-blue-700">
                        <div class="bg-white p-2 rounded-lg border">BP: 120/80</div>
                        <div class="bg-white p-2 rounded-lg border">WT: 62KG</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-6">
            <div class="bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 p-6 border-b flex justify-between items-center">
                    <div>
                        <h2 class="text-xl font-black text-slate-800">Digital Prescription Pad</h2>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Authenticated Session: <span id="sessionID">#SH-789-2026</span></p>
                    </div>
                    <div id="qrcode" class="bg-white p-2 border rounded-xl shadow-inner"></div>
                </div>

                <form id="masterPad" class="p-8 space-y-8" onsubmit="event.preventDefault(); submitMasterPrescription();">
                    
                    <div class="space-y-4">
                        <div class="relative">
                            <label class="block text-xs font-black text-slate-500 uppercase mb-2 ml-1">Search & Prescribe (21k+ Pharmacy)</label>
                            <input type="text" id="medSearch" oninput="searchMedicines()" placeholder="Type Brand or Generic Name..." class="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold focus:border-blue-500 outline-none transition-all">
                            <div id="searchSuggestions" class="absolute z-50 w-full bg-white shadow-2xl rounded-2xl mt-2 max-h-60 overflow-y-auto hidden border-2 border-blue-100"></div>
                        </div>

                        <div id="overridePanel" class="hidden p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 animate-in fade-in duration-300">
                            <div class="flex justify-between items-center mb-4">
                                <h4 id="selectedMed" class="font-black text-blue-900"></h4>
                                <span class="text-[10px] bg-green-100 text-green-700 px-3 py-1 rounded-full font-black uppercase">Active Ingredient Verified</span>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <div class="md:col-span-1">
                                    <label class="text-[10px] font-black text-slate-400 uppercase">Arbitrary Dosage</label>
                                    <input type="text" id="overrideDosage" value="1+0+1" class="w-full p-3 border rounded-xl font-mono font-bold text-blue-600 bg-white">
                                </div>
                                <div class="md:col-span-1">
                                    <label class="text-[10px] font-black text-slate-400 uppercase">Administration</label>
                                    <select id="timing" class="w-full p-3 border rounded-xl font-bold bg-white">
                                        <option>After Meal</option>
                                        <option>Before Meal</option>
                                        <option>Empty Stomach</option>
                                    </select>
                                </div>
                                <div class="md:col-span-1">
                                    <label class="text-[10px] font-black text-slate-400 uppercase">Duration</label>
                                    <input type="text" id="duration" placeholder="e.g. 7 Days" class="w-full p-3 border rounded-xl font-bold bg-white">
                                </div>
                                <div class="md:col-span-1">
                                    <label class="text-[10px] font-black text-slate-400 uppercase">Unit/Route</label>
                                    <input type="text" id="route" value="Orally" class="w-full p-3 border rounded-xl font-bold bg-white">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-slate-500 uppercase mb-2 ml-1">Required Investigations (Tests)</label>
                        <textarea id="investigations" rows="2" placeholder="e.g. CBC, Serum Creatinine, Chest X-ray..." class="w-full p-4 bg-slate-50 border rounded-2xl text-sm italic focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>

                    <div class="pt-8 border-t flex flex-col md:flex-row items-center justify-between gap-6">
                        <div class="flex items-center gap-4 bg-slate-900 text-white p-4 rounded-2xl shadow-xl w-full md:w-auto">
                            <div class="text-center border-r border-slate-700 pr-4">
                                <p class="text-[8px] uppercase font-black text-slate-500">Secure OTP</p>
                                <p id="otpCode" class="text-2xl font-black tracking-widest text-blue-400">----</p>
                            </div>
                            <p class="text-[10px] font-bold leading-tight text-slate-400 uppercase">Valid for this<br>patient only</p>
                        </div>
                        
                        <button type="submit" id="authBtn" class="w-full md:w-auto bg-blue-600 hover:bg-blue-800 text-white px-12 py-5 rounded-2xl font-black shadow-2xl shadow-blue-200 transition-all flex items-center justify-center gap-3">
                            <i class="fa-solid fa-cloud-arrow-up text-xl"></i> AUTHORIZE & BROADCAST TO GRID
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = localStorage.getItem('holmesToken');
        if(!token) window.location.href = 'index.html';

        // Initialize Identity
        const user = JSON.parse(localStorage.getItem('holmesUser'));
        if(user) document.getElementById('drNameDisplay').innerText = user.name;

        // 🔍 Medicine Search logic
        async function searchMedicines() {
            const query = document.getElementById('medSearch').value;
            const suggestions = document.getElementById('searchSuggestions');
            if (query.length < 3) { suggestions.classList.add('hidden'); return; }

            try {
                const res = await fetch(`${API_BASE_URL}/api/medicines/search?q=${query}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const meds = await res.json();
                
                suggestions.innerHTML = meds.map(m => `
                    <div onclick="selectMed('${m.brand_name}', '${m.generic}')" class="p-4 hover:bg-blue-50 cursor-pointer border-b border-slate-50 group flex justify-between items-center">
                        <div>
                            <p class="font-black text-slate-800 group-hover:text-blue-600 transition-colors">${m.brand_name}</p>
                            <p class="text-[10px] text-slate-400 uppercase font-bold">${m.generic}</p>
                        </div>
                        <i class="fa-solid fa-plus text-slate-200 group-hover:text-blue-400"></i>
                    </div>
                `).join('');
                suggestions.classList.remove('hidden');
            } catch (err) { console.error("Archive Search Failed."); }
        }

        function selectMed(name, generic) {
            document.getElementById('selectedMed').innerText = `${name} | ${generic}`;
            document.getElementById('overridePanel').classList.remove('hidden');
            document.getElementById('searchSuggestions').classList.add('hidden');
            document.getElementById('medSearch').value = name;
            
            // Generate OTP & QR
            const otp = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('otpCode').innerText = otp;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `ERX-${name}-${otp}`, width: 80, height: 80, colorDark: "#1e3a8a" });
        }

        async function submitMasterPrescription() {
            const btn = document.getElementById('authBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Syncing with National Grid...';
            
            // Collect full data
            const pData = {
                patientId: document.getElementById('patientIDInput').value,
                medication: document.getElementById('medSearch').value,
                dosage: document.getElementById('overrideDosage').value,
                timing: document.getElementById('timing').value,
                duration: document.getElementById('duration').value,
                investigations: document.getElementById('investigations').value,
                otp: document.getElementById('otpCode').innerText
            };

            try {
                const res = await fetch(`${API_BASE_URL}/api/prescriptions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(pData)
                });
                if(res.ok) {
                    alert("Authorization Successful. Prescription is now live.");
                    location.reload();
                }
            } catch (err) { alert("Grid Connection Timeout."); }
            finally { btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up text-xl"></i> AUTHORIZE & BROADCAST'; }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
