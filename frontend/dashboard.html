<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Terminal | Holmes eRx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .premium-input { transition: all 0.3s ease; }
        .premium-input:focus { box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1); border-color: #14b8a6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dropdown-menu { transform-origin: top; transition: transform 0.2s ease, opacity 0.2s ease; z-index: 100; }
        .dropdown-menu.hidden { transform: scaleY(0.95); opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="antialiased text-slate-800 flex h-screen overflow-hidden" onclick="closeAllDropdowns(event)">

    <aside class="w-24 lg:w-72 bg-slate-900 text-white flex flex-col transition-all duration-300 z-20 shadow-2xl relative">
        <div class="h-24 flex items-center justify-center lg:justify-start lg:px-8 border-b border-slate-800">
            <div class="w-10 h-10 bg-teal-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-teal-500/30 shrink-0">
                <i class="fa-solid fa-user-doctor"></i>
            </div>
            <h1 class="hidden lg:block ml-4 text-xl font-black tracking-tighter">Holmes <span class="text-teal-400">eRx</span></h1>
        </div>
        <nav class="flex-1 py-8 flex flex-col gap-2 px-4">
            <button onclick="switchTab('rxPad')" id="navRxPad" class="nav-btn active flex items-center p-4 rounded-2xl bg-teal-500/10 text-teal-400 transition-all">
                <i class="fa-solid fa-pen-nib text-xl lg:mr-4 w-6 text-center"></i>
                <span class="hidden lg:block font-bold text-sm">Write Prescription</span>
            </button>
            <button onclick="switchTab('history')" id="navHistory" class="nav-btn flex items-center p-4 rounded-2xl hover:bg-slate-800 text-slate-400 hover:text-white transition-all">
                <i class="fa-solid fa-clock-rotate-left text-xl lg:mr-4 w-6 text-center"></i>
                <span class="hidden lg:block font-bold text-sm">Rx History & Labs</span>
            </button>
        </nav>
        
        <div class="p-4 border-t border-slate-800">
            <div class="hidden lg:block mb-4 px-4 text-center">
                <p id="drNameDisplay" class="font-black text-sm text-white truncate">Dr. Holmes</p>
                <div class="bg-slate-800/50 border border-slate-700 rounded-lg mt-2 py-1">
                    <p id="drGridIdDisplay" class="text-xs font-mono font-bold text-teal-400 tracking-wider">ID: PENDING</p>
                </div>
            </div>
            <button onclick="logout()" class="w-full flex items-center justify-center p-4 rounded-2xl hover:bg-rose-500/10 text-slate-400 hover:text-rose-500 transition-all">
                <i class="fa-solid fa-power-off text-xl lg:mr-3"></i>
                <span class="hidden lg:block font-bold text-sm uppercase tracking-widest">Disconnect</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative bg-slate-50">
        <header class="h-24 glass-panel border-b border-slate-200 flex items-center justify-between px-8 shrink-0 z-10">
            <div>
                <h2 id="pageTitle" class="text-2xl font-black text-slate-900 tracking-tighter">Clinical Pad</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">National Grid Connected</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="flex items-center gap-2 bg-emerald-50 text-emerald-600 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest border border-emerald-100">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> System Online
                </span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-8">
            <div id="viewRxPad" class="max-w-5xl mx-auto space-y-6 block">
                
                <div class="bg-white rounded-[32px] p-8 shadow-sm border border-slate-200">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Select Patient</label>
                    <div class="relative w-full" id="patientDropdownContainer">
                        <input type="text" id="patientSearchInput" onfocus="showPatientDropdown()" oninput="filterPatients()" placeholder="Search Patient..." autocomplete="off" class="premium-input w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 font-bold text-slate-800 outline-none">
                        <input type="hidden" id="selectedPatientEmail">
                        <div id="patientDropdown" class="dropdown-menu hidden absolute z-[60] w-full mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl max-h-60 overflow-y-auto custom-scrollbar"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-white rounded-[32px] shadow-sm border border-slate-200 p-6">
                        <h3 class="font-black text-slate-900 uppercase tracking-widest text-xs mb-4">Medications</h3>
                        <div class="grid grid-cols-12 gap-2 mb-4 relative">
                            <div class="col-span-4" id="drugDropdownContainer">
                                <input type="text" id="medName" oninput="searchDrugs(this.value)" placeholder="Search Drug..." class="premium-input w-full bg-slate-50 p-3 rounded-xl border border-slate-200 text-sm font-bold outline-none">
                                <div id="drugDropdown" class="dropdown-menu hidden absolute w-full mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl max-h-48 overflow-y-auto custom-scrollbar"></div>
                            </div>
                            <input type="text" id="medDose" placeholder="Dose" class="col-span-3 premium-input bg-slate-50 p-3 rounded-xl border border-slate-200 text-sm font-bold outline-none">
                            <select id="medTiming" class="col-span-3 premium-input bg-slate-50 p-3 rounded-xl border border-slate-200 text-sm font-bold outline-none">
                                <option value="After Meal">After Meal</option>
                                <option value="Before Meal">Before Meal</option>
                            </select>
                            <input type="text" id="medDuration" placeholder="Days" class="col-span-2 premium-input bg-slate-50 p-3 rounded-xl border border-slate-200 text-sm font-bold outline-none">
                        </div>
                        <button onclick="addMedication()" class="w-full bg-slate-900 text-white p-3 rounded-xl text-xs font-black uppercase tracking-widest">+ Add Medication</button>
                        <div id="medListDisplay" class="mt-4 space-y-2"></div>
                    </div>

                    <div class="bg-white rounded-[32px] shadow-sm border border-slate-200 p-6">
                        <h3 class="font-black text-slate-900 uppercase tracking-widest text-xs mb-4">Investigations</h3>
                        <div class="flex gap-2">
                            <input type="text" id="testName" placeholder="Test Name" class="flex-1 premium-input bg-slate-50 p-3 rounded-xl border border-slate-200 text-sm font-bold outline-none">
                            <button onclick="addTest()" class="bg-indigo-600 text-white px-4 rounded-xl"><i class="fa-solid fa-plus"></i></button>
                        </div>
                        <div id="testListDisplay" class="mt-4 flex flex-wrap gap-2"></div>
                    </div>
                </div>

                <div class="flex justify-end">
                    <button onclick="generatePrescription()" id="generateBtn" class="bg-emerald-600 text-white px-10 py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl">Encrypt & Broadcast</button>
                </div>
            </div>

            <div id="viewHistory" class="hidden"><div id="historyList" class="bg-white rounded-[32px] p-6"></div></div>
        </div>
    </main>

    <div id="successModal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/90 p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white rounded-[40px] w-full max-w-lg p-10 text-center shadow-2xl transform scale-95 transition-transform duration-300" id="successModalContent">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl"><i class="fa-solid fa-check"></i></div>
            <h2 class="text-3xl font-black text-slate-900 tracking-tighter mb-2">RECORD BROADCASTED</h2>
            <div class="bg-slate-50 p-6 rounded-2xl mb-6">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Prescription Rx No.</p>
                <p id="successBroadcastId" class="font-mono font-black text-2xl text-slate-800">HOLMES-RX-XXXX</p>
                <div class="h-px bg-slate-200 my-4"></div>
                <p class="text-[10px] font-black text-emerald-500 uppercase tracking-[0.2em] mb-2">Secure OTP Key</p>
                <p id="successOtp" class="font-mono font-black text-5xl text-emerald-600 tracking-[0.1em]">0000</p>
            </div>
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest">Close Pad</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = localStorage.getItem('eRx_Token');
        const drId = localStorage.getItem('eRx_UserId');
        const drName = localStorage.getItem('eRx_UserName');
        let medications = []; let investigations = []; let allPatients = [];

        // 🌟 JWT DECODER FOR SIDEBAR ID 🌟
        function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch(e) { return {}; } }
        const decoded = parseJwt(token);
        document.getElementById('drNameDisplay').innerText = `Dr. ${drName}`;
        document.getElementById('drGridIdDisplay').innerText = decoded.gridId || 'ID-PENDING';

        async function fetchPatientsList() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/patients`, { headers: { 'Authorization': `Bearer ${token}` } });
                if(res.ok) allPatients = await res.json();
            } catch(e) {}
        }
        fetchPatientsList();

        function showPatientDropdown() { document.getElementById('patientDropdown').classList.remove('hidden'); filterPatients(); }
        function filterPatients() {
            const q = document.getElementById('patientSearchInput').value.toLowerCase();
            const filtered = allPatients.filter(p => p.name.toLowerCase().includes(q) || (p.gridId && p.gridId.toLowerCase().includes(q)));
            document.getElementById('patientDropdown').innerHTML = filtered.map(p => `
                <div onclick="selectPatient('${p.email}', '${p.name}', '${p.gridId}')" class="p-4 hover:bg-slate-50 cursor-pointer border-b last:border-0 flex justify-between items-center">
                    <div><p class="font-black text-sm">${p.name}</p><p class="text-[10px] font-bold text-slate-400">${p.email}</p></div>
                    <span class="text-[9px] font-black bg-indigo-50 text-indigo-600 px-2 py-1 rounded">${p.gridId || 'NO-ID'}</span>
                </div>`).join('');
        }
        function selectPatient(e, n, g) {
            document.getElementById('patientSearchInput').value = `${n} (${g})`;
            document.getElementById('selectedPatientEmail').value = e;
            document.getElementById('patientDropdown').classList.add('hidden');
        }

        async function searchDrugs(query) {
            const dropdown = document.getElementById('drugDropdown');
            if(query.length < 2) return dropdown.classList.add('hidden');
            dropdown.classList.remove('hidden');
            dropdown.innerHTML = '<div class="p-3 text-xs text-slate-400">Searching...</div>';
            try {
                const res = await fetch(`${API_BASE_URL}/api/medicines?search=${query}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const drugs = await res.json();
                dropdown.innerHTML = drugs.map(d => `<div onclick="selectDrug('${d.brandName}')" class="p-3 hover:bg-slate-50 cursor-pointer border-b last:border-0 font-bold text-sm">${d.brandName}</div>`).join('');
            } catch(e) { dropdown.innerHTML = 'Error searching.'; }
        }
        function selectDrug(n) { document.getElementById('medName').value = n; document.getElementById('drugDropdown').classList.add('hidden'); }

        function addMedication() {
            const n = document.getElementById('medName').value; const ds = document.getElementById('medDose').value;
            const t = document.getElementById('medTiming').value; const dr = document.getElementById('medDuration').value;
            if(!n || !ds || !dr) return;
            medications.push({ brandName: n, dosage: ds, timing: t, duration: dr });
            renderMedications();
        }
        function renderMedications() {
            document.getElementById('medListDisplay').innerHTML = medications.map((m, i) => `<div class="bg-slate-50 p-3 rounded-xl flex justify-between items-center font-bold text-sm"><span>${m.brandName} (${m.dosage})</span><button onclick="medications.splice(${i},1);renderMedications()" class="text-rose-500"><i class="fa-solid fa-trash"></i></button></div>`).join('');
        }
        function addTest() { const t = document.getElementById('testName').value; if(t) { investigations.push(t); renderTests(); document.getElementById('testName').value=''; } }
        function renderTests() { document.getElementById('testListDisplay').innerHTML = investigations.map((t, i) => `<span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg text-xs font-black uppercase">${t}</span>`).join(''); }

        async function generatePrescription() {
            const pEmail = document.getElementById('selectedPatientEmail').value;
            if(!pEmail) return alert("Select Patient");
            try {
                const res = await fetch(`${API_BASE_URL}/api/prescriptions`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ doctorId: drId, patientId: pEmail, medications, investigations })
                });
                const data = await res.json();
                if(res.ok) {
                    document.getElementById('successBroadcastId').innerText = data.broadcastId;
                    document.getElementById('successOtp').innerText = data.otp;
                    document.getElementById('successModal').classList.remove('opacity-0', 'pointer-events-none');
                    document.getElementById('successModalContent').classList.remove('scale-95');
                }
            } catch(e) { alert("Failed"); }
        }

        function closeAllDropdowns(e) {
            if(!document.getElementById('patientDropdownContainer').contains(e.target)) document.getElementById('patientDropdown').classList.add('hidden');
            if(!document.getElementById('drugDropdownContainer').contains(e.target)) document.getElementById('drugDropdown').classList.add('hidden');
        }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
