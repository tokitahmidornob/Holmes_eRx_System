<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Matrix | Holmes eRx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased min-h-screen flex bg-slate-950 items-center justify-center p-6 relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-teal-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="glass-panel w-full max-w-3xl rounded-[40px] shadow-2xl overflow-hidden relative z-10 p-10 border border-teal-500/20">
        
        <div class="flex items-center justify-between border-b border-slate-800 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter">Identity Matrix</h1>
                <p class="text-[10px] font-black text-teal-400 uppercase tracking-widest mt-1">Global Verification Profile</p>
            </div>
            <button onclick="goBack()" class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center text-slate-400 hover:text-white border border-slate-700 hover:border-teal-400 transition-all">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div id="loading" class="text-center py-10 text-teal-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl"></i></div>

        <div id="profileForm" class="hidden space-y-6">
            
            <div>
                <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4 border-b border-slate-800 pb-2">Core Identity</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Legal Full Name (Locked)</label>
                        <input type="text" id="fullName" disabled class="w-full bg-slate-900/50 border border-slate-800 rounded-xl px-4 py-3 text-sm font-bold text-slate-500 cursor-not-allowed">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Mobile Contact</label>
                        <input type="text" id="mobile" placeholder="01XXXXXXXXX" class="w-full bg-slate-900/50 border border-slate-700 focus:border-teal-500 rounded-xl px-4 py-3 text-sm font-bold text-white outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Date of Birth</label>
                        <input type="date" id="dob" class="w-full bg-slate-900/50 border border-slate-700 focus:border-teal-500 rounded-xl px-4 py-3 text-sm font-bold text-white outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Legal Gender</label>
                        <select id="gender" class="w-full bg-slate-900/50 border border-slate-700 focus:border-teal-500 rounded-xl px-4 py-3 text-sm font-bold text-white outline-none appearance-none">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="roleSpecificSection"></div>

            <button onclick="saveProfile()" id="saveBtn" class="w-full bg-teal-500 hover:bg-teal-400 text-slate-950 py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-[0_0_20px_rgba(0,240,255,0.3)] transition-all flex items-center justify-center gap-2 mt-8">
                <i class="fa-solid fa-microchip"></i> Synchronize Identity
            </button>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[150] flex flex-col gap-3 pointer-events-none w-full max-w-[320px]"></div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        const token = sessionStorage.getItem('eRx_Token');
        
        if (!token) window.location.href = 'auth.html';

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'glass-panel border-rose-500 text-rose-400' : 'glass-panel border-teal-500 text-teal-400';
            toast.className = `flex items-center p-4 rounded-2xl shadow-xl border-l-4 ${colors} transform transition-all`;
            toast.innerHTML = `<div class="font-bold text-sm">${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function goBack() {
            window.history.back();
        }

        async function loadProfile() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if(res.ok) {
                    // Populate Core
                    document.getElementById('fullName').value = data.person.legalFullName;
                    document.getElementById('mobile').value = data.person.contact.primaryMobile !== '0000000000' ? data.person.contact.primaryMobile : '';
                    if(data.person.dateOfBirth) document.getElementById('dob').value = data.person.dateOfBirth.split('T')[0];
                    document.getElementById('gender').value = data.person.genderLegal || '';

                    // Inject Role Specifics
                    const roleSection = document.getElementById('roleSpecificSection');
                    let roleHtml = `<h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4 border-b border-slate-800 pb-2 mt-6">Authority Credentials</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

                    if(data.role === 'patient') {
                        roleHtml += `
                            <div><label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-2 mb-2 block">National ID (NID)</label>
                            <input type="text" id="nationalId" value="${data.roleData.nationalId && !data.roleData.nationalId.includes('PENDING') ? data.roleData.nationalId : ''}" placeholder="Enter NID" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm font-bold text-white outline-none"></div>
                            <div><label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-2 mb-2 block">Blood Group</label>
                            <input type="text" id="bloodGroup" value="${data.roleData.bloodGroup || ''}" placeholder="e.g. O+" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm font-bold text-white outline-none"></div>
                        `;
                    } else {
                        roleHtml += `
                            <div><label class="text-[10px] font-black text-amber-400 uppercase tracking-widest ml-2 mb-2 block">BMDC / License Number</label>
                            <input type="text" id="licenseNumber" value="${data.roleData.licenseNumber || ''}" placeholder="Reg Number" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm font-bold text-white outline-none"></div>
                            <div><label class="text-[10px] font-black text-amber-400 uppercase tracking-widest ml-2 mb-2 block">Specialty (Comma Separated)</label>
                            <input type="text" id="specialty" value="${data.roleData.specialty ? data.roleData.specialty.join(', ') : ''}" placeholder="Cardiology, Pediatrics" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm font-bold text-white outline-none"></div>
                        `;
                    }
                    roleSection.innerHTML = roleHtml + `</div>`;

                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('profileForm').classList.remove('hidden');
                }
            } catch (err) { showToast("Failed to connect to Grid.", "error"); }
        }

        async function saveProfile() {
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Synchronizing...';
            btn.disabled = true;

            const payload = {
                mobile: document.getElementById('mobile').value,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                bloodGroup: document.getElementById('bloodGroup') ? document.getElementById('bloodGroup').value : undefined,
                nationalId: document.getElementById('nationalId') ? document.getElementById('nationalId').value : undefined,
                licenseNumber: document.getElementById('licenseNumber') ? document.getElementById('licenseNumber').value : undefined,
                specialty: document.getElementById('specialty') ? document.getElementById('specialty').value : undefined,
            };

            try {
                const res = await fetch(`${API_BASE_URL}/api/profile`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(res.ok) showToast(data.msg, "success");
                else showToast(data.msg, "error");
            } catch (err) { showToast("Sync Failed.", "error"); } finally {
                btn.innerHTML = '<i class="fa-solid fa-microchip"></i> Synchronize Identity';
                btn.disabled = false;
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
