<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Matrix | Holmes eRx</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="antialiased text-slate-800 min-h-screen bg-slate-50">

    <nav class="glass-panel border-b border-slate-200 sticky top-0 z-50 shadow-sm mb-8">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-teal-400 shadow-lg"><i class="fa-solid fa-fingerprint"></i></div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 tracking-tighter leading-none">Identity <span class="text-teal-500">Matrix</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">National Grid Verification</p>
                </div>
            </div>
            <button onclick="goBack()" class="bg-slate-100 text-slate-600 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-200 transition-all hover-lift"><i class="fa-solid fa-arrow-left mr-2"></i> Return to Terminal</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-12 flex flex-col lg:flex-row gap-8">
        
        <aside class="w-full lg:w-1/3">
            <div class="glass-panel rounded-[32px] p-8 shadow-xl text-center relative overflow-hidden sticky top-28">
                <div class="absolute inset-0 opacity-5" style="background-image: radial-gradient(#14b8a6 1px, transparent 1px); background-size: 20px 20px;"></div>
                
                <div class="relative z-10">
                    <div class="w-20 h-20 mx-auto bg-slate-100 text-slate-400 rounded-full flex items-center justify-center text-3xl mb-4 border-4 border-white shadow-md">
                        <i class="fa-solid fa-user-shield"></i>
                    </div>
                    <h2 id="displayUserName" class="text-xl font-black text-slate-900 tracking-tight">Loading Agent...</h2>
                    <span id="displayUserRole" class="inline-block mt-2 px-3 py-1 bg-slate-100 text-slate-500 rounded-md text-[9px] font-black uppercase tracking-widest border border-slate-200">Retrieving Role</span>

                    <div class="my-8 border-t border-slate-100 pt-8">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Security Clearance Level</h3>
                        <div class="relative w-40 h-40 mx-auto flex items-center justify-center">
                            <svg class="w-full h-full transform -rotate-90 drop-shadow-md" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="45" fill="none" stroke="#f1f5f9" stroke-width="8"></circle>
                                <circle id="progressCircle" cx="50" cy="50" r="45" fill="none" stroke="#14b8a6" stroke-width="8" stroke-dasharray="283" stroke-dashoffset="283" class="transition-all duration-1000 ease-out" stroke-linecap="round"></circle>
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span id="progressText" class="text-3xl font-black text-slate-900 tracking-tighter">0%</span>
                            </div>
                        </div>
                    </div>

                    <div id="statusBadgeContainer" class="bg-rose-50 border border-rose-100 p-4 rounded-2xl">
                        <p id="progressMessage" class="text-xs font-bold text-rose-600"><i class="fa-solid fa-triangle-exclamation mb-1 text-lg block"></i> Action Required: Complete profile to unlock Grid transmission.</p>
                    </div>
                </div>
            </div>
        </aside>

        <div class="w-full lg:w-2/3">
            <form id="profileForm" onsubmit="event.preventDefault(); saveProfile();" class="space-y-6">
                
                <div class="glass-panel rounded-[32px] p-8 shadow-sm hover-lift border border-slate-200">
                    <div class="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
                        <div class="w-8 h-8 bg-teal-50 text-teal-600 rounded-lg flex items-center justify-center"><i class="fa-solid fa-id-card"></i></div>
                        <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest">Universal Identity</h3>
                        <span class="ml-auto text-[9px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded uppercase tracking-widest">Mandatory</span>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">National ID (NID)</label><input type="text" id="nid" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-800 outline-none" placeholder="e.g. 1990123456789"></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Verified Phone</label><input type="text" id="phone" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-800 outline-none" placeholder="+880..."></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Date of Birth</label><input type="date" id="dob" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-600 outline-none"></div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Gender</label>
                            <select id="gender" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-600 outline-none">
                                <option value="">Select Designation...</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="dynamicRoleSection" class="glass-panel rounded-[32px] p-8 shadow-sm hover-lift border border-slate-200 hidden"></div>

                <div class="pt-4">
                    <button type="submit" id="saveBtn" class="w-full bg-slate-900 hover:bg-teal-600 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl hover-lift flex items-center justify-center gap-3 transition-colors duration-300">
                        <i class="fa-solid fa-cloud-arrow-up text-lg"></i> Synchronize Vault with National Grid
                    </button>
                    <p class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-4"><i class="fa-solid fa-lock text-slate-300 mr-1"></i> End-to-End Encrypted</p>
                </div>
            </form>
        </div>

    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[150] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://holmes-erx-system.onrender.com';
        // 🔒 SECURITY PATCH: Using sessionStorage
        const token = sessionStorage.getItem('eRx_Token');
        let currentUserRole = '';

        function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch(e) { return {}; } }
        if (!token) window.location.href = 'index.html';
        const decoded = parseJwt(token);
        currentUserRole = decoded.role;
        document.getElementById('displayUserRole').innerText = currentUserRole;
        document.getElementById('displayUserName').innerText = sessionStorage.getItem('eRx_UserName') || 'Citizen';

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'bg-rose-600 text-white shadow-rose-500/30' : 'bg-teal-600 text-white shadow-teal-500/30';
            toast.className = `flex items-center gap-3 px-6 py-4 rounded-2xl shadow-xl transform transition-all duration-500 translate-y-10 opacity-0 ${colors}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-check-circle'}"></i><span class="text-[10px] font-black uppercase tracking-widest">${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => { toast.classList.remove('translate-y-10', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 500); }, 3000);
        }

        function goBack() {
            if(currentUserRole === 'doctor') window.location.href = 'dashboard.html';
            else if(currentUserRole === 'pathologist') window.location.href = 'pathology_portal.html';
            else window.location.href = 'index.html';
        }

        // BUILD ENTERPRISE DYNAMIC FIELDS
        function renderDynamicFields() {
            const section = document.getElementById('dynamicRoleSection');
            section.classList.remove('hidden');

            if (currentUserRole === 'patient') {
                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
                        <div class="w-8 h-8 bg-rose-50 text-rose-500 rounded-lg flex items-center justify-center"><i class="fa-solid fa-notes-medical"></i></div>
                        <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest">Clinical Baseline & Diagnostics</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Blood Group</label><select id="p_blood" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-800 outline-none"><option value="">Select...</option><option value="A+">A+</option><option value="O+">O+</option><option value="B+">B+</option><option value="AB+">AB+</option><option value="A-">A-</option><option value="O-">O-</option><option value="B-">B-</option><option value="AB-">AB-</option></select></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Emergency Contact</label><input type="text" id="p_emerg" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-800 outline-none" placeholder="+880..."></div>
                        <div class="md:col-span-2"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Known Allergies (Comma separated)</label><input type="text" id="p_allergies" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-rose-600 outline-none" placeholder="e.g. Penicillin, Peanuts"></div>
                        <div class="md:col-span-2"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Chronic Conditions</label><input type="text" id="p_chronic" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-amber-600 outline-none" placeholder="e.g. Asthma, Type 2 Diabetes"></div>
                        
                        <div class="md:col-span-2 mt-4 p-6 bg-slate-50 border border-slate-200 rounded-2xl">
                            <div class="flex items-center gap-2 mb-4">
                                <i class="fa-solid fa-scalpel text-indigo-500"></i>
                                <h4 class="text-xs font-black text-slate-700 uppercase tracking-widest">Surgical History Vault</h4>
                            </div>
                            <input type="text" id="p_surg_name" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-800 outline-none mb-3" placeholder="Primary Surgery Name (e.g. Appendectomy)">
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" id="p_surg_doc" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-600 outline-none" placeholder="Attending Surgeon">
                                <input type="text" id="p_surg_hosp" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-600 outline-none" placeholder="Hospital / Year">
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentUserRole === 'doctor') {
                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
                        <div class="w-8 h-8 bg-indigo-50 text-indigo-500 rounded-lg flex items-center justify-center"><i class="fa-solid fa-user-doctor"></i></div>
                        <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest">Clinical Authority Validation</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">BMDC Registration No.</label><input type="text" id="d_bmdc" class="premium-input w-full p-4 rounded-xl text-sm font-mono font-black text-indigo-600 outline-none" placeholder="A-XXXXX"></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Primary Specialty</label><input type="text" id="d_spec" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-800 outline-none" placeholder="e.g. Cardiology"></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Degrees / Qualifications</label><input type="text" id="d_deg" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-800 outline-none" placeholder="MBBS, FCPS..."></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Primary Hospital / Chamber</label><input type="text" id="d_hosp" class="premium-input w-full p-4 rounded-xl text-sm font-bold text-slate-800 outline-none" placeholder="Institution Name"></div>
                    </div>
                `;
            }
        }

        async function loadProfile() {
            renderDynamicFields();
            try {
                const res = await fetch(`${API_BASE_URL}/api/profile`, { headers: { 'Authorization': `Bearer ${token}` } });
                if(res.ok) {
                    const user = await res.json();
                    
                    if(user.nationalId) document.getElementById('nid').value = user.nationalId;
                    if(user.phone) document.getElementById('phone').value = user.phone;
                    if(user.dateOfBirth) document.getElementById('dob').value = user.dateOfBirth.split('T')[0];
                    if(user.gender) document.getElementById('gender').value = user.gender;

                    // Execute Progress Physics
                    const pct = user.profileCompletion || 20;
                    document.getElementById('progressText').innerText = `${pct}%`;
                    
                    // Delay animation slightly for smooth loading effect
                    setTimeout(() => {
                        const offset = 283 - (283 * pct) / 100;
                        document.getElementById('progressCircle').style.strokeDashoffset = offset;
                    }, 300);
                    
                    const badgeContainer = document.getElementById('statusBadgeContainer');
                    const msg = document.getElementById('progressMessage');

                    if(pct === 100) {
                        document.getElementById('progressCircle').style.stroke = "#10b981"; // Emerald
                        document.getElementById('progressText').classList.replace('text-slate-900', 'text-emerald-600');
                        
                        badgeContainer.className = "bg-emerald-50 border border-emerald-100 p-4 rounded-2xl";
                        msg.innerHTML = "<i class='fa-solid fa-shield-check mb-1 text-lg block'></i> Profile Verified. Full Grid Access Granted.";
                        msg.className = "text-xs font-bold text-emerald-600";
                    }

                    // Populate existing data
                    if(currentUserRole === 'patient' && user.patientProfile) {
                        document.getElementById('p_blood').value = user.patientProfile.bloodGroup || '';
                        document.getElementById('p_emerg').value = user.patientProfile.emergencyContact?.phone || '';
                        document.getElementById('p_allergies').value = user.patientProfile.knownAllergies?.join(', ') || '';
                        document.getElementById('p_chronic').value = user.patientProfile.chronicConditions?.join(', ') || '';
                        
                        if(user.patientProfile.surgeryHistory && user.patientProfile.surgeryHistory.length > 0) {
                            const surg = user.patientProfile.surgeryHistory[0];
                            document.getElementById('p_surg_name').value = surg.surgeryName || '';
                            document.getElementById('p_surg_doc').value = surg.surgeonName || '';
                            document.getElementById('p_surg_hosp').value = surg.hospitalName || '';
                        }
                    } else if (currentUserRole === 'doctor' && user.doctorProfile) {
                        document.getElementById('d_bmdc').value = user.doctorProfile.bmdcNumber || '';
                        document.getElementById('d_spec').value = user.doctorProfile.primarySpecialty || '';
                        document.getElementById('d_deg').value = user.doctorProfile.primaryDegree || '';
                        document.getElementById('d_hosp').value = user.doctorProfile.primaryHospital || '';
                    }
                }
            } catch(e) { showToast("Decryption Error", "error"); }
        }

        async function saveProfile() {
            const btn = document.getElementById('saveBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-lg"></i> Processing Data...';
            btn.disabled = true;
            
            const payload = {
                nationalId: document.getElementById('nid').value, phone: document.getElementById('phone').value,
                dateOfBirth: document.getElementById('dob').value, gender: document.getElementById('gender').value
            };

            if (currentUserRole === 'patient') {
                payload.patientProfile = {
                    bloodGroup: document.getElementById('p_blood').value,
                    emergencyContact: { phone: document.getElementById('p_emerg').value },
                    knownAllergies: document.getElementById('p_allergies').value.split(',').map(s=>s.trim()).filter(Boolean),
                    chronicConditions: document.getElementById('p_chronic').value.split(',').map(s=>s.trim()).filter(Boolean)
                };
                
                const sName = document.getElementById('p_surg_name').value;
                if(sName) {
                    payload.patientProfile.surgeryHistory = [{
                        surgeryName: sName,
                        surgeonName: document.getElementById('p_surg_doc').value || 'Unknown',
                        hospitalName: document.getElementById('p_surg_hosp').value || 'Unknown',
                        approximateDate: 'Recorded'
                    }];
                } else {
                    payload.patientProfile.surgeryHistory = []; // Clear it if emptied
                }
            } else if (currentUserRole === 'doctor') {
                payload.doctorProfile = {
                    bmdcNumber: document.getElementById('d_bmdc').value,
                    primarySpecialty: document.getElementById('d_spec').value,
                    primaryDegree: document.getElementById('d_deg').value,
                    primaryHospital: document.getElementById('d_hosp').value
                };
            }

            try {
                const res = await fetch(`${API_BASE_URL}/api/profile`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(payload) });
                if(res.ok) { 
                    showToast("Vault Synchronized Successfully"); 
                    setTimeout(() => loadProfile(), 500); // Reload to trigger the physics ring
                } else { showToast("Sync Failed", "error"); }
            } catch(e) { showToast("Network Error", "error"); } finally { 
                btn.innerHTML = originalHTML; 
                btn.disabled = false;
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
